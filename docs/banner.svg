<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="url(#bg)"/>
  <!-- Top accent bar -->
  <rect x="0" y="0" width="800" height="3" rx="1.5" fill="url(#accent)"/>
  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40"/><line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="160" y1="0" x2="160" y2="200"/><line x1="320" y1="0" x2="320" y2="200"/>
    <line x1="480" y1="0" x2="480" y2="200"/><line x1="640" y1="0" x2="640" y2="200"/>
  </g>
  <!-- Glow behind icon -->
  <ellipse cx="100" cy="100" rx="55" ry="55" fill="url(#glow)"/>
  <!-- Shield icon -->
  <g transform="translate(55, 45)">
    <!-- Outer shield -->
    <path d="M45 5 L85 22 L85 58 C85 82 67 96 45 103 C23 96 5 82 5 58 L5 22 Z"
          fill="none" stroke="#dc2626" stroke-width="2.5" opacity="0.85"/>
    <!-- Inner shield highlight -->
    <path d="M45 14 L76 27 L76 55 C76 74 62 85 45 91 C28 85 14 74 14 55 L14 27 Z"
          fill="rgba(220,38,38,0.06)" stroke="none"/>
    <!-- Eye / detection symbol -->
    <ellipse cx="45" cy="50" rx="20" ry="13" fill="none" stroke="#e2e8f0" stroke-width="1.8" opacity="0.7"/>
    <circle cx="45" cy="50" r="7" fill="none" stroke="#dc2626" stroke-width="1.8" opacity="0.9"/>
    <circle cx="45" cy="50" r="2.5" fill="#dc2626" opacity="0.9"/>
    <!-- Scan lines radiating from eye -->
    <line x1="68" y1="38" x2="75" y2="33" stroke="#f59e0b" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>
    <line x1="68" y1="50" x2="76" y2="50" stroke="#f59e0b" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>
    <line x1="68" y1="62" x2="75" y2="67" stroke="#f59e0b" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>
  </g>
  <!-- Title -->
  <text x="170" y="75" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="30" font-weight="700" fill="#e2e8f0" letter-spacing="-0.5">Detection Engineering</text>
  <!-- Subtitle -->
  <text x="170" y="108" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="16" font-weight="500" fill="#dc2626">SOC Attack Detection &amp; Response</text>
  <!-- Description -->
  <text x="170" y="138" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="13" fill="#64748b">Splunk SIEM correlation rules with MITRE ATT&amp;CK mapping, investigation</text>
  <text x="170" y="155" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="13" fill="#64748b">queries, and incident response playbooks for Windows AD &amp; RHEL Linux</text>
  <!-- Version badge -->
  <rect x="660" y="62" width="90" height="26" rx="13" fill="rgba(220,38,38,0.08)" stroke="#dc2626" stroke-width="1" opacity="0.8"/>
  <text x="705" y="80" font-family="'Segoe UI Mono', 'Cascadia Code', monospace" font-size="12" fill="#dc2626" text-anchor="middle">Splunk SPL</text>
  <!-- MITRE badge -->
  <rect x="660" y="98" width="90" height="26" rx="13" fill="rgba(245,158,11,0.08)" stroke="#f59e0b" stroke-width="1" opacity="0.8"/>
  <text x="705" y="116" font-family="'Segoe UI Mono', 'Cascadia Code', monospace" font-size="11" fill="#f59e0b" text-anchor="middle">MITRE ATT&amp;CK</text>
</svg>
