# ==============================================================================
#  LSASS Process Memory Credential Dumping Detection
#  Splunk Correlation Rules
# ==============================================================================
#  Description : Multi-layered detection for OS credential dumping via LSASS
#                process memory access (MITRE T1003.001). Covers Mimikatz,
#                Sysinternals ProcDump, comsvcs.dll MiniDump (LOLBAS), Task
#                Manager dumps, WerFault abuse, SQLDumper, createdump, and
#                Sysmon-based process access telemetry.
#
#                LSASS (lsass.exe) stores NTLM hashes, Kerberos tickets, WDigest
#                plaintext credentials, DPAPI master keys, LSA secrets, and
#                cached domain credentials. Adversaries dump LSASS memory to
#                extract this material for lateral movement, privilege escalation,
#                and persistence — all without touching the network or cracking
#                passwords.
#
#  MITRE ATT&CK: T1003.001 - OS Credential Dumping: LSASS Memory
#                 T1003.004 - OS Credential Dumping: LSA Secrets (partial overlap)
#                 T1003.005 - OS Credential Dumping: Cached Domain Credentials
#  Kill Chain   : Credential Access -> Lateral Movement -> Privilege Escalation
#  Platform     : Splunk Enterprise / Splunk Cloud (ES compatible)
#  Author       : Krishnendu
#  Version      : 1.0.0
#  Created      : 2026-03-04
#  License      : MIT
# ==============================================================================
#
#  PREREQUISITES (must be configured BEFORE these rules generate detections):
#
#  1. Enable Advanced Audit Policy on ALL domain-joined hosts:
#     Computer Configuration > Windows Settings > Security Settings >
#       Advanced Audit Policy Configuration:
#       - Detailed Tracking > "Audit Process Creation" -> Success
#       - Object Access > "Audit Handle Manipulation" -> Success
#       - Object Access > "Audit Kernel Object" -> Success
#     (via GPO or: auditpol /set /subcategory:"Process Creation" /success:enable)
#
#  2. Enable Command Line Logging in Process Creation Events on all hosts:
#     Computer Configuration > Administrative Templates > System >
#       Audit Process Creation > Include command line in process creation events -> Enabled
#
#  3. Enable PowerShell Script Block Logging on all endpoints:
#     Computer Configuration > Administrative Templates > Windows Components >
#       Windows PowerShell > Turn on PowerShell Script Block Logging -> Enabled
#
#  4. Deploy Sysmon with a configuration that includes LSASS monitoring:
#     CRITICAL — Sysmon EventID 10 (ProcessAccess to lsass.exe) is the
#     highest-fidelity detection source and MUST be enabled for Rules 1 and 2.
#     Recommended Sysmon config entries:
#       <ProcessAccess onmatch="include">
#         <TargetImage condition="is">C:\Windows\system32\lsass.exe</TargetImage>
#       </ProcessAccess>
#       <FileCreate onmatch="include">
#         <TargetFilename condition="end with">.dmp</TargetFilename>
#         <TargetFilename condition="end with">.mdmp</TargetFilename>
#         <TargetFilename condition="end with">.hdmp</TargetFilename>
#       </FileCreate>
#       <ImageLoad onmatch="include">
#         <Image condition="is">C:\Windows\system32\lsass.exe</Image>
#       </ImageLoad>
#     Config: https://github.com/SwiftOnSecurity/sysmon-config
#
#  5. Forward Security logs and Sysmon logs from ALL endpoints to Splunk:
#     sourcetype=XmlWinEventLog:Security
#     sourcetype=XmlWinEventLog:Microsoft-Windows-Sysmon/Operational
#
#  6. Forward PowerShell Operational logs from all endpoints:
#     sourcetype=XmlWinEventLog:Microsoft-Windows-PowerShell/Operational
#
#  7. Build a lookup table of legitimate LSASS-accessing processes (allowlist):
#     File: lsass_access_allowlist.csv (columns: process_name, granted_access, reason)
#     Populate with known-good processes in your environment:
#       MsMpEng.exe, CSAgent.exe (CrowdStrike), SenseCE.exe (Defender for Endpoint),
#       LsaIso.exe (Credential Guard), MicrosoftSensors.exe, svchost.exe, werfault.exe
#
# ==============================================================================
#
#  GrantedAccess Bitmask Reference (Sysmon Event 10):
#
#  Value       | Decimal  | Permissions                             | Suspicious
#  ----------- | -------- | --------------------------------------- | ----------
#  0x1fffff    | 2097151  | PROCESS_ALL_ACCESS                      | CRITICAL
#  0x1f3fff    | 2031615  | All access minus suspend/resume         | CRITICAL
#  0x143a      | 5178     | VM_READ + QUERY_INFO + CREATE_THREAD    | CRITICAL
#  0x1438      | 5176     | VM_READ + DUP_HANDLE + QUERY_INFO       | CRITICAL
#  0x1410      | 5136     | VM_READ + QUERY_INFO                    | HIGH
#  0x1010      | 4112     | VM_READ + QUERY_LIMITED_INFO            | HIGH
#  0x0410      | 1040     | VM_READ + QUERY_LIMITED_INFO (32-bit)   | HIGH
#  0x40        | 64       | PROCESS_DUP_HANDLE                      | MEDIUM
#  0x10        | 16       | VM_READ (standalone)                    | HIGH
#
#  Key bitmask components (OR'd together by dump tools):
#    PROCESS_VM_READ              = 0x0010  -- required to read process memory
#    PROCESS_VM_WRITE             = 0x0020  -- sometimes used
#    PROCESS_DUP_HANDLE           = 0x0040  -- used in handle duplication attacks
#    PROCESS_QUERY_INFORMATION    = 0x0400  -- required for most tools
#    PROCESS_QUERY_LIMITED_INFO   = 0x1000  -- lower privilege variant
#    PROCESS_CREATE_THREAD        = 0x0002  -- DLL injection
#    PROCESS_ALL_ACCESS           = 0x1fffff
#
#  Tool-to-GrantedAccess mapping:
#    Mimikatz sekurlsa::logonpasswords  -> 0x1fffff or 0x1410
#    ProcDump (-ma flag)                -> 0x1fffff or 0x1f3fff
#    Task Manager (Create dump)         -> 0x1fffff
#    comsvcs.dll MiniDump (rundll32)    -> 0x1fffff
#    createdump.exe (.NET)              -> 0x1fffff or 0x1410
#    NanoDump                           -> 0x1010 (evasion-focused)
#    Process cloning (PPLdump bypass)   -> 0x0002 + 0x0040
#    Legitimate AV/EDR                  -> 0x1000 (QUERY_LIMITED_INFO only)
#    Windows kernel callbacks           -> 0x0010 (very low access)
#
# ==============================================================================


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 1: Sysmon ProcessAccess to LSASS — Suspicious GrantedAccess
# ██████████████████████████████████████████████████████████████████████████████
#
#  The highest-fidelity LSASS dump detection. Sysmon Event 10 fires whenever
#  a process opens a handle to another process. Specific GrantedAccess bitmask
#  values indicate memory-read intent (required for credential dumping), while
#  most legitimate process accesses use only PROCESS_QUERY_LIMITED_INFO (0x1000).
#
#  Detection logic:
#    - Sysmon Event ID 10 (ProcessAccess)
#    - TargetImage = C:\Windows\system32\lsass.exe (case-insensitive)
#    - GrantedAccess contains memory-read flags (0x10, 0x20) — detected via hex arithmetic
#    - Exclusion: known-legitimate caller image names (EDR, AV, Windows system processes)
#    - Exclusion: low-privilege access (GrantedAccess = 0x1000 QUERY_LIMITED_INFO only)
#    - SourceUser is NOT SYSTEM for processes that legitimately need SYSTEM access
#
#  Covers      : Mimikatz, ProcDump, comsvcs.dll, Task Manager, createdump, NanoDump,
#                any tool that directly opens lsass.exe with read access
#  Confidence  : HIGH (90)
#  Severity    : CRITICAL
#  FP Rate     : Medium — requires allowlist tuning for EDR/AV in your environment.
#                CrowdStrike (CSAgent.exe, CSFalconService), Windows Defender (MsMpEng.exe),
#                Sysmon itself (Sysmon64.exe), and some backup agents may trigger this.
#  Data Source : sourcetype=XmlWinEventLog:Microsoft-Windows-Sysmon/Operational

rule_1_sysmon_lsass_process_access:
  name: "LSASS Credential Dumping — Suspicious Process Access to lsass.exe (Sysmon Event 10)"
  description: >
    Detects Sysmon Event 10 (ProcessAccess) where a process opened a handle to
    lsass.exe with GrantedAccess values that include PROCESS_VM_READ (0x0010)
    or higher memory-access permissions. These access rights are required to read
    LSASS memory for credential extraction. Legitimate processes rarely require
    memory-read access to LSASS; EDR and AV products use only QUERY_LIMITED_INFO
    (0x1000) for process inspection. The rule excludes known-legitimate callers
    and only fires when memory-read capability is explicitly granted.
    Tools detected include Mimikatz, Sysinternals ProcDump, comsvcs.dll MiniDump,
    createdump.exe, NanoDump, SharpDump, Lsassy, and direct Windows API calls.
  mitre:
    tactic: "Credential Access"
    technique: T1003.001
    technique_name: "OS Credential Dumping: LSASS Memory"
    related_techniques:
      - "T1055: Process Injection (DLL injection into LSASS)"
      - "T1003.004: LSA Secrets (overlapping credential store)"
      - "T1078.002: Valid Accounts — use of extracted hashes/tickets"
  severity: critical
  confidence: 90
  risk_score: 95
  kill_chain_phase: "Credential Access"
  data_sources:
    - "Sysmon Event 10 (ProcessAccess) — requires Sysmon deployment with LSASS ProcessAccess rule"

  search: |
    index=wineventlog sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational"
        EventCode=10
    ``` Match LSASS as the target process (case-insensitive) ```
    | where lower(TargetImage) LIKE "%\\lsass.exe"
    ``` Convert GrantedAccess to decimal for arithmetic filtering ```
    | eval granted_dec=tonumber(GrantedAccess, 16)
    ``` Flag if VM_READ (0x10) or VM_WRITE (0x20) bit is set — required for memory dump ```
    | eval has_vm_read=if(mvcount(mvfilter(match(mvindex(split("0",","),0),"x")))>0,
                          if(granted_dec > 0 AND ((granted_dec - floor(granted_dec / 16) * 16) >= 0),
                             if(tonumber(GrantedAccess,16) LIKE "%%", 1, 0), 0), 0)
    ``` Simplified: keep events where GrantedAccess indicates dangerous access levels ```
    | where granted_dec>=16 AND NOT (granted_dec=4096 OR granted_dec=1024 OR granted_dec=5120)
    ``` Exclude purely QUERY_LIMITED_INFO (0x1000) only — used only for metadata queries ```
    | where NOT (granted_dec=4096)
    ``` Exclude well-known legitimate callers — customize for your environment ```
    | where NOT match(lower(SourceImage),
        "(?i)(MsMpEng|msmpeng\.exe|csagent\.exe|csfalconservice|senseir\.exe|sensece|" +
        "microsoft\.identity\.platform|lsaiso\.exe|wininit\.exe|csrss\.exe|" +
        "sysmon64\.exe|sysmon\.exe|wmiprvse\.exe|taskmgr\.exe)")
    ``` Classify GrantedAccess risk level ```
    | eval access_risk=case(
        granted_dec=2097151,     "CRITICAL — PROCESS_ALL_ACCESS (0x1fffff)",
        granted_dec=2031615,     "CRITICAL — Full access minus suspend/resume (0x1f3fff)",
        granted_dec=5178,        "CRITICAL — VM_READ+QUERY_INFO+CREATE_THREAD (0x143a)",
        granted_dec=5176,        "CRITICAL — VM_READ+DUP_HANDLE+QUERY_INFO (0x1438)",
        granted_dec=5136,        "HIGH — VM_READ+QUERY_INFO (0x1410)",
        granted_dec=4112,        "HIGH — VM_READ+QUERY_LIMITED_INFO (0x1010)",
        granted_dec=1040,        "HIGH — VM_READ+QUERY_LIMITED_INFO 32-bit (0x0410)",
        granted_dec=64,          "MEDIUM — DUP_HANDLE only (0x0040)",
        granted_dec>=16,         "HIGH — VM_READ included in access mask",
        1==1,                    "MEDIUM — Elevated access without explicit VM_READ"
      )
    ``` Identify likely tool based on SourceImage and GrantedAccess ```
    | eval likely_tool=case(
        match(lower(SourceImage), "(?i)(mimikatz)"),                    "Mimikatz (explicit)",
        match(lower(SourceImage), "(?i)(procdump)"),                    "Sysinternals ProcDump",
        match(lower(SourceImage), "(?i)(taskmgr)"),                     "Task Manager",
        match(lower(SourceImage), "(?i)(rundll32)"),                    "comsvcs.dll MiniDump (LOLBAS)",
        match(lower(SourceImage), "(?i)(createdump)"),                  ".NET createdump.exe",
        match(lower(SourceImage), "(?i)(sqldumper)"),                   "SQL Server SQLDumper",
        match(lower(SourceImage), "(?i)(werfault|werstore)"),           "WerFault abuse",
        match(lower(SourceImage), "(?i)(powershell|pwsh)"),             "PowerShell — Invoke-Mimikatz/Out-Minidump",
        match(lower(SourceImage), "(?i)(wmic)"),                        "WMIC process clone technique",
        granted_dec=2097151 AND match(lower(SourceImage),"(?i)\\\\[a-z0-9_-]+\.exe$"),
                                                                        "Unknown process — PROCESS_ALL_ACCESS (highly suspicious)",
        1==1,                                                           "Unclassified — requires investigation"
      )
    | stats
        min(_time) as first_seen,
        max(_time) as last_seen,
        count as access_count,
        values(SourceImage) as source_process,
        values(TargetImage) as target_process,
        values(GrantedAccess) as granted_access_hex,
        values(access_risk) as risk_level,
        values(likely_tool) as tool_signature,
        values(SourceUser) as source_user,
        values(CallTrace) as call_trace
        by host, SourceProcessId
    | eval mitre_technique="T1003.001"
    | eval mitre_tactic="Credential Access"
    | eval alert_name="LSASS Access — Suspicious GrantedAccess"
    | sort - access_count
    | table first_seen, last_seen, host, source_user, source_process,
            granted_access_hex, risk_level, tool_signature, access_count,
            call_trace, mitre_technique, mitre_tactic, alert_name

  schedule:
    cron: "*/5 * * * *"
    earliest: "-10m"
    latest: "now"
    window: "5m"
  throttle:
    field: "host,source_process"
    period: "1h"
  actions:
    - notable_event:
        rule_title: "LSASS Access — $tool_signature$ on $host$ (GrantedAccess: $granted_access_hex$)"
        rule_description: >
          Sysmon detected $source_process$ opening a memory-read handle to lsass.exe
          on $host$ with GrantedAccess=$granted_access_hex$ ($risk_level$).
          This access pattern is consistent with credential dumping tools such as
          Mimikatz, ProcDump, comsvcs.dll MiniDump, or custom tooling.
          Immediate triage is required — extract credentials may enable Pass-the-Hash
          or Pass-the-Ticket lateral movement.
        severity: critical
        status: "new"
    - risk_analysis:
        risk_object: "host"
        risk_score: 95
        risk_message: "LSASS memory-read access from $source_process$ — T1003.001"
  false_positives:
    - description: >
        EDR/AV agents (CrowdStrike CSAgent.exe, Microsoft Defender MsMpEng.exe,
        SentinelOne SentinelAgent.exe, Carbon Black cb.exe) may access LSASS.
        These are excluded by image name in the query — add new EDR products as needed.
      tuning: "Add process image names to the exclusion regex in the | where NOT match() clause"
    - description: >
        Windows Biometric Framework (WinBio) and Smart Card subsystem may access LSASS
        with elevated permissions for PAM-related operations.
      tuning: "Monitor via CallTrace — legitimate callers will use ntdll.dll!NtOpenProcess;
               malicious tools often show unusual module call chains (e.g., unbacked memory)"
    - description: >
        Backup agents (Veeam, Veritas, Commvault) may snapshot memory including LSASS
        during VSS-based backups.
      tuning: "Add backup agent process names to exclusion list; validate against backup schedule"


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 2: LSASS Memory Dump File Created on Disk
# ██████████████████████████████████████████████████████████████████████████████
#
#  Detects the output artifact of LSASS dumping — a .dmp, .mdmp, or .hdmp file
#  created in suspicious paths. Most legitimate crash dumps are written by the
#  Windows Error Reporting (WER) service to C:\Windows\LiveKernelReports\ or
#  C:\Windows\Minidump\ and are named with crash codes, NOT "lsass.dmp".
#  Any .dmp file named after or containing "lsass" in any user-writable path
#  is a near-certain indicator of credential dumping.
#
#  Detection logic:
#    - Sysmon Event 11 (FileCreate)
#    - TargetFilename ends in .dmp, .mdmp, or .hdmp
#    - TargetFilename contains "lsass" OR file is created in a suspicious path
#      (temp dirs, user profiles, ProgramData, root of C:\)
#    - Image that creates the file is NOT Windows Error Reporting (WER)
#
#  Covers      : ProcDump (-ma lsass.exe output), comsvcs.dll MiniDump,
#                Task Manager (lsass.dmp in C:\Windows\), createdump.exe,
#                SQLDumper, any tool that writes a dump file to disk
#  Confidence  : HIGH (88)
#  Severity    : CRITICAL
#  FP Rate     : Low — named "lsass" in a temp/user path is almost never legitimate.
#                WER writes to C:\Windows\LiveKernelReports\ and excludes lsass.
#  Data Source : sourcetype=XmlWinEventLog:Microsoft-Windows-Sysmon/Operational

rule_2_lsass_dump_file_created:
  name: "LSASS Credential Dump File Created — .dmp File in Suspicious Path"
  description: >
    Detects the creation of a memory dump file (.dmp, .mdmp, .hdmp) that is
    named after lsass.exe or located in a user-writable or suspicious directory.
    This event fires after the dump has already been written — the credential
    material is on disk and ready for exfiltration. The dump file contains a
    complete snapshot of LSASS process memory including NTLM hashes, Kerberos
    tickets, and potentially WDigest plaintext credentials.
    Legitimate crash dump locations (C:\Windows\LiveKernelReports, C:\Windows\Minidump)
    and WER service are excluded to reduce false positives.
  mitre:
    tactic: "Credential Access"
    technique: T1003.001
    technique_name: "OS Credential Dumping: LSASS Memory"
    related_techniques:
      - "T1041: Exfiltration Over C2 Channel (dump file may be exfiltrated next)"
      - "T1560: Archive Collected Data (dump may be compressed before exfil)"
  severity: critical
  confidence: 88
  risk_score: 90
  kill_chain_phase: "Credential Access"
  data_sources:
    - "Sysmon Event 11 (FileCreate) — requires Sysmon with FileCreate monitoring for .dmp extensions"

  search: |
    index=wineventlog sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational"
        EventCode=11
    ``` Match dump file extensions ```
    | where match(lower(TargetFilename), "\.(dmp|mdmp|hdmp)$")
    ``` Classify the dump as LSASS-specific or suspicious-path dump ```
    | eval is_lsass_dump=if(match(lower(TargetFilename), "lsass"), 1, 0)
    | eval is_suspicious_path=if(
        match(lower(TargetFilename),
            "(?i)(\\\\temp\\\\|\\\\tmp\\\\|\\\\appdata\\\\|\\\\programdata\\\\|" +
            "c:\\\\[^\\\\]+\.dmp$|\\\\downloads\\\\|\\\\desktop\\\\|\\\\public\\\\)"),
        1, 0)
    ``` Keep only LSASS-specific dumps OR suspicious-path dumps ```
    | where is_lsass_dump=1 OR is_suspicious_path=1
    ``` Exclude legitimate Windows Error Reporting paths and processes ```
    | where NOT match(lower(TargetFilename),
        "(?i)(\\\\windows\\\\livekernelreports\\\\|\\\\windows\\\\minidump\\\\|" +
        "\\\\windows\\\\memory\.dmp|\\\\crashreports\\\\)")
    | where NOT match(lower(Image),
        "(?i)(werfault\.exe|werstore\.exe|wermgr\.exe|drwatson)")
    ``` Extract filename for display ```
    | rex field=TargetFilename "(?i)(?P<dump_filename>[^\\\\]+\.(dmp|mdmp|hdmp))$"
    ``` Classify creating process risk ```
    | eval creating_process_risk=case(
        match(lower(Image), "(?i)(mimikatz)"),       "CRITICAL — Mimikatz",
        match(lower(Image), "(?i)(procdump)"),       "CRITICAL — ProcDump",
        match(lower(Image), "(?i)(rundll32)"),       "CRITICAL — comsvcs.dll/LOLBAS",
        match(lower(Image), "(?i)(taskmgr)"),        "HIGH — Task Manager dump",
        match(lower(Image), "(?i)(createdump)"),     "HIGH — .NET createdump",
        match(lower(Image), "(?i)(sqldumper)"),      "HIGH — SQLDumper",
        match(lower(Image), "(?i)(powershell|pwsh)"),"HIGH — PowerShell",
        match(lower(Image), "(?i)(wmic)"),           "HIGH — WMIC process clone",
        match(lower(Image), "(?i)(python|python3)"), "HIGH — Python script (Impacket?)",
        1==1,                                        "MEDIUM — Unknown process"
      )
    | stats
        min(_time) as dump_created_time,
        values(TargetFilename) as dump_file_path,
        values(dump_filename) as dump_file_name,
        values(Image) as creating_process,
        values(creating_process_risk) as risk_classification,
        values(User) as creating_user,
        values(is_lsass_dump) as lsass_named,
        values(is_suspicious_path) as suspicious_path,
        count as dump_count
        by host, ProcessId
    | eval mitre_technique="T1003.001"
    | eval mitre_tactic="Credential Access"
    | eval alert_name="LSASS Dump File Created on Disk"
    | sort - dump_count
    | table dump_created_time, host, creating_user, creating_process,
            dump_file_path, dump_file_name, risk_classification,
            lsass_named, suspicious_path, mitre_technique, mitre_tactic, alert_name

  schedule:
    cron: "*/5 * * * *"
    earliest: "-10m"
    latest: "now"
    window: "5m"
  throttle:
    field: "host,dump_file_path"
    period: "4h"
  actions:
    - notable_event:
        rule_title: "LSASS Dump Created — $dump_file_name$ by $creating_process$ on $host$"
        rule_description: >
          A memory dump file was created by $creating_process$ at $dump_file_path$
          on host $host$. This dump file contains LSASS process memory with
          credential material (NTLM hashes, Kerberos tickets, possibly plaintext
          passwords). The file should be quarantined immediately and the creating
          process investigated. Risk: $risk_classification$.
        severity: critical
        status: "new"
    - risk_analysis:
        risk_object: "host"
        risk_score: 90
        risk_message: "LSASS dump file created at $dump_file_path$ — T1003.001"
  false_positives:
    - description: >
        Task Manager creates C:\Windows\lsass.DMP when a user right-clicks lsass.exe
        in Task Manager > Create dump file. This may be legitimate administrator
        activity for troubleshooting, but should still be investigated in production.
      tuning: "If allowing admin Task Manager dumps, add taskmgr.exe to the exclusion list
               and require secondary approval process for this action."
    - description: >
        Some application crash reporting tools (Dr. Watson, OCA/WER integrations) may
        capture full process memory dumps including LSASS by proximity. These write to
        C:\Users\<user>\AppData\Local\CrashDumps.
      tuning: "Check if dump file name matches the crashing application, not lsass."


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 3: Mimikatz Execution — Process Name, Command Line, and PowerShell
# ██████████████████████████████████████████████████████████████████████████████
#
#  Mimikatz is the most widely used post-exploitation credential dumping tool.
#  Despite many renamings, its unique command syntax (sekurlsa::, lsadump::,
#  privilege::debug, kerberos::ptt) is preserved and detectable via PowerShell
#  script block logging and command-line capture. The tool can be run:
#    - As a standalone binary (mimikatz.exe, any renamed binary using mimikatz code)
#    - Reflectively loaded in PowerShell (Invoke-Mimikatz, Empire, Cobalt Strike)
#    - Embedded in other frameworks (Covenant, PoshC2, Metasploit kiwi module)
#
#  Detection logic (union of multiple indicators):
#    1. Process creation (Event 4688 / Sysmon Event 1) with binary names known to
#       carry Mimikatz (mimikatz.exe, mimilsa.exe, wce.exe, fgdump.exe, gsecdump.exe)
#    2. Command-line arguments containing Mimikatz module syntax
#       (sekurlsa::, lsadump::, privilege::debug, coffee, etc.)
#    3. PowerShell Script Block containing Invoke-Mimikatz, Out-Minidump,
#       PowerSploit reflective load patterns
#
#  Covers      : Mimikatz standalone, Invoke-Mimikatz, Cobalt Strike kiwi,
#                Empire module, renamed mimikatz binaries with retained syntax
#  Confidence  : HIGH (92)
#  Severity    : CRITICAL
#  FP Rate     : Very Low — mimikatz module syntax does not appear in legitimate scripts.
#                Renamed binary detection (process name only) has higher FP rate.
#  Data Sources: Event 4688 / Sysmon Event 1 + Event 4104

rule_3_mimikatz_execution:
  name: "Mimikatz Execution — Credential Dumping Tool Detected via Binary, CLI, or PowerShell"
  description: >
    Detects Mimikatz execution through three complementary indicators:
    (1) known process binary names associated with Mimikatz and its derivatives,
    (2) command-line arguments using Mimikatz's unique module syntax
        (sekurlsa::logonpasswords, lsadump::sam, privilege::debug, kerberos::ptt),
    (3) PowerShell script blocks containing Invoke-Mimikatz or reflective loading
        patterns. Mimikatz can extract NTLM hashes, Kerberos tickets, WDigest
        plaintext credentials, DPAPI master keys, and LSA secrets from LSASS memory.
    The sekurlsa:: and lsadump:: module namespaces are unique to Mimikatz and its
    forks — they do not appear in legitimate administrative tooling.
  mitre:
    tactic: "Credential Access"
    technique: T1003.001
    technique_name: "OS Credential Dumping: LSASS Memory"
    related_techniques:
      - "T1003.002: OS Credential Dumping: Security Account Manager"
      - "T1003.003: OS Credential Dumping: NTDS"
      - "T1558.001: Golden Ticket (kerberos::golden)"
      - "T1558.002: Silver Ticket (kerberos::silver)"
  severity: critical
  confidence: 92
  risk_score: 95
  kill_chain_phase: "Credential Access"
  data_sources:
    - "Windows Security Event Log — Event 4688 (Process Creation with CommandLine)"
    - "Sysmon Event 1 (ProcessCreate)"
    - "Windows PowerShell Operational Log — Event 4104 (Script Block Logging)"

  search: |
    ``` === Branch 1: Process creation — known Mimikatz binary names === ```
    (index=wineventlog (sourcetype="XmlWinEventLog:Security" EventCode=4688)
        OR (sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational" EventCode=1)
     (
       match(lower(NewProcessName),
           "(?i)(\\\\mimikatz\.exe$|\\\\mimikatz64\.exe$|\\\\mimilsa\.exe$|" +
           "\\\\mimilove\.exe$|\\\\wce\.exe$|\\\\fgdump\.exe$|\\\\gsecdump\.exe$|" +
           "\\\\pwdump[0-9]?\.exe$|\\\\cachedump\.exe$)")
       OR match(lower(CommandLine),
           "(?i)(sekurlsa::|lsadump::|privilege::debug|kerberos::ptt|kerberos::golden|" +
           "kerberos::silver|kerberos::list|crypto::certificates|dpapi::|" +
           "lsadump::sam|lsadump::secrets|lsadump::cache|lsadump::trust|" +
           "sekurlsa::logonpasswords|sekurlsa::wdigest|sekurlsa::kerberos|" +
           "sekurlsa::msv|sekurlsa::tspkg|sekurlsa::minidump|coffee)")
     )
     | eval detection_vector="ProcessCreate — binary or CLI"
     | eval source_field=if(EventCode=4688, NewProcessName, Image)
     | eval cmdline=CommandLine)
    ``` === Branch 2: PowerShell — Invoke-Mimikatz and reflective load patterns === ```
    | append [
        search index=wineventlog
            sourcetype="XmlWinEventLog:Microsoft-Windows-PowerShell/Operational"
            EventCode=4104
        (
          match(lower(ScriptBlockText),
              "(?i)(invoke-mimikatz|invoke-credentialinjection|invoke-daisychain|" +
              "out-minidump|get-passhashdump|powercat.*mimikatz|" +
              "sekurlsa::|lsadump::|privilege::debug|" +
              "reflectivepe|reflectivepeinject|load-pe|inject-shellcode)")
        )
        | eval detection_vector="PowerShell — Invoke-Mimikatz / Reflective Load"
        | eval source_field=Computer
        | eval cmdline=ScriptBlockText
    ]
    ``` === Classify specific Mimikatz capability used === ```
    | eval mimikatz_module=case(
        match(lower(cmdline), "(?i)sekurlsa::logonpasswords"), "sekurlsa::logonpasswords (NTLM + Kerberos + WDigest)",
        match(lower(cmdline), "(?i)sekurlsa::wdigest"),        "sekurlsa::wdigest (WDigest plaintext)",
        match(lower(cmdline), "(?i)sekurlsa::kerberos"),       "sekurlsa::kerberos (Kerberos tickets)",
        match(lower(cmdline), "(?i)sekurlsa::minidump"),       "sekurlsa::minidump (offline dump parse)",
        match(lower(cmdline), "(?i)lsadump::sam"),             "lsadump::sam (SAM database hashes)",
        match(lower(cmdline), "(?i)lsadump::secrets"),         "lsadump::secrets (LSA secrets — svc passwords)",
        match(lower(cmdline), "(?i)lsadump::cache"),           "lsadump::cache (cached domain credentials)",
        match(lower(cmdline), "(?i)lsadump::dcsync"),          "lsadump::dcsync (DCSync — DC replication impersonation)",
        match(lower(cmdline), "(?i)kerberos::golden"),         "kerberos::golden (Golden Ticket forge)",
        match(lower(cmdline), "(?i)kerberos::ptt"),            "kerberos::ptt (Pass-the-Ticket)",
        match(lower(cmdline), "(?i)privilege::debug"),         "privilege::debug (SeDebugPrivilege acquisition)",
        match(lower(cmdline), "(?i)dpapi::"),                  "dpapi:: (DPAPI master key decryption)",
        match(lower(cmdline), "(?i)crypto::certificates"),     "crypto::certificates (certificate extraction)",
        match(lower(cmdline), "(?i)(invoke-mimikatz|out-minidump)"), "PowerShell — Invoke-Mimikatz/Out-Minidump",
        1==1,                                                  "Mimikatz binary name match — module unknown"
      )
    | stats
        min(_time) as first_seen,
        max(_time) as last_seen,
        count as execution_count,
        values(source_field) as process_or_host,
        values(detection_vector) as detection_vectors,
        values(mimikatz_module) as modules_used,
        values(User) as executing_user,
        values(ParentProcessName) as parent_process,
        values(ParentCommandLine) as parent_cmdline
        by host
    | eval mitre_technique="T1003.001"
    | eval mitre_tactic="Credential Access"
    | eval alert_name="Mimikatz Execution Detected"
    | sort - execution_count
    | table first_seen, last_seen, host, executing_user, process_or_host,
            modules_used, detection_vectors, parent_process, parent_cmdline,
            mitre_technique, mitre_tactic, alert_name

  schedule:
    cron: "*/5 * * * *"
    earliest: "-10m"
    latest: "now"
    window: "5m"
  throttle:
    field: "host"
    period: "1h"
  actions:
    - notable_event:
        rule_title: "Mimikatz Detected on $host$ — Module: $modules_used$"
        rule_description: >
          Mimikatz credential dumping tool was detected on $host$ by $executing_user$.
          Module(s) used: $modules_used$. Detection vector: $detection_vectors$.
          Immediate containment required — NTLM hashes and/or Kerberos tickets
          may have been extracted. All service accounts accessed on this host
          should have their passwords rotated.
        severity: critical
        status: "new"
    - risk_analysis:
        risk_object: "host"
        risk_score: 95
        risk_message: "Mimikatz execution — $modules_used$ — T1003.001"
  false_positives:
    - description: >
        Security operations tooling (Bloodhound, CobaltStrike team server in red team
        exercises, penetration testing) may generate these events during authorized testing.
        Always confirm with change management and red team schedule before dismissing.
      tuning: "If authorized red team testing is occurring, create a time-bounded
               suppression correlated with the authorized testing window."
    - description: >
        Security researchers or DFIR analysts running Mimikatz forensically on isolated
        VMs may trigger this rule via endpoint telemetry still being forwarded.
      tuning: "Exclude dedicated DFIR workstation hostnames if they are isolated from production."


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 4: ProcDump / LOLBAS Dump Tools — Process Creation Targeting LSASS
# ██████████████████████████████████████████████████████████████████████████████
#
#  Covers tools that dump LSASS via legitimate system utilities (LOLBAS):
#
#  a) Sysinternals ProcDump:
#     procdump.exe -ma lsass.exe lsass.dmp
#     procdump64.exe -accepteula -ma lsass.exe C:\Temp\dump.dmp
#     procdump.exe -mm lsass.exe dump.dmp        (mini dump)
#     procdump.exe -r lsass.exe                  (clone — avoid AV scan trigger)
#     procdump.exe -mk lsass.exe                 (kernel mini dump)
#
#  b) comsvcs.dll MiniDump (built-in Windows DLL via rundll32 — LOLBin):
#     rundll32.exe C:\Windows\System32\comsvcs.dll, MiniDump <PID> lsass.dmp full
#     rundll32 comsvcs.dll MiniDump 676 C:\lsass.dmp full
#     (PowerShell: rundll32 comsvcs.dll, MiniDump $pid dump.dmp full)
#
#  c) createdump.exe (.NET runtime CLR tool, Microsoft-signed):
#     createdump.exe --name lsass.dmp <PID>
#     createdump.exe -u -f lsass.dmp <PID>
#
#  d) SQLDumper (from SQL Server installation):
#     sqldumper.exe <PID> 0 0x0110:40
#
#  e) WerFault.exe abuse (Windows Error Reporting):
#     werfault.exe -u -p <LSASS_PID> -ip <LSASS_PID> -s 65536
#     (Creates dump via WER's legitimate crash dump mechanism)
#
#  Confidence  : HIGH (88)
#  Severity    : CRITICAL
#  FP Rate     : Low for comsvcs.dll path (rarely used legitimately with lsass PID).
#                Medium for ProcDump (legitimate admins use it for non-LSASS processes).
#                WerFault targeting lsass is high-confidence; WerFault normally targets
#                crashing apps and does not need lsass PID explicitly.

rule_4_procdump_lolbas_lsass_dump:
  name: "ProcDump and LOLBAS Tools Targeting LSASS — T1003.001 and T1218"
  description: >
    Detects Sysinternals ProcDump and Living-off-the-Land Binaries (LOLBins) being
    used to dump LSASS process memory. Specifically detects:
    (1) ProcDump with -ma (full dump), -mm (mini dump), -r (clone), or -mk (kernel) flags
        targeting the lsass process by name or PID,
    (2) rundll32.exe invoking comsvcs.dll MiniDump export with "full" argument,
        which is the canonical LOLBAS LSASS dump technique,
    (3) createdump.exe (Microsoft-signed .NET runtime tool) targeting LSASS PID,
    (4) SQLDumper.exe with dump-type flags,
    (5) WerFault.exe with -p and -ip flags targeting LSASS by PID.
    All of these produce an on-disk memory dump file containing extractable credentials.
  mitre:
    tactic: "Credential Access"
    technique: T1003.001
    technique_name: "OS Credential Dumping: LSASS Memory"
    related_techniques:
      - "T1218.011: System Binary Proxy Execution: Rundll32 (comsvcs.dll technique)"
      - "T1218: System Binary Proxy Execution (createdump, WerFault abuse)"
  severity: critical
  confidence: 88
  risk_score: 90
  kill_chain_phase: "Credential Access"
  data_sources:
    - "Windows Security Event Log — Event 4688 (Process Creation with CommandLine)"
    - "Sysmon Event 1 (ProcessCreate)"

  search: |
    index=wineventlog
    (sourcetype="XmlWinEventLog:Security" EventCode=4688)
    OR (sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational" EventCode=1)
    | eval process=coalesce(NewProcessName, Image)
    | eval cmdline=coalesce(CommandLine, CommandLine)
    | eval cmdline_lower=lower(cmdline)
    | eval process_lower=lower(process)
    ``` === Branch A: ProcDump targeting lsass === ```
    | eval is_procdump=if(
        match(process_lower, "(?i)(procdump|procdump64)") AND
        match(cmdline_lower, "(?i)(lsass|-ma|-mm|-r|-mk)"),
        1, 0)
    ``` === Branch B: comsvcs.dll MiniDump via rundll32 === ```
    | eval is_comsvcs=if(
        match(process_lower, "(?i)rundll32\.exe") AND
        match(cmdline_lower, "(?i)(comsvcs|minidump)") AND
        match(cmdline_lower, "(?i)full"),
        1, 0)
    ``` === Branch C: createdump.exe targeting LSASS PID === ```
    | eval is_createdump=if(
        match(process_lower, "(?i)createdump\.exe") AND
        match(cmdline_lower, "(?i)(--name|lsass|-f|-u)"),
        1, 0)
    ``` === Branch D: SQLDumper with dump flags === ```
    | eval is_sqldumper=if(
        match(process_lower, "(?i)sqldumper\.exe") AND
        match(cmdline_lower, "(?i)(0x0110|0x0120|0x8100)"),
        1, 0)
    ``` === Branch E: WerFault process targeting LSASS (manual invocation) === ```
    | eval is_werfault_abuse=if(
        match(process_lower, "(?i)werfault\.exe") AND
        match(cmdline_lower, "(?i)(-p\s+\d+.*-ip|-ip\s+\d+.*-p)"),
        1, 0)
    ``` Keep only matching events ```
    | where is_procdump=1 OR is_comsvcs=1 OR is_createdump=1
            OR is_sqldumper=1 OR is_werfault_abuse=1
    ``` Classify technique ```
    | eval dump_technique=case(
        is_procdump=1,        "ProcDump (Sysinternals) — T1003.001",
        is_comsvcs=1,         "comsvcs.dll MiniDump via rundll32 — T1218.011 + T1003.001",
        is_createdump=1,      ".NET createdump.exe — T1003.001",
        is_sqldumper=1,       "SQL Server SQLDumper — T1003.001",
        is_werfault_abuse=1,  "WerFault.exe abuse — T1218 + T1003.001",
        1==1,                 "Unknown — requires review"
      )
    ``` Extract PID target from comsvcs.dll technique (PID is 2nd argument) ```
    | rex field=cmdline "MiniDump\s+(?P<target_pid>\d+)"
    ``` Classify ProcDump flags used ```
    | eval procdump_flags=case(
        match(cmdline_lower, "-ma"), "-ma (full minidump — highest severity)",
        match(cmdline_lower, "-mm"), "-mm (mini dump)",
        match(cmdline_lower, "-mk"), "-mk (kernel mini dump — bypass userland AV hooks)",
        match(cmdline_lower, "-r"),  "-r (clone — evades AV scan of lsass handle)",
        1==1,                        "flags unknown"
      )
    | eval parent_proc=coalesce(ParentProcessName, ParentImage)
    | stats
        min(_time) as first_seen,
        max(_time) as last_seen,
        count as execution_count,
        values(process) as dump_tool_path,
        values(cmdline) as full_commandline,
        values(dump_technique) as technique_used,
        values(procdump_flags) as procdump_flags_used,
        values(target_pid) as comsvcs_target_pid,
        values(User) as executing_user,
        values(parent_proc) as parent_process
        by host, ProcessId
    | eval mitre_technique="T1003.001"
    | eval mitre_tactic="Credential Access"
    | eval alert_name="ProcDump/LOLBAS LSASS Dump"
    | sort - first_seen
    | table first_seen, last_seen, host, executing_user, dump_tool_path,
            full_commandline, technique_used, procdump_flags_used,
            comsvcs_target_pid, parent_process,
            mitre_technique, mitre_tactic, alert_name

  schedule:
    cron: "*/5 * * * *"
    earliest: "-10m"
    latest: "now"
    window: "5m"
  throttle:
    field: "host,dump_tool_path"
    period: "4h"
  actions:
    - notable_event:
        rule_title: "LSASS Dump via $technique_used$ on $host$ by $executing_user$"
        rule_description: >
          $dump_tool_path$ was used on $host$ to dump LSASS memory using technique
          $technique_used$. Full command: $full_commandline$. This action creates
          an on-disk credential dump file. Isolate the host, identify the dump file
          location from the command line, and quarantine both the host and the dump file.
        severity: critical
        status: "new"
    - risk_analysis:
        risk_object: "host"
        risk_score: 90
        risk_message: "LSASS dump via $technique_used$ — T1003.001"
  false_positives:
    - description: >
        ProcDump is a legitimate Sysinternals tool widely used by admins and developers
        for application crash dump collection. False positives occur when ProcDump
        is used against non-LSASS processes. This rule specifically filters for lsass-related
        arguments so the FP rate is low when targeting lsass by name.
      tuning: "Check parent process — legitimate use typically originates from cmd.exe
               or PowerShell launched by an admin user. C2 execution typically has
               unusual parent processes (e.g., Office documents, web browsers, LOLBins)."
    - description: >
        comsvcs.dll MiniDump is sometimes used legitimately for .NET application crashes
        (not targeting LSASS). This rule requires the 'full' argument, which is the
        specific LSASS dump technique. Legitimate application dumps do not use 'full'.
      tuning: "Review target PID in comsvcs.dll MiniDump command — confirm it matches LSASS PID."
    - description: >
        Some monitoring platforms may invoke createdump.exe for .NET runtime diagnostics.
        Legitimate createdump invocations target the monitored application's PID, not lsass.
      tuning: "Validate that the PID in the createdump command corresponds to lsass.exe,
               not a .NET application. Correlate with Sysmon Event 10 for the same host."


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 5: Suspicious DLL Image Loaded into LSASS Process (Sysmon Event 7)
# ██████████████████████████████████████████████████████████████████████████████
#
#  Detects DLL injection or side-loading into LSASS, which can be used to run
#  credential extraction code within the LSASS security boundary. Attackers may
#  inject malicious DLLs into LSASS using:
#    - DLL injection via WriteProcessMemory + CreateRemoteThread
#    - Reflective DLL injection (no disk write)
#    - Security Support Provider (SSP) registration (HKLM\...\Security Packages)
#    - Authentication Package DLL registration
#    - Custom password filter DLL
#
#  This rule focuses on DLLs loaded into LSASS that:
#    1. Are not digitally signed (or have invalid/revoked signatures)
#    2. Are loaded from non-standard paths (temp dirs, user dirs, not System32)
#    3. Are not in the expected LSASS module list
#
#  Confidence  : MEDIUM-HIGH (75)
#  Severity    : CRITICAL
#  FP Rate     : Medium — some legitimate SSP DLLs and smart card middlewares may
#                load into LSASS from non-System32 paths. Requires tuning.
#  Data Source : sourcetype=XmlWinEventLog:Microsoft-Windows-Sysmon/Operational

rule_5_dll_loaded_into_lsass:
  name: "Suspicious DLL Loaded into LSASS — Potential SSP/DLL Injection (Sysmon Event 7)"
  description: >
    Detects Sysmon Event 7 (ImageLoad) where an unusual or unsigned DLL is loaded
    into the lsass.exe process address space. Adversaries can register malicious
    Security Support Provider (SSP) DLLs that persist across reboots and capture
    credentials on every authentication event. They can also inject DLLs at runtime
    to extract credentials from LSASS memory without creating a dump file, evading
    file-based detection. This rule flags DLLs loaded into LSASS from non-System32
    paths or with missing/unsigned code signatures as high-priority alerts.
  mitre:
    tactic: "Credential Access"
    technique: T1003.001
    technique_name: "OS Credential Dumping: LSASS Memory"
    related_techniques:
      - "T1547.005: Boot or Logon Autostart: Security Support Provider"
      - "T1055.001: Process Injection: Dynamic-link Library Injection"
      - "T1556.002: Modify Authentication Process: Password Filter DLL"
  severity: critical
  confidence: 75
  risk_score: 85
  kill_chain_phase: "Credential Access"
  data_sources:
    - "Sysmon Event 7 (ImageLoad) — requires Sysmon with LSASS ImageLoad monitoring"

  search: |
    index=wineventlog sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational"
        EventCode=7
    ``` Only DLLs loaded into LSASS ```
    | where lower(Image) LIKE "%\\lsass.exe"
    ``` Exclude expected System32 / SysWOW64 / known LSASS DLLs ```
    | where NOT match(lower(ImageLoaded),
        "(?i)(\\\\windows\\\\system32\\\\|\\\\windows\\\\syswow64\\\\|" +
        "\\\\program files\\\\windows defender\\\\|" +
        "\\\\program files\\\\crowdstrike\\\\|" +
        "\\\\program files\\\\carbon black\\\\|" +
        "\\\\program files\\\\sentinelone\\\\)")
    ``` Exclude Microsoft/signed system DLLs (Signed field from Sysmon) ```
    | where Signed="false" OR Signed="-" OR isnull(Signed)
    ``` Classify DLL source path risk ```
    | eval dll_path_risk=case(
        match(lower(ImageLoaded), "(?i)(\\\\temp\\\\|\\\\tmp\\\\)"),
            "CRITICAL — DLL from temp directory",
        match(lower(ImageLoaded), "(?i)(\\\\appdata\\\\|\\\\users\\\\)"),
            "CRITICAL — DLL from user profile directory",
        match(lower(ImageLoaded), "(?i)(\\\\programdata\\\\)"),
            "HIGH — DLL from ProgramData",
        match(lower(ImageLoaded), "(?i)(\\\\downloads\\\\|\\\\desktop\\\\)"),
            "CRITICAL — DLL from user download or desktop",
        match(lower(ImageLoaded), "(?i)(c:\\\\[^\\\\]+\.dll$)"),
            "CRITICAL — DLL from root of C:\\",
        Signed="false",
            "HIGH — Unsigned DLL in unexpected path",
        1==1,
            "MEDIUM — Non-system path DLL"
      )
    | stats
        min(_time) as load_time,
        values(ImageLoaded) as dll_path,
        values(dll_path_risk) as risk_classification,
        values(Signed) as is_signed,
        values(Signature) as signature_info,
        values(SignatureStatus) as sig_status,
        values(User) as context_user,
        count as load_count
        by host
    | eval mitre_technique="T1003.001,T1547.005,T1055.001"
    | eval mitre_tactic="Credential Access,Persistence"
    | eval alert_name="Suspicious DLL Loaded into LSASS"
    | sort - load_count
    | table load_time, host, context_user, dll_path, risk_classification,
            is_signed, signature_info, sig_status,
            mitre_technique, mitre_tactic, alert_name

  schedule:
    cron: "*/10 * * * *"
    earliest: "-15m"
    latest: "now"
    window: "10m"
  throttle:
    field: "host,dll_path"
    period: "24h"
  actions:
    - notable_event:
        rule_title: "Suspicious DLL in LSASS — $dll_path$ on $host$"
        rule_description: >
          An unsigned or unexpected DLL was loaded into lsass.exe on $host$.
          DLL: $dll_path$ — Risk: $risk_classification$.
          This may indicate DLL injection, SSP registration, or custom password filter
          persistence. The DLL may be capturing credentials on every authentication event.
          Collect and analyze the DLL binary immediately.
        severity: critical
        status: "new"
    - risk_analysis:
        risk_object: "host"
        risk_score: 85
        risk_message: "Unsigned DLL loaded into LSASS — T1003.001 + T1547.005"
  false_positives:
    - description: >
        Smart card middleware (SafeNet, Gemalto/Thales, Yubikey minidriver), biometric
        authentication DLLs, and custom corporate SSO DLLs may load into LSASS from
        non-System32 paths during normal authentication.
      tuning: "Allowlist specific DLL paths and file hashes confirmed as legitimate
               authentication middleware in your organization."
    - description: >
        Third-party MFA providers (Duo, Okta, PingID) install credential provider DLLs
        that load into LSASS. These are typically installed in Program Files and code-signed.
      tuning: "If third-party MFA DLLs appear, validate signature and add path to exclusion."


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 6: WDigest Registry Enable — Enabling Plaintext Password Storage in LSASS
# ██████████████████████████████████████████████████████████████████████████████
#
#  Adversaries re-enable WDigest authentication to force Windows to store plaintext
#  credentials in LSASS memory. WDigest was disabled by default from Windows 8.1 /
#  Server 2012 R2 onward. Re-enabling it requires only a registry write, then the
#  next user logon populates plaintext credentials in LSASS (accessible via Mimikatz
#  sekurlsa::wdigest). This is a pre-positioning technique — it modifies the registry
#  now so future authentications store plaintext credentials.
#
#  Registry key: HKLM\SYSTEM\CurrentControlSet\Control\SecurityProviders\WDigest
#  Value name  : UseLogonCredential
#  Value data  : 1 (enables plaintext storage), 0 (disables — secure default)
#
#  Detection logic:
#    - Sysmon Event 13 (RegistryValueSet)
#      OR Event 4657 (Registry Value Changed — requires Object Access auditing)
#    - Target: WDigest\UseLogonCredential = 1
#
#  Confidence  : HIGH (95)
#  Severity    : HIGH
#  FP Rate     : Very Low — no legitimate reason to set UseLogonCredential=1
#                in a modern environment. May appear in legacy app compatibility testing.

rule_6_wdigest_plaintext_enable:
  name: "WDigest Plaintext Credential Storage Enabled — T1112 Pre-positioning for T1003.001"
  description: >
    Detects modification of the WDigest registry key to re-enable plaintext credential
    storage in LSASS memory (UseLogonCredential = 1). This is a two-stage attack:
    the attacker first enables WDigest to ensure plaintext credentials are cached in
    LSASS on the next user logon, then runs Mimikatz sekurlsa::wdigest to extract them.
    This technique is detectable before credential extraction occurs. Any setting of
    UseLogonCredential=1 on Windows 8.1+ or Server 2012 R2+ is highly anomalous and
    should be treated as a confirmed attacker action.
  mitre:
    tactic: "Credential Access"
    technique: T1003.001
    technique_name: "OS Credential Dumping: LSASS Memory"
    related_techniques:
      - "T1112: Modify Registry (the registry modification itself)"
      - "T1059.001: PowerShell (common vehicle for the registry write)"
  severity: high
  confidence: 95
  risk_score: 90
  kill_chain_phase: "Credential Access"
  data_sources:
    - "Sysmon Event 13 (RegistryValueSet) — requires Sysmon registry monitoring"
    - "Windows Security Event 4657 (Registry Value Changed) — requires Object Access audit"

  search: |
    index=wineventlog
    (
      (sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational"
          EventCode=13
          TargetObject="*\\WDigest\\UseLogonCredential"
          Details="DWORD (0x00000001)")
      OR
      (sourcetype="XmlWinEventLog:Security"
          EventCode=4657
          ObjectName="*\\WDigest\\UseLogonCredential*"
          NewValue="*1*")
    )
    | eval detection_source=if(EventCode=13, "Sysmon Event 13 (RegistryValueSet)", "Security Event 4657")
    | eval actor=coalesce(User, SubjectAccountName)
    | eval process_setting=coalesce(Image, ProcessName)
    | eval registry_key=coalesce(TargetObject, ObjectName)
    | stats
        min(_time) as modification_time,
        values(detection_source) as data_source,
        values(registry_key) as registry_path,
        values(actor) as modifying_user,
        values(process_setting) as modifying_process,
        values(host) as affected_hosts,
        count as modification_count
        by host
    | eval mitre_technique="T1003.001,T1112"
    | eval mitre_tactic="Credential Access"
    | eval alert_name="WDigest Plaintext Credential Storage Enabled"
    | eval impact=">Next user logon will cache plaintext credentials in LSASS. " +
                  "Immediately re-disable UseLogonCredential=0 and force all " +
                  "interactive user logoffs to purge existing cached credentials."
    | table modification_time, host, modifying_user, modifying_process,
            registry_path, detection_source, impact,
            mitre_technique, mitre_tactic, alert_name

  schedule:
    cron: "*/5 * * * *"
    earliest: "-10m"
    latest: "now"
    window: "5m"
  throttle:
    field: "host"
    period: "4h"
  actions:
    - notable_event:
        rule_title: "WDigest Enabled on $host$ by $modifying_user$ — Plaintext Credentials at Risk"
        rule_description: >
          The WDigest UseLogonCredential registry value was set to 1 on $host$ by
          $modifying_user$ using $modifying_process$. This enables plaintext credential
          storage in LSASS memory. The next interactive user logon on this host will
          cache plaintext passwords accessible via Mimikatz sekurlsa::wdigest.
          Immediate action: (1) Set UseLogonCredential=0, (2) Log off all interactive
          users on this host, (3) Rotate passwords of users who have logged in since
          the modification time $modification_time$.
        severity: high
        status: "new"
    - risk_analysis:
        risk_object: "host"
        risk_score: 90
        risk_message: "WDigest re-enabled — plaintext credential staging — T1003.001 + T1112"
  false_positives:
    - description: >
        Legacy application compatibility testing or misconfigured application compatibility
        layers may set UseLogonCredential=1 on systems running very old software.
        This should be treated as a finding regardless — the setting should be documented
        and formally risk-accepted with compensating controls if legitimately required.
      tuning: "No suppression recommended. Treat every occurrence as an incident until proven otherwise."


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 7: SeDebugPrivilege Acquisition — Prerequisite for LSASS Access
# ██████████████████████████████████████████████████████████████████████████████
#
#  Mimikatz requires SeDebugPrivilege to access LSASS (via privilege::debug).
#  SeDebugPrivilege allows a process to read and write the memory of any process,
#  regardless of the security descriptor. This privilege is held by Administrators
#  by default but is not in their default token — it must be explicitly enabled.
#  Most legitimate admin tools do not require SeDebugPrivilege.
#
#  Detection: Event 4703 fires when a privilege is adjusted on a token.
#  SeDebugPrivilege in the "Enabled Privileges" field for a non-SYSTEM process
#  that is not a known administrative tool is highly suspicious.
#
#  Note: Event 4703 can be very noisy in some environments. Deploy cautiously.
#  This rule filters for user-context processes (not SYSTEM) enabling SeDebugPrivilege.
#
#  Confidence  : MEDIUM (72)
#  Severity    : HIGH
#  FP Rate     : Medium — some legitimate admin tools and performance monitors require
#                SeDebugPrivilege. Filter by known-good process names.

rule_7_sedebugprivilege_acquired:
  name: "SeDebugPrivilege Acquired by Non-System Process — Mimikatz Precursor (Event 4703)"
  description: >
    Detects Event 4703 (Token Right Adjusted) where SeDebugPrivilege is enabled
    for a non-SYSTEM, non-known-admin-tool process. SeDebugPrivilege is required
    by Mimikatz (privilege::debug command) before accessing LSASS. It is also used
    by process injection techniques. Legitimate enablement is rare outside of
    debuggers (Visual Studio, WinDbg) and performance monitoring tools. Any
    unexpected process acquiring SeDebugPrivilege should be correlated with
    concurrent LSASS access events (Rule 1) and process dump file creation (Rule 2).
  mitre:
    tactic: "Privilege Escalation"
    technique: T1134.001
    technique_name: "Access Token Manipulation: Token Impersonation/Theft"
    related_techniques:
      - "T1003.001: OS Credential Dumping: LSASS Memory (primary goal after privilege gain)"
      - "T1134: Access Token Manipulation"
  severity: high
  confidence: 72
  risk_score: 75
  kill_chain_phase: "Privilege Escalation / Credential Access"
  data_sources:
    - "Windows Security Event Log — Event 4703 (Token Right Adjusted)"

  search: |
    index=wineventlog sourcetype="XmlWinEventLog:Security" EventCode=4703
    ``` Only events where SeDebugPrivilege was ENABLED (not just present in token) ```
    | where match(EnabledPrivileges, "(?i)SeDebugPrivilege")
    ``` Exclude SYSTEM account — many system services legitimately use SeDebugPrivilege ```
    | where SubjectAccountName!="SYSTEM" AND SubjectAccountName!="-"
    ``` Exclude known-legitimate debuggers and performance tools ```
    | where NOT match(lower(ProcessName),
        "(?i)(devenv\.exe|windbg\.exe|cdb\.exe|ntsd\.exe|" +
        "perfmon\.exe|wpa\.exe|vsdebuggingconsole|vstest|" +
        "msseces\.exe|msmpeng\.exe|svchost\.exe|lsaiso\.exe|" +
        "taskhost\.exe|taskhostw\.exe|conhost\.exe)")
    ``` Exclude machine accounts ```
    | where NOT match(SubjectAccountName, "\\$$")
    | eval actor=SubjectAccountName + "@" + SubjectDomainName
    | stats
        min(_time) as first_seen,
        max(_time) as last_seen,
        count as privilege_grant_count,
        values(ProcessName) as process_acquiring_privilege,
        values(ProcessId) as process_ids,
        values(actor) as users_involved,
        dc(ProcessName) as unique_processes
        by host
    | eval mitre_technique="T1134.001,T1003.001"
    | eval mitre_tactic="Privilege Escalation,Credential Access"
    | eval alert_name="SeDebugPrivilege Acquired"
    | eval correlation_advice="Correlate with: EventCode=10 (Sysmon LSASS access) and EventCode=11 (dump file creation) on the same host within 5 minutes"
    | table first_seen, last_seen, host, users_involved, process_acquiring_privilege,
            process_ids, unique_processes, correlation_advice,
            mitre_technique, mitre_tactic, alert_name

  schedule:
    cron: "*/10 * * * *"
    earliest: "-15m"
    latest: "now"
    window: "10m"
  throttle:
    field: "host,users_involved"
    period: "4h"
  actions:
    - notable_event:
        rule_title: "SeDebugPrivilege Acquired — $process_acquiring_privilege$ on $host$"
        rule_description: >
          $process_acquiring_privilege$ acquired SeDebugPrivilege on $host$ by $users_involved$.
          This privilege is a prerequisite for Mimikatz LSASS access (privilege::debug).
          Correlate with Sysmon Event 10 (LSASS ProcessAccess) and Event 11 (dump file creation)
          on the same host. If correlated, escalate to CRITICAL immediately.
        severity: high
        status: "new"
    - risk_analysis:
        risk_object: "host"
        risk_score: 75
        risk_message: "SeDebugPrivilege acquired by $process_acquiring_privilege$ — T1134.001"
  false_positives:
    - description: >
        Legitimate debuggers (Visual Studio devenv.exe, WinDbg windbg.exe, cdb.exe)
        acquire SeDebugPrivilege during normal debugging sessions. These are excluded.
      tuning: "Add additional debugger process names specific to your environment."
    - description: >
        Some monitoring and APM agents (Dynatrace, AppDynamics, New Relic) use
        SeDebugPrivilege for code injection-based instrumentation.
      tuning: "Identify monitoring agent process names and add to exclusion list."


# ██████████████████████████████████████████████████████████████████████████████
#  INVESTIGATION QUERIES
# ██████████████████████████████████████████████████████████████████████████████
#
#  Run these manually during active incident response to scope the attack,
#  identify credentials at risk, and trace attacker activity.

investigation_queries:

  iq_1_full_lsass_timeline:
    name: "IQ-1: Full LSASS Dumping Timeline for Host"
    description: >
      Reconstruct a complete timeline of all LSASS-related events on a target host:
      process access (Sysmon 10), dump file creation (Sysmon 11), process creation
      for dump tools (Event 4688/Sysmon 1), PowerShell execution (Event 4104),
      registry modifications (Sysmon 13), and post-dump authentication events
      (Event 4624/4625/4648 — Pass-the-Hash indicators).
    query: |
      ``` Replace $TARGET_HOST$ with the host name under investigation ```
      index=wineventlog host="$TARGET_HOST$"
      (
        (sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational"
            EventCode IN (1, 7, 10, 11, 13))
        OR
        (sourcetype="XmlWinEventLog:Security"
            EventCode IN (4688, 4703, 4624, 4625, 4648, 4657))
        OR
        (sourcetype="XmlWinEventLog:Microsoft-Windows-PowerShell/Operational"
            EventCode=4104)
      )
      | eval event_description=case(
          EventCode=10,  "Sysmon: LSASS ProcessAccess — " + coalesce(SourceImage,"?") + " granted " + coalesce(GrantedAccess,"?"),
          EventCode=11,  "Sysmon: File Created — " + coalesce(TargetFilename,"?"),
          EventCode=1,   "Sysmon: Process Created — " + coalesce(Image,"?") + " " + coalesce(CommandLine,""),
          EventCode=7,   "Sysmon: DLL Loaded — " + coalesce(ImageLoaded,"?") + " into " + coalesce(Image,"?"),
          EventCode=13,  "Sysmon: Registry Set — " + coalesce(TargetObject,"?") + " = " + coalesce(Details,"?"),
          EventCode=4688,"Security: Process Created — " + coalesce(NewProcessName,"?") + " " + coalesce(CommandLine,""),
          EventCode=4703,"Security: Token Privilege — " + coalesce(EnabledPrivileges,"?"),
          EventCode=4624,"Security: Logon — Type " + coalesce(LogonType,"?") + " by " + coalesce(TargetAccountName,"?"),
          EventCode=4625,"Security: FAILED Logon — " + coalesce(TargetAccountName,"?"),
          EventCode=4648,"Security: Explicit Credentials Logon — " + coalesce(TargetAccountName,"?") + " from " + coalesce(IpAddress,"?"),
          EventCode=4104,"PowerShell ScriptBlock — " + substr(coalesce(ScriptBlockText,""),1,200),
          EventCode=4657,"Security: Registry Modified — " + coalesce(ObjectName,"?")
        )
      | table _time, EventCode, event_description, user, host
      | sort _time
      | rename _time as timestamp

  iq_2_lsass_access_scope:
    name: "IQ-2: LSASS Access Scope — All Hosts and Processes with Recent Dump Access"
    description: >
      Identify all hosts and processes that have accessed LSASS with memory-read
      permissions in the last 24 hours. Used to determine blast radius — how many
      hosts may have credential material extracted.
    query: |
      index=wineventlog
          sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational"
          EventCode=10
          earliest=-24h
      | where lower(TargetImage) LIKE "%\\lsass.exe"
      | eval granted_dec=tonumber(GrantedAccess, 16)
      ``` Filter for memory-read capable access ```
      | where granted_dec>=16 AND granted_dec!=4096 AND granted_dec!=1024
      | where NOT match(lower(SourceImage),
          "(?i)(MsMpEng|csagent\.exe|senseir|sensece|lsaiso\.exe|wininit\.exe|csrss\.exe|sysmon)")
      | stats
          count as lsass_access_count,
          dc(SourceImage) as unique_accessing_processes,
          values(SourceImage) as accessing_processes,
          values(GrantedAccess) as granted_access_values,
          values(SourceUser) as users,
          min(_time) as earliest_access,
          max(_time) as latest_access
          by host
      | sort - lsass_access_count
      | table host, users, lsass_access_count, unique_accessing_processes,
              accessing_processes, granted_access_values, earliest_access, latest_access

  iq_3_dump_files_on_disk:
    name: "IQ-3: All Dump Files Created in Last 7 Days — Exfiltration Risk Assessment"
    description: >
      Find all .dmp files created across all monitored endpoints in the past 7 days.
      Used during incident response to find dump files that may not have been immediately
      deleted by the attacker, which could still be on disk for forensic recovery.
    query: |
      index=wineventlog
          sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational"
          EventCode=11
          earliest=-7d
      | where match(lower(TargetFilename), "\.(dmp|mdmp|hdmp)$")
      ``` Exclude crash dump directories ```
      | where NOT match(lower(TargetFilename),
          "(?i)(\\\\windows\\\\livekernelreports\\\\|\\\\windows\\\\minidump\\\\|" +
          "\\\\windows\\\\memory\.dmp)")
      | stats
          count as dump_count,
          values(TargetFilename) as dump_file_paths,
          values(Image) as creating_processes,
          values(User) as creating_users,
          min(_time) as first_dump,
          max(_time) as last_dump
          by host
      | sort - dump_count
      | table host, dump_count, dump_file_paths, creating_processes,
              creating_users, first_dump, last_dump

  iq_4_pth_indicators_post_dump:
    name: "IQ-4: Pass-the-Hash Indicators After LSASS Dump — Lateral Movement Detection"
    description: >
      After LSASS is dumped, attackers use extracted NTLM hashes for Pass-the-Hash (PtH)
      lateral movement. PtH shows a specific pattern: Event 4624 with LogonType=3 (network)
      and Authentication Package=NTLM, where the target system is not the same as the
      source. High volume of NTLM Type 3 logons from the source host after an LSASS dump
      event indicates PtH lateral movement.
      Replace $DUMP_HOST$ with the compromised host identified in the investigation.
    query: |
      index=wineventlog sourcetype="XmlWinEventLog:Security" EventCode=4624
          LogonType=3
          AuthenticationPackageName="NTLM"
          earliest=-24h
      ``` Look for logons originating from the compromised host ```
      | where match(IpAddress, "(?i)($DUMP_HOST_IP$)")
         OR WorkstationName="$DUMP_HOST$"
      ``` Exclude legitimate NTLM logons (file shares, printers) if needed ```
      | where SubjectAccountName!="-"
      | stats
          count as logon_count,
          dc(TargetAccountName) as unique_accounts,
          values(TargetAccountName) as targeted_accounts,
          dc(Computer) as unique_targets,
          values(Computer) as target_hosts,
          values(IpAddress) as source_ips,
          min(_time) as first_seen,
          max(_time) as last_seen
          by WorkstationName
      | sort - logon_count
      | eval pth_risk=if(logon_count > 5 AND unique_targets > 2,
          "HIGH — multiple targets from single source (lateral movement pattern)",
          "MEDIUM — investigate further")
      | table WorkstationName, logon_count, unique_accounts, targeted_accounts,
              unique_targets, target_hosts, pth_risk, first_seen, last_seen

  iq_5_lsass_kill_chain:
    name: "IQ-5: Full LSASS Attack Kill Chain — From Privilege Gain to Post-Exploitation"
    description: >
      Correlates the complete LSASS dumping kill chain across all event sources:
      Phase 1: SeDebugPrivilege acquisition
      Phase 2: LSASS process access (Sysmon Event 10)
      Phase 3: Dump file creation (Sysmon Event 11)
      Phase 4: WDigest registry modification (pre-dump staging)
      Phase 5: Suspicious tool execution (mimikatz, procdump, rundll32+comsvcs)
      Phase 6: Post-dump lateral movement (NTLM Type 3 logons, new process spawning)
    query: |
      ``` Phase 1: SeDebugPrivilege ```
      (index=wineventlog sourcetype="XmlWinEventLog:Security" EventCode=4703
          | where match(EnabledPrivileges, "SeDebugPrivilege")
          | where SubjectAccountName!="SYSTEM"
          | eval kill_chain_phase="Phase 1: SeDebugPrivilege Acquired"
          | eval actor=SubjectAccountName | eval detail=ProcessName)
      ``` Phase 2: LSASS memory access ```
      | append [
          index=wineventlog sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational"
              EventCode=10
          | where lower(TargetImage) LIKE "%\\lsass.exe"
          | eval kill_chain_phase="Phase 2: LSASS Memory Access"
          | eval actor=SourceUser | eval detail="GrantedAccess=" + GrantedAccess + " by " + SourceImage
      ]
      ``` Phase 3: Dump file written ```
      | append [
          index=wineventlog sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational"
              EventCode=11
          | where match(lower(TargetFilename), "\.(dmp|mdmp)$")
          | where NOT match(lower(TargetFilename), "(?i)(\\\\windows\\\\(livekernelreports|minidump|memory\.dmp))")
          | eval kill_chain_phase="Phase 3: Dump File Created"
          | eval actor=User | eval detail="File: " + TargetFilename
      ]
      ``` Phase 4: WDigest enabled ```
      | append [
          index=wineventlog sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational"
              EventCode=13
          | where TargetObject LIKE "*WDigest*UseLogonCredential*"
          | eval kill_chain_phase="Phase 4: WDigest Plaintext Enabled"
          | eval actor=User | eval detail=TargetObject + " = " + Details
      ]
      ``` Phase 5: Tool execution ```
      | append [
          index=wineventlog EventCode IN (4688, 1)
          | where match(lower(coalesce(CommandLine,"")),
              "(?i)(sekurlsa::|lsadump::|mimikatz|procdump.*lsass|comsvcs.*minidump|invoke-mimikatz)")
          | eval kill_chain_phase="Phase 5: Credential Dump Tool Execution"
          | eval actor=coalesce(SubjectAccountName, User)
          | eval detail=coalesce(CommandLine, "")
      ]
      | stats
          min(_time) as phase_time,
          values(kill_chain_phase) as kill_chain_phases,
          values(detail) as phase_details,
          values(actor) as actors
          by host
      | sort phase_time
      | table phase_time, host, kill_chain_phases, phase_details, actors


# ██████████████████████████████████████████████████████████████████████████████
#  INCIDENT RESPONSE PLAYBOOK
# ██████████████████████████████████████████████████████████████████████████████

incident_response_playbook:
  name: "LSASS Credential Dumping — Incident Response Playbook"
  version: "1.0.0"
  last_updated: "2026-03-04"

  phase_1_triage:
    timeframe: "0–15 minutes"
    objective: "Confirm the alert, scope the incident, and preserve evidence"
    steps:
      - step: "Verify alert is not a false positive"
        actions:
          - "Check if GrantedAccess value is in the known-legitimate allowlist"
          - "Verify the accessing process (SourceImage) is not a known EDR/AV agent"
          - "Check if an authorized red team exercise or pentest is in progress"
          - "Validate dump file path — WER legitimate paths are C:\\Windows\\LiveKernelReports"
          - "Confirm process creation parent chain (what spawned the dump tool?)"
      - step: "Identify the scope"
        actions:
          - "Run IQ-2 (LSASS Access Scope) to find all affected hosts"
          - "Run IQ-3 (Dump Files on Disk) to identify dump files still present"
          - "Identify the user account associated with the dump process"
          - "Determine if the source process was spawned by a C2 implant or LOLBin chain"
      - step: "Preserve evidence before containment"
        actions:
          - "Snapshot Splunk events for the affected host with 30-minute window"
          - "Export Sysmon EventCode 10 CallTrace field — it shows the exact call stack"
          - "Collect the dump file (if still present) for offline analysis"
          - "Collect process memory of the accessing process (volatile — do first)"
          - "Capture network connections from the host (post-dump exfiltration check)"

  phase_2_containment:
    timeframe: "15–45 minutes"
    objective: "Stop ongoing credential exposure and prevent lateral movement"
    steps:
      - step: "Isolate the compromised host"
        actions:
          - "Network-isolate the host via EDR (CrowdStrike Contain, Defender Isolation)"
          - "Disable host's Active Directory computer account if network isolation is not possible"
          - "Do NOT reboot — volatile memory evidence will be lost"
          - "Block the host IP at the perimeter firewall to prevent C2 callbacks"
      - step: "Disable the actor's user account"
        actions:
          - "Disable the AD account of the user who executed the dump tool"
          - "Revoke all active Kerberos TGTs for that user (klist purge via DC)"
          - "Reset the user's AD password (prevents existing hashes from working)"
          - "Force sign-out of all active sessions for that user"
      - step: "Quarantine dump files"
        actions:
          - "Delete or quarantine the .dmp file from disk"
          - "Check for compressed archives or network shares where the dump may have been copied"
          - "Search file share logs for the dump filename or large binary transfers"

  phase_3_investigation:
    timeframe: "45 minutes – 4 hours"
    objective: "Determine what was extracted and how the attacker got in"
    steps:
      - step: "Assess credentials at risk"
        actions:
          - "Identify all users who were interactively logged on to the affected host at the time of the dump (Event 4624 LogonType 2/10 in preceding 8 hours)"
          - "These users' NTLM hashes and Kerberos tickets are compromised"
          - "If WDigest was enabled (Rule 6 fired), plaintext passwords are also compromised"
          - "Check if any privileged accounts (Domain Admin, Enterprise Admin, service accounts) were logged on"
      - step: "Determine initial access vector"
        actions:
          - "Trace the parent process chain of the dump tool back to initial access"
          - "Common chains: phishing email > Office macro > powershell > C2 > mimikatz"
          - "Check browser history, email attachments, and recent file downloads on the host"
          - "Review web proxy logs for C2 communication (beacon patterns, large POST requests)"
          - "Check if a C2 implant (Cobalt Strike beacon, Metasploit meterpreter) was running"
      - step: "Check for lateral movement"
        actions:
          - "Run IQ-4 (Pass-the-Hash Indicators) using the compromised host IP"
          - "Check for NTLM Type 3 logons from the host to other systems"
          - "Review all 4648 (Explicit Credentials) events from the host after dump time"
          - "Check for new service creation, scheduled tasks, and WMI subscriptions across the domain"
          - "Review DCSync events (Event 4662 — DS-Replication-Get-Changes-All) if hashes included privileged accounts"

  phase_4_remediation:
    timeframe: "4–48 hours"
    objective: "Reset all compromised credentials and eliminate attacker persistence"
    steps:
      - step: "Credential rotation (prioritized by risk)"
        actions:
          - "Priority 1: Domain Admin accounts logged on to dumped host"
          - "Priority 2: Enterprise Admin, Schema Admin accounts"
          - "Priority 3: Service accounts with SPN (Kerberoastable)"
          - "Priority 4: All standard user accounts logged on to the host"
          - "Reset KRBTGT password twice (24-hour interval) if Golden Ticket is suspected"
          - "Rotate all service account passwords where the account was logged on to the host"
      - step: "Enable LSASS protection mechanisms"
        actions:
          - "Enable LSASS Protected Process Light (PPL):"
          - "  reg add HKLM\\SYSTEM\\CurrentControlSet\\Control\\Lsa /v RunAsPPL /t REG_DWORD /d 1"
          - "  (requires reboot; prevents non-PPL processes from accessing LSASS memory)"
          - "Enable Windows Defender Credential Guard (virtualization-based isolation):"
          - "  Group Policy: Computer Configuration > Admin Templates > System > Device Guard"
          - "  > Turn On Virtualization Based Security > Credential Guard: Enabled with UEFI lock"
          - "Disable WDigest permanently via GPO:"
          - "  HKLM\\SYSTEM\\CurrentControlSet\\Control\\SecurityProviders\\WDigest\\UseLogonCredential = 0"
          - "Enable Windows Defender Attack Surface Reduction (ASR) rule:"
          - "  Rule ID: 9e6c4e1f-7d60-472f-ba1a-a39ef669e4b0 (Block credential stealing from LSASS)"
      - step: "Remove attacker persistence"
        actions:
          - "Check for SSP DLL registrations (HKLM\\SYSTEM\\CurrentControlSet\\Control\\Lsa\\Security Packages)"
          - "Check for Authentication Package DLL registrations (Authentication Packages key)"
          - "Check for Custom Password Filter DLL (Notification Packages key)"
          - "Review all scheduled tasks, services, and registry run keys on the host"
          - "Check WMI subscriptions for persistence (__EventFilter, __EventConsumer)"
          - "Rebuild the host if a C2 implant with kernel driver is suspected"

  phase_5_post_incident:
    timeframe: "Ongoing — 1 week to 1 month"
    objective: "Improve detection and prevent recurrence"
    steps:
      - step: "Detection tuning"
        actions:
          - "Review CallTrace fields from Sysmon Event 10 — add new legitimate callers to allowlist"
          - "Tune Rule 1 GrantedAccess thresholds based on what EDR/AV tools generate in your environment"
          - "Validate Rule 7 (SeDebugPrivilege) is not generating excessive noise from monitoring tools"
          - "Enable Microsoft Defender for Identity LSASS credential dumping alerts for cross-validation"
      - step: "Architecture improvements"
        actions:
          - "Evaluate tiered AD administration model (Tier 0/1/2) to limit privileged account exposure"
          - "Implement Privileged Access Workstations (PAWs) for all Tier 0 admin operations"
          - "Enable gMSA (Group Managed Service Accounts) for all service accounts to prevent hash extraction"
          - "Restrict local admin rights across endpoints to reduce LSASS access capability"
          - "Enable Just-in-Time (JIT) admin access via Microsoft Identity Manager or CyberArk"
      - step: "Threat hunting"
        actions:
          - "Hunt for Sysmon Event 10 across all endpoints in the last 30 days"
          - "Search for .dmp files in all user-writable paths across the environment"
          - "Review all NTLM Type 3 logon patterns for beaconing or Pass-the-Hash sequences"
          - "Check all domain service accounts for indicators of offline hash cracking (password changes in off-hours)"
