# ==============================================================================
#  OS Credential Dumping — Full Attack Chain (MITRE T1003)
#  Splunk Correlation Rules
# ==============================================================================
#  Description : End-to-end detection for OS Credential Dumping (MITRE T1003)
#                covering the credential-theft sub-techniques and the surrounding
#                attack chain (precursor -> dump -> staging -> correlation).
#
#                This file COMPLETES the T1003 coverage in this category. The
#                memory- and DC-specific sub-techniques are detected in their own
#                dedicated files — this file covers the remaining registry/secret
#                stores plus the cross-cutting tooling and kill-chain correlation:
#
#                  COVERED HERE:
#                    T1003.002  Security Account Manager (SAM) registry hive
#                    T1003.004  LSA Secrets
#                    T1003.005  Cached Domain Credentials (DCC2 / mscash)
#                    + registry-hive theft (reg save / esentutl / VSS / diskshadow)
#                    + Impacket secretsdump / CrackMapExec / nxc remote dumping
#                    + Mimikatz lsadump:: module family
#                    + DPAPI master-key / Windows Credential Manager theft
#                    + credential-dumping tool transfer/execution
#                    + a multi-stage credential-dumping kill-chain correlation
#
#                  COVERED IN COMPANION FILES (do not duplicate):
#                    T1003.001  LSASS Memory   -> lsass_credential_dumping_detection.yml
#                    T1003.003  NTDS.dit       -> ntds_dit_extraction_detection.yml
#                    T1003.006  DCSync         -> dcsync_attack_detection.yml
#                    T1003.007/.008 (Linux /proc, /etc/shadow)
#                                              -> ../rhel_linux/rhel_credential_access_detection.yml
#
#                The SAM, SECURITY, and SYSTEM registry hives hold local account
#                NTLM hashes (SAM), LSA secrets incl. service-account passwords and
#                machine account creds (SECURITY\Policy\Secrets), and cached domain
#                logon verifiers (SECURITY\Cache). The SYSTEM hive holds the boot
#                key needed to decrypt them. Stealing all three offline yields
#                credentials without ever touching lsass.exe.
#
#  MITRE ATT&CK: T1003.002 (SAM), T1003.004 (LSA Secrets),
#                T1003.005 (Cached Domain Credentials), T1003 (parent),
#                T1555.004 (Windows Credential Manager), T1552.001 (Creds in Files),
#                T1136 (precursor priv), T1074.001 (Local Data Staging),
#                T1021.002 (SMB/Admin Shares — remote dumping)
#  Kill Chain   : Privilege Escalation -> Credential Access -> Collection -> Lateral Movement
#  Platform     : Splunk Enterprise / Splunk Cloud (ES compatible)
#  Author       : Krishnendu
#  Version      : 1.0.0
#  Created      : 2026-06-11
#  License      : MIT
# ==============================================================================
#
#  PREREQUISITES:
#
#  1. Advanced Audit Policy on all hosts:
#     - Detailed Tracking > "Audit Process Creation" -> Success (+ command line)
#     - Object Access > "Audit File System" -> Success (for Rule 3 SACL)
#     - Privilege Use > "Audit Sensitive Privilege Use" -> Success (4673, Rule 10)
#     - Account Management / DS events for service creation (7045, 4697)
#  2. Command-line logging in process creation events (GPO).
#  3. PowerShell Script Block Logging (Event 4104).
#  4. Sysmon with ProcessCreate (1), FileCreate (11), RegistryValueSet (13).
#  5. SACL for Rule 3 — audit Read on the on-disk hives:
#       %SystemRoot%\System32\config\SAM  and  ...\config\SECURITY
#     (these files are locked at runtime; access usually occurs via VSS copies —
#      Rule 2 covers the VSS path, Rule 3 covers direct/offline access).
#  6. Forward to Splunk:
#       sourcetype=XmlWinEventLog:Security
#       sourcetype=XmlWinEventLog:Microsoft-Windows-Sysmon/Operational
#       sourcetype=XmlWinEventLog:Microsoft-Windows-PowerShell/Operational
#  7. Lookup tables:
#       - credential_dumping_tools.csv  (sha256, tool)
#       - cred_dump_admin_allowlist.csv (host, account)  # optional FP tuning
#
# ==============================================================================
#
#  IOC / SIGNATURE REFERENCE
#
#  Registry hive theft:
#    reg save hklm\sam C:\temp\sam.save        reg save hklm\system ...
#    reg save hklm\security ...                reg export ...
#    esentutl.exe /y /vss C:\...\config\SAM /d C:\temp\sam
#    vssadmin create shadow /for=C:  +  copy \\?\GLOBALROOT\...\config\SAM
#    diskshadow.exe /s script.txt  (expose + copy hives)
#  Mimikatz:   lsadump::sam   lsadump::secrets   lsadump::cache   lsadump::lsa
#  Impacket:   secretsdump.py  (-sam -security -system | -just-dc | smbexec/wmiexec)
#              service output: %COMSPEC% /Q /c echo ... \\127.0.0.1\ADMIN$\__<ts> 2>&1
#  CrackMapExec / nxc:  --sam  --lsa  --ntds
#  DPAPI/Vault: dpapi::masterkey  vault::cred  vaultcmd /list  SharpDPAPI
#               %APPDATA%\Microsoft\Protect\   %LOCALAPPDATA%\Microsoft\Credentials\
#  Staging artifacts:  sam.save  security.save  system.save  *.hive  hashes.txt
#                      secrets.txt  cache.txt  *.dmp/.mdmp
#  Tools: secretsdump, mimikatz, pwdump, fgdump, gsecdump, samdump2, cachedump,
#         lazagne, creddump7, SharpDPAPI, nanodump, dumpert, lsassy
#
# ==============================================================================


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 1: SAM/SECURITY/SYSTEM Registry Hive Dump via reg.exe save/export
# ██████████████████████████████████████████████████████████████████████████████
#
#  The simplest credential-store theft: reg.exe saves the SAM (local hashes),
#  SECURITY (LSA secrets, cached creds), and SYSTEM (boot key) hives to disk for
#  offline extraction with secretsdump/mimikatz. Near-zero legitimate use.
#
#  Confidence : 92   Severity : critical   FP Rate : Very low

rule_1_reg_hive_save:
  name: "Credential Dumping — SAM/SECURITY/SYSTEM Registry Hive Saved (reg.exe)"
  description: >
    Detects reg.exe (or reg save/export command lines) writing the HKLM\SAM,
    HKLM\SECURITY, or HKLM\SYSTEM registry hives to a file. Attackers exfiltrate
    these three hives and decrypt them offline: SAM yields local NTLM hashes,
    SECURITY yields LSA secrets and cached domain credentials, and SYSTEM yields
    the boot key required to decrypt both. Saving the boot-protected hives is a
    near-certain indicator of credential theft (T1003.002 / T1003.004 / T1003.005).
  mitre:
    tactic: "Credential Access"
    technique: T1003.002
    technique_name: "OS Credential Dumping: Security Account Manager"
    related_techniques:
      - "T1003.004: LSA Secrets (SECURITY hive)"
      - "T1003.005: Cached Domain Credentials (SECURITY\\Cache)"
      - "T1552.001: Unsecured Credentials: Credentials In Files"
  severity: critical
  confidence: 92
  risk_score: 95
  kill_chain_phase: "Credential Access"
  data_sources:
    - "Windows Security 4688 (process creation w/ command line) and/or Sysmon Event 1"
  search: |
    index=wineventlog (sourcetype="XmlWinEventLog:Security" OR sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational")
        (EventCode=1 OR EventCode=4688)
    | eval cmd=lower(coalesce(CommandLine, Process_Command_Line))
    | eval img=lower(coalesce(Image, New_Process_Name))
    ``` reg.exe (or any process) saving/exporting the boot-protected hives ```
    | where (match(img, "\\\\reg\.exe$") OR match(cmd, "\breg(\.exe)?\b"))
        AND match(cmd, "\b(save|export)\b")
        AND match(cmd, "(hklm|hkey_local_machine|\\\\registry\\\\machine)\\\\(sam|security|system)\b")
    | eval hive=case(match(cmd,"\\\\sam\b"),"SAM",match(cmd,"\\\\security\b"),"SECURITY",match(cmd,"\\\\system\b"),"SYSTEM",true(),"?")
    | stats min(_time) as first_seen, max(_time) as last_seen, count,
        values(hive) as hives, values(cmd) as command_lines,
        values(ParentImage) as parent_process, values(User) as user by host
    | eval mitre_technique="T1003.002", alert_name="Registry Hive Saved for Credential Theft"
    | table first_seen, last_seen, host, user, parent_process, hives, command_lines, count, mitre_technique, alert_name
  schedule:
    cron: "*/5 * * * *"
    earliest: "-10m"
    latest: "now"
    window: "5m"
  throttle:
    field: "host"
    period: "1h"
  actions:
    - notable_event:
        rule_title: "Credential Dumping — $hives$ hive(s) saved on $host$ by $user$"
        rule_description: >
          reg.exe saved the boot-protected $hives$ hive(s) to disk on $host$.
          These hives are decrypted offline to recover local NTLM hashes, LSA
          secrets, and cached domain credentials. Treat as active credential theft.
        severity: critical
        status: "new"
    - risk_analysis:
        risk_object: "host"
        risk_score: 95
        risk_message: "Registry hive save for credential theft — T1003.002"
  false_positives:
    - description: >
        Backup/migration tooling or DFIR collection scripts may legitimately
        export registry hives.
      tuning: "Allowlist the specific backup/forensic host + account via cred_dump_admin_allowlist.csv and validate against change windows"


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 2: Registry Hive Theft via VSS / esentutl / diskshadow
# ██████████████████████████████████████████████████████████████████████████████
#
#  Because SAM/SECURITY/SYSTEM are locked at runtime, attackers copy them out of a
#  Volume Shadow Copy (or with esentutl /vss). This rule is scoped to those hives;
#  NTDS.dit shadow-copy theft is handled by ntds_dit_extraction_detection.yml.
#
#  Confidence : 85   Severity : critical   FP Rate : Low

rule_2_hive_theft_via_vss:
  name: "Credential Dumping — SAM/SECURITY Hive Copied from Shadow Copy (VSS/esentutl)"
  description: >
    Detects extraction of the locked SAM/SECURITY/SYSTEM registry hives via a
    Volume Shadow Copy or esentutl /vss — copying \\?\GLOBALROOT\...\config\SAM,
    running "esentutl /y /vss ...\config\SAM", or a diskshadow script that exposes
    and copies the hives. This bypasses the runtime file lock to steal the
    credential stores for offline cracking. NTDS.dit theft is detected separately.
  mitre:
    tactic: "Credential Access"
    technique: T1003.002
    technique_name: "OS Credential Dumping: Security Account Manager"
    related_techniques:
      - "T1006: Direct Volume Access"
      - "T1003.004: LSA Secrets"
  severity: critical
  confidence: 85
  risk_score: 90
  kill_chain_phase: "Credential Access"
  data_sources:
    - "Windows Security 4688 / Sysmon Event 1 / PowerShell 4104"
  search: |
    index=wineventlog (sourcetype="XmlWinEventLog:Security" OR sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational" OR sourcetype="XmlWinEventLog:Microsoft-Windows-PowerShell/Operational")
        (EventCode=1 OR EventCode=4688 OR EventCode=4104)
    | eval cmd=lower(coalesce(CommandLine, Process_Command_Line, ScriptBlockText))
    | eval method=case(
        match(cmd, "esentutl.*(/y|/vss).*config\\\\(sam|security|system)"), "ESENTUTL_VSS",
        match(cmd, "(copy|cp|copy-item).*globalroot.*\\\\config\\\\(sam|security|system)"), "VSS_GLOBALROOT_COPY",
        match(cmd, "(copy|cp|copy-item).*harddiskvolumeshadowcopy.*\\\\config\\\\(sam|security|system)"), "VSS_SHADOW_COPY",
        match(cmd, "diskshadow") AND match(cmd, "(expose|create|\\\\config\\\\)"), "DISKSHADOW_SCRIPT",
        match(cmd, "(invoke-ninjacopy|copy-vss).*(sam|security|system)"), "NINJACOPY_HIVE",
        true(), null())
    | where isnotnull(method) AND NOT match(cmd, "ntds")
    | stats min(_time) as first_seen, max(_time) as last_seen, count,
        values(method) as methods, values(cmd) as command_lines,
        values(Image) as process, values(User) as user by host
    | eval mitre_technique="T1003.002", alert_name="Registry Hive Theft via Shadow Copy"
    | table first_seen, last_seen, host, user, process, methods, command_lines, count, mitre_technique, alert_name
  schedule:
    cron: "*/5 * * * *"
    earliest: "-10m"
    latest: "now"
    window: "5m"
  throttle:
    field: "host"
    period: "1h"
  actions:
    - notable_event:
        rule_title: "Credential Dumping — registry hive copied from shadow copy on $host$ ($methods$)"
        rule_description: >
          The locked SAM/SECURITY/SYSTEM hive(s) were copied out of a Volume Shadow
          Copy on $host$ via $methods$. This is offline credential-store theft.
        severity: critical
        status: "new"
    - risk_analysis:
        risk_object: "host"
        risk_score: 90
        risk_message: "VSS/esentutl registry hive theft — T1003.002"
  false_positives:
    - description: "Legitimate backup software using VSS to snapshot system state."
      tuning: "Allowlist backup-agent process/host; the copy of config\\SAM specifically is rarely a backup action"


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 3: Direct Object Access to On-Disk SAM/SECURITY Hives (SACL 4663)
# ██████████████████████████████████████████████████████████████████████████████
#
#  Requires a SACL on the hive files. Catches offline/mounted access to the hive
#  files by a process other than the OS components that legitimately touch them.
#
#  Confidence : 78   Severity : high   FP Rate : Low-Medium (needs SACL + tuning)

rule_3_hive_file_object_access:
  name: "Credential Dumping — Direct Access to SAM/SECURITY Hive Files (4663)"
  description: >
    Detects a process obtaining read access to %SystemRoot%\System32\config\SAM
    or ...\config\SECURITY (Object Access auditing / Sysmon) from outside the
    small set of OS components that legitimately touch them (lsass, svchost,
    services, smss/wininit, AV). Direct access to these hive files is associated
    with offline credential extraction.
  mitre:
    tactic: "Credential Access"
    technique: T1003.002
    technique_name: "OS Credential Dumping: Security Account Manager"
    related_techniques:
      - "T1003.004: LSA Secrets"
  severity: high
  confidence: 78
  risk_score: 85
  kill_chain_phase: "Credential Access"
  data_sources:
    - "Windows Security 4663 (object access) — requires SACL on the hive files"
  search: |
    index=wineventlog sourcetype="XmlWinEventLog:Security" EventCode=4663
    | eval obj=lower(Object_Name)
    | where match(obj, "\\\\system32\\\\config\\\\(sam|security)(\.|$| )")
    | eval proc=lower(coalesce(Process_Name, ""))
    | where NOT match(proc, "\\\\(lsass|svchost|services|smss|wininit|csrss|msmpeng|sense\w*|csagent)\.exe$")
    | stats min(_time) as first_seen, max(_time) as last_seen, count,
        values(obj) as objects, values(proc) as process, values(Account_Name) as account,
        values(Accesses) as access_types by host
    | eval mitre_technique="T1003.002", alert_name="Direct SAM/SECURITY Hive Access"
    | table first_seen, last_seen, host, account, process, objects, access_types, count, mitre_technique, alert_name
  schedule:
    cron: "*/10 * * * *"
    earliest: "-15m"
    latest: "now"
    window: "10m"
  throttle:
    field: "host,process"
    period: "1h"
  actions:
    - notable_event:
        rule_title: "Credential Dumping — direct access to $objects$ by $process$ on $host$"
        rule_description: >
          $process$ accessed the on-disk $objects$ hive on $host$ outside the
          expected OS components. Investigate for offline credential extraction.
        severity: high
        status: "new"
    - risk_analysis:
        risk_object: "host"
        risk_score: 85
        risk_message: "Direct registry-hive file access — T1003.002"
  false_positives:
    - description: "Endpoint security / backup agents not in the exclusion list."
      tuning: "Add the agent process image to the | where NOT match(proc, ...) exclusion"


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 4: LSA Secrets Extraction (T1003.004)
# ██████████████████████████████████████████████████████████████████████████████
#
#  LSA secrets (HKLM\SECURITY\Policy\Secrets) hold service-account passwords,
#  machine-account creds, scheduled-task creds, and DPAPI keys.
#
#  Confidence : 86   Severity : critical   FP Rate : Low

rule_4_lsa_secrets:
  name: "Credential Dumping — LSA Secrets Extraction"
  description: >
    Detects extraction of LSA secrets (HKLM\SECURITY\Policy\Secrets) — via
    Mimikatz lsadump::secrets, Impacket secretsdump (-security/-lsa), or registry
    access to the Policy\Secrets path. LSA secrets contain plaintext service and
    machine account credentials, auto-logon passwords, and DPAPI keys, enabling
    immediate lateral movement and persistence.
  mitre:
    tactic: "Credential Access"
    technique: T1003.004
    technique_name: "OS Credential Dumping: LSA Secrets"
    related_techniques:
      - "T1552.002: Credentials in Registry"
      - "T1078: Valid Accounts"
  severity: critical
  confidence: 86
  risk_score: 90
  kill_chain_phase: "Credential Access"
  data_sources:
    - "Windows Security 4688 / Sysmon 1 (process), Sysmon 13 (registry), PowerShell 4104"
  search: |
    index=wineventlog (sourcetype="XmlWinEventLog:Security" OR sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational" OR sourcetype="XmlWinEventLog:Microsoft-Windows-PowerShell/Operational")
        (EventCode=1 OR EventCode=4688 OR EventCode=4104 OR EventCode=13)
    | eval cmd=lower(coalesce(CommandLine, Process_Command_Line, ScriptBlockText))
    | eval tobj=lower(coalesce(TargetObject, ""))
    | where match(cmd, "lsadump::secrets|lsadump::lsa")
        OR match(cmd, "secretsdump(\.py)?.*(-security|-lsa|--lsa)")
        OR match(cmd, "(reg (save|query)|get-itemproperty).*security\\\\policy\\\\secrets")
        OR match(tobj, "\\\\security\\\\policy\\\\secrets\\\\")
    | stats min(_time) as first_seen, max(_time) as last_seen, count,
        values(cmd) as command_lines, values(tobj) as registry_targets,
        values(Image) as process, values(User) as user by host
    | eval mitre_technique="T1003.004", alert_name="LSA Secrets Extraction"
    | table first_seen, last_seen, host, user, process, command_lines, registry_targets, count, mitre_technique, alert_name
  schedule:
    cron: "*/5 * * * *"
    earliest: "-10m"
    latest: "now"
    window: "5m"
  throttle:
    field: "host"
    period: "1h"
  actions:
    - notable_event:
        rule_title: "Credential Dumping — LSA secrets extraction on $host$"
        rule_description: >
          LSA secrets extraction observed on $host$ ($process$). Service/machine
          account credentials and DPAPI keys are likely compromised — rotate them.
        severity: critical
        status: "new"
    - risk_analysis:
        risk_object: "host"
        risk_score: 90
        risk_message: "LSA secrets extraction — T1003.004"
  false_positives:
    - description: "Security auditors enumerating LSA secrets during an assessment."
      tuning: "Allowlist the assessment host/account and window"


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 5: Cached Domain Credentials Extraction (T1003.005)
# ██████████████████████████████████████████████████████████████████████████████
#
#  DCC2/mscash2 verifiers (HKLM\SECURITY\Cache) let attackers crack domain
#  passwords offline — useful when the DC is unreachable.
#
#  Confidence : 84   Severity : high   FP Rate : Low

rule_5_cached_domain_creds:
  name: "Credential Dumping — Cached Domain Credentials (DCC2/mscash)"
  description: >
    Detects extraction of cached domain logon verifiers (HKLM\SECURITY\Cache,
    a.k.a. DCC2 / mscash2) via Mimikatz lsadump::cache, cachedump, Impacket
    secretsdump, or registry access to the SECURITY\Cache path. These verifiers
    are cracked offline to recover domain passwords.
  mitre:
    tactic: "Credential Access"
    technique: T1003.005
    technique_name: "OS Credential Dumping: Cached Domain Credentials"
    related_techniques:
      - "T1110.002: Brute Force: Password Cracking"
  severity: high
  confidence: 84
  risk_score: 85
  kill_chain_phase: "Credential Access"
  data_sources:
    - "Windows Security 4688 / Sysmon 1 / Sysmon 13 / PowerShell 4104"
  search: |
    index=wineventlog (sourcetype="XmlWinEventLog:Security" OR sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational" OR sourcetype="XmlWinEventLog:Microsoft-Windows-PowerShell/Operational")
        (EventCode=1 OR EventCode=4688 OR EventCode=4104 OR EventCode=13)
    | eval cmd=lower(coalesce(CommandLine, Process_Command_Line, ScriptBlockText))
    | eval tobj=lower(coalesce(TargetObject, ""))
    | where match(cmd, "lsadump::cache")
        OR match(cmd, "\bcachedump\b|mscash")
        OR match(cmd, "secretsdump(\.py)?.*(cache|-security)")
        OR match(tobj, "\\\\security\\\\cache\\\\nl\$")
    | stats min(_time) as first_seen, max(_time) as last_seen, count,
        values(cmd) as command_lines, values(tobj) as registry_targets,
        values(Image) as process, values(User) as user by host
    | eval mitre_technique="T1003.005", alert_name="Cached Domain Credentials Extraction"
    | table first_seen, last_seen, host, user, process, command_lines, registry_targets, count, mitre_technique, alert_name
  schedule:
    cron: "*/10 * * * *"
    earliest: "-15m"
    latest: "now"
    window: "10m"
  throttle:
    field: "host"
    period: "1h"
  actions:
    - notable_event:
        rule_title: "Credential Dumping — cached domain credentials extracted on $host$"
        rule_description: >
          Cached domain credential (DCC2/mscash) extraction on $host$ ($process$).
          Affected domain accounts should be force-reset; they may be cracked offline.
        severity: high
        status: "new"
    - risk_analysis:
        risk_object: "host"
        risk_score: 85
        risk_message: "Cached domain credentials extraction — T1003.005"
  false_positives:
    - description: "Rare admin/forensic enumeration of cached credentials."
      tuning: "Allowlist the host/account and correlate with an approved task"


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 6: Mimikatz lsadump:: Module Family
# ██████████████████████████████████████████████████████████████████████████████
#
#  Command-line / script signatures for the Mimikatz lsadump module (SAM, secrets,
#  cache, lsa, trust, dcsync). Complements the LSASS file's sekurlsa coverage.
#
#  Confidence : 88   Severity : critical   FP Rate : Low

rule_6_mimikatz_lsadump:
  name: "Credential Dumping — Mimikatz lsadump:: Module"
  description: >
    Detects Mimikatz lsadump module usage by command-line or PowerShell script
    signature: lsadump::sam, lsadump::secrets, lsadump::cache, lsadump::lsa,
    lsadump::trust, lsadump::backupkeys, and lsadump::dcsync. These target the
    SAM/SECURITY hives and AD replication rather than LSASS memory (covered in
    lsass_credential_dumping_detection.yml). Note: lsadump::dcsync overlaps with
    dcsync_attack_detection.yml — correlate the two.
  mitre:
    tactic: "Credential Access"
    technique: T1003.002
    technique_name: "OS Credential Dumping: Security Account Manager"
    related_techniques:
      - "T1003.004: LSA Secrets"
      - "T1003.005: Cached Domain Credentials"
      - "T1003.006: DCSync (lsadump::dcsync)"
  severity: critical
  confidence: 88
  risk_score: 92
  kill_chain_phase: "Credential Access"
  data_sources:
    - "Windows Security 4688 / Sysmon 1 / PowerShell 4104 (Script Block Logging)"
  search: |
    index=wineventlog (sourcetype="XmlWinEventLog:Security" OR sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational" OR sourcetype="XmlWinEventLog:Microsoft-Windows-PowerShell/Operational")
        (EventCode=1 OR EventCode=4688 OR EventCode=4104)
    | eval cmd=lower(coalesce(CommandLine, Process_Command_Line, ScriptBlockText))
    | where match(cmd, "lsadump::(sam|secrets|cache|lsa|trust|backupkeys|dcsync|setntlm|changentlm|netsync)")
        OR match(cmd, "invoke-mimikatz.*lsadump")
    | eval module=case(
        match(cmd,"lsadump::sam"),"sam", match(cmd,"lsadump::secrets"),"secrets",
        match(cmd,"lsadump::cache"),"cache", match(cmd,"lsadump::dcsync"),"dcsync",
        match(cmd,"lsadump::trust"),"trust", match(cmd,"lsadump::lsa"),"lsa", true(),"other")
    | stats min(_time) as first_seen, max(_time) as last_seen, count,
        values(module) as modules, values(cmd) as command_lines,
        values(Image) as process, values(User) as user by host
    | eval mitre_technique="T1003.002/.004/.005", alert_name="Mimikatz lsadump module"
    | table first_seen, last_seen, host, user, process, modules, command_lines, count, mitre_technique, alert_name
  schedule:
    cron: "*/5 * * * *"
    earliest: "-10m"
    latest: "now"
    window: "5m"
  throttle:
    field: "host"
    period: "1h"
  actions:
    - notable_event:
        rule_title: "Credential Dumping — Mimikatz lsadump::$modules$ on $host$"
        rule_description: >
          Mimikatz lsadump module ($modules$) executed on $host$ by $user$.
          High-confidence credential theft — begin IR and rotate exposed creds.
        severity: critical
        status: "new"
    - risk_analysis:
        risk_object: "host"
        risk_score: 92
        risk_message: "Mimikatz lsadump module — T1003.002/.004/.005"
  false_positives:
    - description: "Authorized red-team Mimikatz usage."
      tuning: "Allowlist the engagement host/window; otherwise treat as malicious"


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 7: Impacket secretsdump / CrackMapExec Remote Dumping
# ██████████████████████████████████████████████████████████████████████████████
#
#  Remote SAM+LSA+cached(+NTDS) theft over SMB/RPC. secretsdump's smbexec/wmiexec
#  output redirection to \\127.0.0.1\ADMIN$\__<ts> and ephemeral service names are
#  the signatures.
#
#  Confidence : 86   Severity : critical   FP Rate : Low

rule_7_impacket_secretsdump:
  name: "Credential Dumping — Impacket secretsdump / CrackMapExec Remote Dump"
  description: >
    Detects remote credential dumping via Impacket secretsdump.py and
    CrackMapExec/nxc: ephemeral service creation (7045/4697) whose binary path is
    the secretsdump output-redirection pattern (%COMSPEC% /Q /c echo ...
    \\127.0.0.1\ADMIN$\__<timestamp> 2>&1), the RemCom service, or command lines
    containing secretsdump/-just-dc/--sam --lsa. Remotely pulls SAM, LSA secrets,
    cached creds, and (with -just-dc) NTDS.
  mitre:
    tactic: "Credential Access"
    technique: T1003.002
    technique_name: "OS Credential Dumping: Security Account Manager"
    related_techniques:
      - "T1021.002: Remote Services: SMB/Windows Admin Shares"
      - "T1003.006: DCSync (secretsdump -just-dc)"
      - "T1569.002: System Services: Service Execution"
  severity: critical
  confidence: 86
  risk_score: 92
  kill_chain_phase: "Credential Access"
  data_sources:
    - "Windows Security 7045 (service install), 4697, 4688 / Sysmon 1"
  search: |
    index=wineventlog (sourcetype="XmlWinEventLog:Security" OR sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational")
        (EventCode=7045 OR EventCode=4697 OR EventCode=4688 OR EventCode=1)
    | eval svcname=lower(coalesce(Service_Name, ""))
    | eval cmd=lower(coalesce(Service_File_Name, CommandLine, Process_Command_Line, ""))
    | where match(cmd, "\\\\admin\\$\\\\__\d{6,}")
        OR match(cmd, "%comspec%\s*/q\s*/c.*\\\\127\.0\.0\.1\\\\admin\\$")
        OR match(cmd, "secretsdump|-just-dc|--sam\b|--lsa\b|--ntds\b")
        OR match(cmd, "\bremcomsvc\b")
        OR (EventCode=7045 AND match(svcname, "^[a-z0-9]{8}$") AND match(cmd, "\\\\admin\\$"))
    | eval method=case(
        match(cmd,"-just-dc"),"secretsdump_DCSYNC",
        match(cmd,"--sam|--lsa|--ntds"),"crackmapexec_nxc",
        match(cmd,"\\\\admin\\$\\\\__|remcomsvc"),"secretsdump_smbexec",
        true(),"impacket_remote")
    | stats min(_time) as first_seen, max(_time) as last_seen, count,
        values(method) as methods, values(svcname) as service_names, values(cmd) as command_lines,
        values(Account_Name) as account by host
    | eval mitre_technique="T1003.002/.006", alert_name="Impacket secretsdump remote dump"
    | table first_seen, last_seen, host, account, methods, service_names, command_lines, count, mitre_technique, alert_name
  schedule:
    cron: "*/5 * * * *"
    earliest: "-10m"
    latest: "now"
    window: "5m"
  throttle:
    field: "host"
    period: "1h"
  actions:
    - notable_event:
        rule_title: "Credential Dumping — remote secretsdump on $host$ ($methods$)"
        rule_description: >
          Remote credential dumping (Impacket secretsdump / CrackMapExec) detected
          on $host$ via $methods$. SAM, LSA secrets, cached creds (and NTDS if
          -just-dc) are exposed. Isolate the host and identify the source account.
        severity: critical
        status: "new"
    - risk_analysis:
        risk_object: "host"
        risk_score: 92
        risk_message: "Impacket/CME remote credential dump — T1003.002/.006"
  false_positives:
    - description: "Authorized AD assessment tooling."
      tuning: "Allowlist the engagement source host/account; ephemeral 8-char service + ADMIN$ output is rarely benign"


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 8: DPAPI Master-Key / Windows Credential Manager Theft
# ██████████████████████████████████████████████████████████████████████████████
#
#  DPAPI master keys and the Credential Manager / Vault store browser, RDP, and
#  saved-app credentials. Part of the broader credential-dumping chain.
#
#  Confidence : 80   Severity : high   FP Rate : Low-Medium

rule_8_dpapi_vault_theft:
  name: "Credential Dumping — DPAPI Master-Key / Credential Manager Theft"
  description: >
    Detects theft of DPAPI master keys and the Windows Credential Manager / Vault:
    Mimikatz dpapi::/vault::/sekurlsa::dpapi, SharpDPAPI, vaultcmd /list, or access
    to %APPDATA%\Microsoft\Protect and %LOCALAPPDATA%\Microsoft\Credentials. These
    decrypt saved browser, RDP, Wi-Fi, and application credentials.
  mitre:
    tactic: "Credential Access"
    technique: T1555.004
    technique_name: "Credentials from Password Stores: Windows Credential Manager"
    related_techniques:
      - "T1003.004: LSA Secrets (DPAPI master keys)"
      - "T1555.003: Credentials from Web Browsers"
  severity: high
  confidence: 80
  risk_score: 82
  kill_chain_phase: "Credential Access"
  data_sources:
    - "Windows Security 4688 / Sysmon 1 / Sysmon 11 / PowerShell 4104"
  search: |
    index=wineventlog (sourcetype="XmlWinEventLog:Security" OR sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational" OR sourcetype="XmlWinEventLog:Microsoft-Windows-PowerShell/Operational")
        (EventCode=1 OR EventCode=4688 OR EventCode=4104 OR EventCode=11)
    | eval cmd=lower(coalesce(CommandLine, Process_Command_Line, ScriptBlockText))
    | eval fpath=lower(coalesce(TargetFilename, ""))
    | where match(cmd, "dpapi::(masterkey|cred|chrome|wifi|vault)|vault::(cred|list)|sekurlsa::dpapi")
        OR match(cmd, "sharpdpapi|dpapi_loot|hekatomb")
        OR match(cmd, "vaultcmd\s*/list(properties)?")
        OR match(fpath, "\\\\microsoft\\\\protect\\\\s-1-5|\\\\microsoft\\\\credentials\\\\")
    | stats min(_time) as first_seen, max(_time) as last_seen, count,
        values(cmd) as command_lines, values(fpath) as files,
        values(Image) as process, values(User) as user by host
    | eval mitre_technique="T1555.004", alert_name="DPAPI / Credential Manager theft"
    | table first_seen, last_seen, host, user, process, command_lines, files, count, mitre_technique, alert_name
  schedule:
    cron: "*/10 * * * *"
    earliest: "-15m"
    latest: "now"
    window: "10m"
  throttle:
    field: "host"
    period: "1h"
  actions:
    - notable_event:
        rule_title: "Credential Dumping — DPAPI/Credential Manager theft on $host$"
        rule_description: >
          DPAPI master-key or Windows Credential Manager theft on $host$ ($process$).
          Saved browser/RDP/app credentials may be decrypted — rotate and investigate.
        severity: high
        status: "new"
    - risk_analysis:
        risk_object: "host"
        risk_score: 82
        risk_message: "DPAPI / Credential Manager theft — T1555.004"
  false_positives:
    - description: "vaultcmd /list and Protect-folder access can occur in admin scripts."
      tuning: "Pair with an offensive-tool signature (Mimikatz/SharpDPAPI) or unusual parent for higher fidelity"


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 9: Credential-Dumping Tool Transfer / Execution
# ██████████████████████████████████████████████████████████████████████████████
#
#  Hash- and name-based detection of the broad credential-dumping toolset.
#
#  Confidence : 82   Severity : high   FP Rate : Low

rule_9_cred_dump_tool_ioc:
  name: "Credential Dumping — Known Tool Transfer/Execution"
  description: >
    Detects creation or execution of known credential-dumping tools by SHA256
    (credential_dumping_tools.csv) or by name: mimikatz, secretsdump, pwdump,
    fgdump, gsecdump, samdump2, cachedump, lazagne, creddump7, SharpDPAPI,
    nanodump, dumpert, lsassy, mimilib, wce (Windows Credential Editor).
  mitre:
    tactic: "Credential Access"
    technique: T1003
    technique_name: "OS Credential Dumping"
    related_techniques:
      - "T1588.002: Obtain Capabilities: Tool"
      - "T1105: Ingress Tool Transfer"
  severity: high
  confidence: 82
  risk_score: 85
  kill_chain_phase: "Credential Access"
  data_sources:
    - "Sysmon Event 1 (process) and Event 11 (file create)"
  search: |
    index=wineventlog sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational"
        (EventCode=1 OR EventCode=11)
    | eval fpath=lower(coalesce(Image, TargetFilename, ""))
    | eval fname=mvindex(split(fpath, "\\"), -1)
    | eval sha=lower(replace(coalesce(SHA256, Hashes, ""), ".*sha256=([0-9a-f]+).*", "\1"))
    | lookup credential_dumping_tools.csv sha256 AS sha OUTPUT tool as hash_tool
    | eval name_tool=case(
        match(fname, "(?i)(mimikatz|mimilib|secretsdump|pwdump|fgdump|gsecdump|samdump2|cachedump|lazagne|creddump|sharpdpapi|nanodump|dumpert|lsassy|wce)"),
          replace(fname, "\.exe$|\.py$", ""),
        true(), null())
    | where isnotnull(hash_tool) OR isnotnull(name_tool)
    | eval tool=coalesce(hash_tool, name_tool), detect_by=if(isnotnull(hash_tool),"sha256","filename")
    | stats min(_time) as first_seen, max(_time) as last_seen, count,
        values(tool) as tools, values(detect_by) as detection, values(fpath) as paths,
        values(User) as user by host
    | eval mitre_technique="T1003", alert_name="Credential-dumping tool detected"
    | table first_seen, last_seen, host, user, tools, detection, paths, count, mitre_technique, alert_name
  schedule:
    cron: "*/5 * * * *"
    earliest: "-10m"
    latest: "now"
    window: "5m"
  throttle:
    field: "host,tools"
    period: "1h"
  actions:
    - notable_event:
        rule_title: "Credential Dumping — tool $tools$ on $host$ (by $detection$)"
        rule_description: >
          Known credential-dumping tool ($tools$) detected on $host$. Quarantine the
          binary, confirm the hash, and hunt for the dump artifacts and tool output.
        severity: high
        status: "new"
    - risk_analysis:
        risk_object: "host"
        risk_score: 85
        risk_message: "Credential-dumping tool — T1003"
  false_positives:
    - description: "Filename matches for renamed legitimate utilities (e.g. procdump used for app debugging)."
      tuning: "Prefer hash matches; for filename matches require an unusual path/parent or pair with another rule"


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 10: Credential-Dumping Kill-Chain Correlation (Capstone)
# ██████████████████████████████████████████████████████████████████████████████
#
#  Ties the chain together: a precursor (SeDebug / tool transfer) + a dump action
#  + a staging artifact on the same host within a short window. Highest confidence,
#  lowest false-positive — fire/escalate even if a single-stage rule was tuned out.
#
#  Confidence : 90   Severity : critical   FP Rate : Very low

rule_10_cred_dump_killchain:
  name: "Credential Dumping — Multi-Stage Kill-Chain Correlation"
  description: >
    Correlates the credential-dumping kill chain on a single host within a short
    window: a PRECURSOR (SeDebugPrivilege assignment / sensitive-privilege use,
    or a dumping-tool transfer) followed by a DUMP action (reg hive save,
    lsadump/secretsdump, esentutl/VSS hive copy, comsvcs/procdump on lsass) and a
    STAGING artifact (.dmp, *.save/*.hive, secrets/hashes/cache output). Requiring
    a dump stage plus one other stage yields a very high-confidence detection.
  mitre:
    tactic: "Credential Access"
    technique: T1003
    technique_name: "OS Credential Dumping"
    related_techniques:
      - "T1003.001 LSASS / .002 SAM / .004 LSA Secrets / .005 Cached / .006 DCSync"
      - "T1074.001: Local Data Staging"
  severity: critical
  confidence: 90
  risk_score: 96
  kill_chain_phase: "Credential Access"
  data_sources:
    - "Windows Security 4673/4688/7045, Sysmon 1/10/11, PowerShell 4104"
  search: |
    index=wineventlog (sourcetype="XmlWinEventLog:Security" OR sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational" OR sourcetype="XmlWinEventLog:Microsoft-Windows-PowerShell/Operational")
    | eval cmd=lower(coalesce(CommandLine, Process_Command_Line, ScriptBlockText, Service_File_Name, ""))
    | eval fpath=lower(coalesce(TargetFilename, ""))
    | eval timg=lower(coalesce(TargetImage, ""))
    | eval stage=case(
        EventCode=4673 OR match(cmd, "privilege::debug|sedebugprivilege") OR match(cmd, "(mimikatz|secretsdump|gsecdump|pwdump|lazagne|nanodump|lsassy|sharpdpapi)"), "1_precursor",
        match(cmd, "\breg(\.exe)?\b.*(save|export).*(sam|security|system)") OR match(cmd, "lsadump::|secretsdump|esentutl.*(/vss|/y).*(sam|security)|vssadmin.*shadow.*\\\\config|dpapi::|vault::") OR (EventCode=10 AND match(timg, "\\\\lsass\.exe$")) OR match(cmd, "comsvcs.*minidump|procdump.*lsass"), "2_dump",
        match(fpath, "\.(dmp|mdmp|hdmp)$") OR match(fpath, "\\\\(sam|security|system)\.(save|hive|bak)$") OR match(fpath, "(secrets|hashes|cache|sam|lsa)\w*\.txt$"), "3_staging",
        true(), null())
    | where isnotnull(stage)
    | bin _time span=15m
    | stats dc(stage) as stage_count, values(stage) as stages, values(cmd) as commands,
        values(fpath) as artifacts, values(Image) as processes, values(User) as user by host, _time
    | where stage_count >= 2 AND match(mvjoin(stages, ","), "2_dump")
    | eval window=strftime(_time, "%Y-%m-%d %H:%M:%S")
    | eval mitre_technique="T1003", alert_name="Credential Dumping Kill-Chain"
    | table window, host, user, stages, stage_count, processes, commands, artifacts, mitre_technique, alert_name
  schedule:
    cron: "*/10 * * * *"
    earliest: "-20m"
    latest: "now"
    window: "15m"
  throttle:
    field: "host"
    period: "2h"
  actions:
    - notable_event:
        rule_title: "Credential Dumping KILL-CHAIN on $host$ ($stage_count$ stages: $stages$)"
        rule_description: >
          Multiple stages of the credential-dumping kill chain ($stages$) were
          observed on $host$ within 15 minutes, including a dump action. This is a
          high-confidence, in-progress credential-theft incident — isolate the host,
          identify the operator account, and rotate all reachable credentials.
        severity: critical
        status: "new"
    - risk_analysis:
        risk_object: "host"
        risk_score: 96
        risk_message: "Multi-stage credential-dumping kill chain — T1003"
  false_positives:
    - description: "Backup or DFIR collection that legitimately touches hives + writes dumps."
      tuning: "Allowlist the forensic/backup host+account in cred_dump_admin_allowlist.csv"


# ==============================================================================
#  INVESTIGATION QUERIES (run manually during triage)
# ==============================================================================
#
#  IQ1 — Full credential-access timeline on a host (24h):
#    index=wineventlog host="<host>" (EventCode=1 OR EventCode=10 OR EventCode=11 OR EventCode=13 OR EventCode=4688 OR EventCode=7045) earliest=-24h
#    | sort _time | table _time EventCode Image CommandLine TargetImage TargetFilename TargetObject Service_File_Name
#
#  IQ2 — Find every host where a registry hive was saved/copied:
#    index=wineventlog (EventCode=1 OR EventCode=4688)
#    | eval cmd=lower(coalesce(CommandLine,Process_Command_Line))
#    | where match(cmd,"(reg .*(save|export)|esentutl.*/vss|copy.*globalroot).*(sam|security|system)")
#    | stats values(cmd) count by host user
#
#  IQ3 — Hunt staged credential output files fleet-wide:
#    index=wineventlog sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational" EventCode=11
#    | where match(lower(TargetFilename),"\\\\(sam|security|system)\.(save|hive)$|(secrets|hashes|cache)\w*\.txt$|\.(dmp|mdmp)$")
#    | table _time host Image TargetFilename
#
#  IQ4 — Tool-hash sweep:
#    index=wineventlog sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational" (EventCode=1 OR EventCode=11)
#    | eval sha=lower(replace(coalesce(SHA256,Hashes,""),".*sha256=([0-9a-f]+).*","\1"))
#    | lookup credential_dumping_tools.csv sha256 AS sha OUTPUT tool
#    | where isnotnull(tool) | table _time host tool Image TargetFilename
#
# ==============================================================================
#  RESPONSE PLAYBOOK
# ==============================================================================
#
#  1. CONTAIN   : Isolate the host; suspend the operator account; block any remote
#                 source (Rule 7) at the network layer.
#  2. SCOPE     : Use IQ1-IQ4 to find all dump actions, staged outputs, and tools
#                 across the fleet; pivot on the operator account's other logons.
#  3. ERADICATE : Remove staged hive/dump/secret files and dumping tools; revert
#                 any DisableRestrictedAdmin/WDigest changes; remove ephemeral
#                 secretsdump services.
#  4. ROTATE    : Reset — local admin (SAM); service & machine accounts and any
#                 LSA-secret-stored creds (.004); affected domain accounts whose
#                 cached verifiers were taken (.005); KRBTGT twice if DCSync/NTDS
#                 (.006/.003) is suspected; DPAPI-protected app/browser creds (.004/T1555).
#  5. RECOVER   : Re-image compromised hosts; enable LSA Protection (RunAsPPL) +
#                 Credential Guard; restrict SeDebugPrivilege and local-admin reuse;
#                 disable WDigest; enforce LAPS.
#  6. HARDEN    : Keep credential_dumping_tools.csv fed from IOC sources; deploy the
#                 hive-file SACL (Rule 3); monitor VSS/diskshadow use on member servers.
#
#  Companion coverage: lsass_credential_dumping_detection.yml (T1003.001),
#  ntds_dit_extraction_detection.yml (T1003.003), dcsync_attack_detection.yml (T1003.006).
#
# ==============================================================================
#  END OF OS CREDENTIAL DUMPING — FULL ATTACK CHAIN DETECTION RULES
# ==============================================================================
