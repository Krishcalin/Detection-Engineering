# ==============================================================================
#  Password Spraying and Brute Force Attack Detection
#  Splunk Correlation Rules
# ==============================================================================
#  Description : Multi-layered detection for Password Spraying (T1110.003) and
#                Brute Force (T1110.001) attacks. Covers NTLM spray via Event
#                4776/4625, Kerberos spray via Event 4771, spray hit detection
#                (failures followed by success), account lockout storms (4740),
#                Kerbrute username enumeration (4768), RDP spray, distributed
#                spray, privileged account targeting, and slow/low-cadence APT
#                spray patterns that evade short-window threshold rules.
#
#                Password Spraying: one or few passwords tried against MANY
#                accounts to avoid triggering per-account lockout thresholds.
#                Brute Force: many passwords tried against one or few accounts.
#
#  MITRE ATT&CK: T1110.003 - Brute Force: Password Spraying
#                 T1110.001 - Brute Force: Password Guessing
#                 T1078     - Valid Accounts (goal upon success)
#  Kill Chain   : Initial Access -> Credential Access -> Lateral Movement
#  Platform     : Splunk Enterprise / Splunk Cloud (ES compatible)
#  Author       : Krishnendu
#  Version      : 1.0.0
#  Created      : 2026-03-04
#  License      : MIT
# ==============================================================================
#
#  PREREQUISITES:
#
#  1. Enable Advanced Audit Policy on ALL Domain Controllers:
#     Account Logon > "Audit Kerberos Authentication Service" -> Success, Failure
#     Account Logon > "Audit Credential Validation"           -> Success, Failure
#     Logon/Logoff  > "Audit Logon"                          -> Success, Failure
#     Logon/Logoff  > "Audit Account Lockout"                -> Success, Failure
#
#  2. Enable Audit Logon on all domain-joined endpoints (for RDP/local spray):
#     Logon/Logoff > "Audit Logon" -> Success, Failure
#
#  3. Forward Security logs from ALL Domain Controllers and endpoints to Splunk:
#     sourcetype=XmlWinEventLog:Security
#
# ==============================================================================
#
#  Attack Classification Logic:
#
#  Pattern                        | dc(account) | count | count/dc ratio
#  ----------------------------- | ----------- | ----- | --------------
#  Password Spray                 | HIGH        | MOD   | ~1.0  (1 try/account)
#  Brute Force (single account)   | 1           | HIGH  | >> 1
#  Credential Stuffing / Hybrid   | HIGH        | HIGH  | 2–10
#  Slow APT Spray (24h window)    | HIGH        | MOD   | < 4 over hours
#
#  Event IDs by attack vector:
#    4625 LogonType=3  — NTLM spray (member servers, workstations)
#    4771 Status=0x18  — Kerberos spray (Domain Controllers only)
#    4776 Status=0xC000006A — NTLM validation at DC
#    4625 LogonType=10 — RDP spray
#    4768 Status=0x6   — Kerberos username enumeration (Kerbrute)
#    4740              — Account lockout storm (lagging spray indicator)
#
# ==============================================================================


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 1: Kerberos Password Spray — Multiple Accounts, Pre-Auth Failures (4771)
# ██████████████████████████████████████████████████████████████████████████████
#
#  The highest-fidelity spray detection source. Event 4771 fires ONLY on Domain
#  Controllers for Kerberos pre-authentication failures. Status=0x18 means
#  KDC_ERR_PREAUTH_FAILED — the account exists but the password is wrong.
#  Many 4771/0x18 events from one source IP against many distinct accounts = spray.
#
#  Tools that generate this pattern: Kerbrute (kerbspray), Spray, CrackMapExec,
#  DomainPasswordSpray, RoastinWeasel.
#
#  Confidence  : HIGH (88)
#  Severity    : HIGH (CRITICAL if spray hit detected — see Rule 5)

rule_1_kerberos_password_spray:
  name: "Password Spraying — Kerberos Pre-Auth Failures Against Multiple Accounts (Event 4771)"
  description: >
    Detects password spraying via Kerberos by identifying a single source IP that
    generates 10 or more Event 4771 (Kerberos pre-authentication failed, Status=0x18)
    events against distinct user accounts within a 5-minute window on any Domain
    Controller. Status 0x18 (KDC_ERR_PREAUTH_FAILED) confirms the account exists but
    the password is wrong — differentiating from username enumeration (0x6).
    Machine accounts are excluded as their Kerberos failures are expected and frequent.
    A statistical outlier version compares to the source IP's historical baseline.
  mitre:
    tactic: "Credential Access"
    technique: T1110.003
    technique_name: "Brute Force: Password Spraying"
    related_techniques:
      - "T1110.001: Brute Force: Password Guessing (single-account variant)"
      - "T1078: Valid Accounts (goal upon successful spray)"
  severity: high
  confidence: 88
  risk_score: 85
  kill_chain_phase: "Credential Access"
  data_sources:
    - "Windows Security Event Log — Event 4771 (Kerberos Pre-Authentication Failure) on DCs"

  search: |
    index=wineventlog sourcetype="XmlWinEventLog:Security" EventCode=4771
        Status="0x18"
    ``` Exclude machine accounts — their failures are common and expected ```
    | where NOT match(TargetUserName, "\\$$")
    | where TargetUserName!="-"
    ``` Normalize IPv4-mapped IPv6 addresses ```
    | eval src_ip=replace(replace(IpAddress, "::ffff:", ""), "^::$", "localhost")
    | where src_ip NOT IN ("-", "127.0.0.1", "::1", "localhost")
    ``` 5-minute bins for threshold detection ```
    | bin span=5m _time
    | stats
        dc(TargetUserName) as unique_accounts,
        count as total_failures,
        values(TargetUserName) as tried_accounts,
        min(_time) as window_start,
        max(_time) as window_end
        by _time, src_ip, Computer
    ``` Threshold: 10+ distinct accounts targeted in 5-minute window ```
    | where unique_accounts >= 10
    | eval attempts_per_account=round(total_failures / unique_accounts, 2)
    | eval spray_confidence=case(
        attempts_per_account <= 1.5 AND unique_accounts >= 30, "VERY HIGH — classic spray pattern",
        attempts_per_account <= 2.0 AND unique_accounts >= 15, "HIGH — likely spray",
        1==1,                                                    "MEDIUM — investigate"
      )
    | eval mitre_technique="T1110.003"
    | eval mitre_tactic="Credential Access"
    | eval alert_name="Kerberos Password Spray"
    | sort - unique_accounts
    | table _time, src_ip, Computer, unique_accounts, total_failures,
            attempts_per_account, spray_confidence, tried_accounts,
            mitre_technique, mitre_tactic, alert_name

  schedule:
    cron: "*/5 * * * *"
    earliest: "-10m"
    latest: "now"
    window: "5m"
  throttle:
    field: "src_ip"
    period: "30m"
  actions:
    - notable_event:
        rule_title: "Kerberos Spray from $src_ip$ — $unique_accounts$ accounts targeted on $Computer$"
        rule_description: >
          $src_ip$ attempted Kerberos pre-authentication against $unique_accounts$ distinct
          accounts in 5 minutes on DC $Computer$ ($total_failures$ total failures,
          $attempts_per_account$ attempts/account). Confidence: $spray_confidence$.
          Accounts targeted: $tried_accounts$. Correlate with Event 4624 from $src_ip$
          to detect if any spray attempt succeeded (Rule 5 — Spray Hit).
        severity: high
        status: "new"
    - risk_analysis:
        risk_object: "src_ip"
        risk_score: 85
        risk_message: "Kerberos spray — $unique_accounts$ accounts — T1110.003"
  false_positives:
    - description: >
        Monday-morning re-authentication bursts where many users' cached passwords expire
        simultaneously may briefly spike 4771 failures before users update their passwords.
        These appear at business-hours start and resolve within minutes.
      tuning: "Add time-window filter: exclude 07:00–09:00 Monday with a separate low-risk alert."
    - description: >
        Misconfigured service accounts with wrong cached passwords generate sustained 4771
        failures against a SINGLE account. The dc(TargetUserName) = 1 pattern distinguishes
        this from spray — it will not trigger this rule's unique_accounts >= 10 threshold.
      tuning: "No action needed — single-account failures are filtered by the threshold."


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 2: NTLM Password Spray — Multiple Accounts, Auth Failures at DC (4776)
# ██████████████████████████████████████████████████████████████████████████████
#
#  Event 4776 fires on Domain Controllers during NTLM passthrough authentication.
#  Status=0xC000006A (wrong password, valid account) from one Workstation against
#  many TargetUserNames in a short window is the primary NTLM spray indicator.
#  This catches tools using LDAP bind, SMB, or any NTLM-based spray against DCs.
#
#  Confidence  : HIGH (85)
#  Severity    : HIGH

rule_2_ntlm_password_spray_dc:
  name: "Password Spraying — NTLM Credential Validation Failures at DC (Event 4776)"
  description: >
    Detects NTLM password spraying via Event 4776 (The computer attempted to validate
    the credentials for an account) on Domain Controllers. Status=0xC000006A indicates
    a valid account with wrong password — confirming the spray is targeting real accounts.
    A single Workstation generating failures against 10+ distinct user accounts within
    5 minutes is the threshold. This catches Spray.ps1, CrackMapExec, DomainPasswordSpray,
    and custom spray scripts that use NTLM authentication against DCs.
  mitre:
    tactic: "Credential Access"
    technique: T1110.003
    technique_name: "Brute Force: Password Spraying"
    related_techniques:
      - "T1550.002: Pass the Hash (if spray succeeds and hash is later reused)"
  severity: high
  confidence: 85
  risk_score: 82
  kill_chain_phase: "Credential Access"
  data_sources:
    - "Windows Security Event Log — Event 4776 (NTLM Credential Validation) on DCs"

  search: |
    index=wineventlog sourcetype="XmlWinEventLog:Security" EventCode=4776
        Status="0xC000006A"
    | where NOT match(TargetUserName, "\\$$")
    | where TargetUserName NOT IN ("-", "ANONYMOUS LOGON")
    | where Workstation NOT IN ("-", "localhost")
    | bin span=5m _time
    | stats
        dc(TargetUserName) as unique_accounts,
        count as total_failures,
        values(TargetUserName) as tried_accounts,
        values(Computer) as dc_names
        by _time, Workstation
    | where unique_accounts >= 10
    | eval attempts_per_account=round(total_failures / unique_accounts, 2)
    | eval attack_type=if(attempts_per_account <= 2.0, "Password_Spray", "Brute_Force_Or_Hybrid")
    | eval mitre_technique="T1110.003"
    | eval mitre_tactic="Credential Access"
    | eval alert_name="NTLM Spray at DC"
    | sort - unique_accounts
    | table _time, Workstation, unique_accounts, total_failures, attempts_per_account,
            attack_type, tried_accounts, dc_names, mitre_technique, mitre_tactic, alert_name

  schedule:
    cron: "*/5 * * * *"
    earliest: "-10m"
    latest: "now"
    window: "5m"
  throttle:
    field: "Workstation"
    period: "30m"
  actions:
    - notable_event:
        rule_title: "NTLM Spray from $Workstation$ — $unique_accounts$ accounts — $attack_type$"
        rule_description: >
          $Workstation$ performed NTLM authentication against $unique_accounts$ unique accounts
          ($total_failures$ total failures, $attempts_per_account$ attempts/account) on DC.
          Attack type: $attack_type$. Tried accounts: $tried_accounts$. Verify if $Workstation$
          is an authorized system or a compromised endpoint being used for lateral movement.
        severity: high
        status: "new"
    - risk_analysis:
        risk_object: "Workstation"
        risk_score: 82
        risk_message: "NTLM spray — $unique_accounts$ accounts — T1110.003"
  false_positives:
    - description: >
        Vulnerability scanners performing authenticated NTLM scans will generate 4776
        failures across many accounts. These originate from known scan IPs.
      tuning: "Add scanner Workstation names or IPs to an exclusion lookup."


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 3: Brute Force — Single Account, High Attempt Count
# ██████████████████████████████████████████████████████████████████████████████
#
#  Distinguishes brute force from spray by requiring low distinct account count
#  (1–2 accounts) and high raw failure count. Catches targeted account attacks
#  that will eventually trigger lockout (4740) if they hit the threshold.
#
#  Confidence  : HIGH (85)
#  Severity    : HIGH

rule_3_single_account_brute_force:
  name: "Brute Force — High Volume Failures Against Single Account (Event 4625)"
  description: >
    Detects traditional brute force attacks where many passwords are tried against
    one or a small number of accounts. Distinguished from password spraying by the
    high ratio of attempts to unique accounts. A source generating 20+ failures against
    1–2 accounts within 15 minutes is classified as brute force. SubStatus filtering
    ensures the failures are wrong-password responses (not username-not-found noise).
  mitre:
    tactic: "Credential Access"
    technique: T1110.001
    technique_name: "Brute Force: Password Guessing"
    related_techniques:
      - "T1110.003: Password Spraying (low unique_accounts distinguishes brute force)"
  severity: high
  confidence: 85
  risk_score: 80
  kill_chain_phase: "Credential Access"
  data_sources:
    - "Windows Security Event Log — Event 4625 (Logon Failure)"

  search: |
    index=wineventlog sourcetype="XmlWinEventLog:Security" EventCode=4625
    ``` SubStatus 0xC000006A = wrong password; 0xC000006D = generic bad cred ```
    | where SubStatus IN ("0xC000006A", "0xC000006D") OR Status IN ("0xC000006A", "0xC000006D")
    | where NOT match(TargetUserName, "\\$$")
    | where TargetUserName NOT IN ("-", "ANONYMOUS LOGON")
    | eval src_ip=replace(coalesce(IpAddress, WorkstationName), "::ffff:", "")
    | bin span=15m _time
    | stats
        count as attempt_count,
        dc(TargetUserName) as unique_accounts,
        dc(src_ip) as unique_sources,
        values(TargetUserName) as targeted_accounts,
        values(src_ip) as source_ips,
        values(LogonType) as logon_types,
        values(Computer) as target_hosts
        by _time, TargetUserName, TargetDomainName
    ``` Brute force: many attempts against 1–2 accounts ```
    | where attempt_count >= 20 AND unique_accounts <= 2
    | eval attack_type=if(unique_sources > 3, "Distributed_Brute_Force", "Single_Source_Brute_Force")
    | eval lockout_risk=if(attempt_count > 50, "HIGH — possible lockout imminent", "MEDIUM")
    | eval mitre_technique="T1110.001"
    | eval mitre_tactic="Credential Access"
    | eval alert_name="Single Account Brute Force"
    | sort - attempt_count
    | table _time, TargetUserName, TargetDomainName, attempt_count, unique_sources,
            source_ips, logon_types, target_hosts, attack_type, lockout_risk,
            mitre_technique, mitre_tactic, alert_name

  schedule:
    cron: "*/10 * * * *"
    earliest: "-20m"
    latest: "now"
    window: "10m"
  throttle:
    field: "TargetUserName"
    period: "1h"
  actions:
    - notable_event:
        rule_title: "Brute Force Against $TargetUserName$ — $attempt_count$ attempts from $source_ips$"
        rule_description: >
          $attempt_count$ failed password attempts against $TargetUserName$@$TargetDomainName$
          from $source_ips$ in 15 minutes. Attack type: $attack_type$. Lockout risk: $lockout_risk$.
          Monitor for Event 4740 (account lockout). If the attack succeeds, Event 4624 from
          the same source will confirm credential compromise.
        severity: high
        status: "new"
    - risk_analysis:
        risk_object: "TargetUserName"
        risk_score: 80
        risk_message: "Brute force — $attempt_count$ attempts — T1110.001"
  false_positives:
    - description: >
        Misconfigured service accounts or applications with wrong cached credentials generate
        sustained failures against a single account. These are typically service accounts
        with descriptive names (svc_*, backup_*, etc.) and originate from application servers.
      tuning: "Add known misconfigured service account names to an exclusion lookup with alert for human review."


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 4: Account Lockout Storm — Multiple Accounts Locked (Event 4740)
# ██████████████████████████████████████████████████████████████████████████████
#
#  A lagging but high-confidence spray indicator. When spray exceeds the lockout
#  threshold across multiple accounts simultaneously, Event 4740 fires on DCs.
#  Multiple distinct account lockouts in a short window = spray hit the threshold.
#
#  Confidence  : HIGH (85)
#  Severity    : HIGH

rule_4_account_lockout_storm:
  name: "Account Lockout Storm — Multiple Accounts Locked Simultaneously (Event 4740)"
  description: >
    Detects mass account lockout events (Event 4740) where 5 or more distinct user
    accounts are locked out within a 10-minute window. This is a lagging but high-
    confidence password spray indicator — the spray exhausted the lockout threshold
    for multiple accounts. CallerComputerName identifies the source of the failed
    authentication attempts that triggered the lockouts.
  mitre:
    tactic: "Credential Access"
    technique: T1110.003
    technique_name: "Brute Force: Password Spraying"
    related_techniques:
      - "T1531: Account Access Removal (lockout as a side effect)"
  severity: high
  confidence: 85
  risk_score: 80
  kill_chain_phase: "Credential Access"
  data_sources:
    - "Windows Security Event Log — Event 4740 (Account Locked Out) on DCs"

  search: |
    index=wineventlog sourcetype="XmlWinEventLog:Security" EventCode=4740
    | where NOT match(TargetUserName, "\\$$")
    | bin span=10m _time
    | stats
        dc(TargetUserName) as unique_locked_accounts,
        count as lockout_events,
        values(TargetUserName) as locked_accounts,
        values(CallerComputerName) as source_computers,
        dc(CallerComputerName) as unique_sources
        by _time, Computer
    | where unique_locked_accounts >= 5
    | eval spray_confidence=case(
        unique_locked_accounts >= 20, "CRITICAL — mass lockout storm",
        unique_locked_accounts >= 10, "HIGH — significant lockout event",
        unique_locked_accounts >= 5,  "MEDIUM — multiple account lockout"
      )
    | eval mitre_technique="T1110.003"
    | eval mitre_tactic="Credential Access"
    | eval alert_name="Account Lockout Storm"
    | sort - unique_locked_accounts
    | table _time, Computer, unique_locked_accounts, lockout_events, source_computers,
            unique_sources, spray_confidence, locked_accounts,
            mitre_technique, mitre_tactic, alert_name

  schedule:
    cron: "*/10 * * * *"
    earliest: "-15m"
    latest: "now"
    window: "10m"
  throttle:
    field: "Computer"
    period: "30m"
  actions:
    - notable_event:
        rule_title: "Account Lockout Storm — $unique_locked_accounts$ accounts locked on $Computer$"
        rule_description: >
          $unique_locked_accounts$ accounts locked out in 10 minutes on $Computer$.
          Source(s): $source_computers$. Confidence: $spray_confidence$.
          Locked accounts: $locked_accounts$. Immediately investigate $source_computers$
          for password spray tooling. Run IQ-1 to find the spray source and timing.
        severity: high
        status: "new"
    - risk_analysis:
        risk_object: "Computer"
        risk_score: 80
        risk_message: "Account lockout storm — $unique_locked_accounts$ locked — T1110.003"
  false_positives:
    - description: >
        Synchronized password changes (enterprise-wide password expiry enforcement,
        AD migration, domain trust changes) can lock out multiple accounts simultaneously
        as applications try to authenticate with old credentials.
      tuning: "Correlate with planned password change windows; add exclusion for known maintenance periods."


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 5: Spray Hit — Authentication Failures Followed by Success (4625 + 4624)
# ██████████████████████████████████████████████████████████████████████████████
#
#  The highest-fidelity spray indicator: attacker found valid credentials.
#  Correlates failure bursts (spray activity) with subsequent successful logon
#  from the same source IP within 30 minutes. The failure count and unique account
#  count confirm spray preceded the success (not just a mistyped password).
#
#  Confidence  : VERY HIGH (93)
#  Severity    : CRITICAL

rule_5_spray_hit_success:
  name: "Password Spray Hit — Auth Failures Followed by Successful Logon from Same Source"
  description: >
    Detects the moment a password spray succeeds: a source IP that generated 10 or more
    authentication failures against multiple distinct accounts then achieves a successful
    logon within 30 minutes. This confirms the attacker found valid credentials. The
    combination of high failure count, multiple distinct accounts targeted, and subsequent
    success from the same source eliminates false positives from legitimate authentication
    failures (which are single-account patterns). This is the most actionable spray alert —
    at this point, the attacker has a valid username and password for the domain.
  mitre:
    tactic: "Credential Access"
    technique: T1110.003
    technique_name: "Brute Force: Password Spraying"
    related_techniques:
      - "T1078: Valid Accounts (confirmed upon spray hit)"
      - "T1550.002: Pass the Hash (next step if hash is extracted)"
  severity: critical
  confidence: 93
  risk_score: 95
  kill_chain_phase: "Credential Access -> Initial Access"
  data_sources:
    - "Windows Security Event Log — Events 4624 and 4625"

  search: |
    index=wineventlog sourcetype="XmlWinEventLog:Security"
        EventCode IN (4624, 4625)
        earliest=-1h
    | eval src_ip=replace(coalesce(IpAddress, WorkstationName), "::ffff:", "")
    | where src_ip NOT IN ("-", "127.0.0.1", "::1", "LOCAL", "localhost")
    | where NOT match(TargetUserName, "\\$$")
    | where TargetUserName NOT IN ("-", "ANONYMOUS LOGON", "SYSTEM", "DWM-*", "UMFD-*")
    ``` Classify each event as failure or success ```
    | eval is_failure=if(EventCode=4625, 1, 0)
    | eval is_success=if(EventCode=4624, 1, 0)
    | eval fail_account=if(EventCode=4625, TargetUserName, null())
    | eval success_account=if(EventCode=4624, TargetUserName, null())
    ``` Aggregate failures and successes per source IP in 30-min window ```
    | bin span=30m _time
    | stats
        sum(is_failure) as total_failures,
        sum(is_success) as total_successes,
        dc(fail_account) as unique_failed_accounts,
        dc(success_account) as unique_success_accounts,
        values(fail_account) as failed_accounts,
        values(success_account) as successful_accounts,
        values(LogonType) as logon_types,
        values(Computer) as target_hosts
        by _time, src_ip
    ``` Spray hit: many failures across many accounts, then at least 1 success ```
    | where total_failures >= 10 AND total_successes >= 1 AND unique_failed_accounts >= 5
    | eval spray_scale=case(
        unique_failed_accounts >= 50, "CRITICAL — Large-scale spray",
        unique_failed_accounts >= 20, "HIGH — Significant spray",
        unique_failed_accounts >= 5,  "MEDIUM — Small spray"
      )
    | eval mitre_technique="T1110.003,T1078"
    | eval mitre_tactic="Credential Access,Initial Access"
    | eval alert_name="Spray Hit — Credentials Compromised"
    | sort - total_failures
    | table _time, src_ip, unique_failed_accounts, total_failures, total_successes,
            successful_accounts, failed_accounts, spray_scale, target_hosts,
            logon_types, mitre_technique, mitre_tactic, alert_name

  schedule:
    cron: "*/10 * * * *"
    earliest: "-40m"
    latest: "now"
    window: "10m"
  throttle:
    field: "src_ip"
    period: "4h"
  actions:
    - notable_event:
        rule_title: "SPRAY HIT — $src_ip$ found credentials for $successful_accounts$ ($spray_scale$)"
        rule_description: >
          PASSWORD SPRAY SUCCEEDED: $src_ip$ performed $total_failures$ auth failures against
          $unique_failed_accounts$ accounts, then successfully authenticated as $successful_accounts$.
          Scale: $spray_scale$. Compromised account(s) $successful_accounts$ should be disabled
          and passwords rotated IMMEDIATELY. Monitor for subsequent lateral movement from $src_ip$.
          Run IQ-2 (Spray Timeline) for full attack reconstruction.
        severity: critical
        status: "new"
    - risk_analysis:
        risk_object: "src_ip"
        risk_score: 95
        risk_message: "Spray hit — $successful_accounts$ compromised — T1110.003+T1078"
  false_positives:
    - description: >
        Users who mistype passwords several times then succeed represent a single-account
        pattern (unique_failed_accounts = 1). This rule requires unique_failed_accounts >= 5
        so individual user mistakes will not trigger it.
      tuning: "The 5-account threshold already addresses this. No additional tuning needed."


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 6: Kerberos Username Enumeration — Kerbrute Pre-Spray (Event 4768)
# ██████████████████████████████████████████████████████████████████████████████
#
#  Kerbrute and similar tools first enumerate valid usernames via AS-REQ before
#  spraying. Status=0x6 (KDC_ERR_C_PRINCIPAL_UNKNOWN) means the username does
#  not exist. High volume of 0x6 failures from one IP = username enumeration.
#  This fires BEFORE the spray and gives early warning.
#
#  Confidence  : HIGH (82)
#  Severity    : HIGH

rule_6_kerberos_username_enumeration:
  name: "Kerberos Username Enumeration — Pre-Spray Reconnaissance via Invalid Usernames (Event 4768)"
  description: >
    Detects username enumeration via Kerberos AS-REQ requests. Kerbrute (and similar tools)
    send AS-REQ packets for each username and observe the response: KDC_ERR_C_PRINCIPAL_UNKNOWN
    (0x6) means the account does not exist; any other response confirms a valid account.
    This rule fires when a single source IP generates 10+ Event 4768 failures with Status=0x6
    against distinct non-existent accounts within a 2-minute window. This is a leading
    indicator — spray attempts follow shortly after successful username enumeration.
  mitre:
    tactic: "Reconnaissance"
    technique: T1087.002
    technique_name: "Account Discovery: Domain Account"
    related_techniques:
      - "T1110.003: Password Spraying (follow-on after enumeration)"
  severity: high
  confidence: 82
  risk_score: 75
  kill_chain_phase: "Reconnaissance -> Credential Access"
  data_sources:
    - "Windows Security Event Log — Event 4768 (Kerberos TGT Request) on DCs"

  search: |
    index=wineventlog sourcetype="XmlWinEventLog:Security" EventCode=4768
        Status="0x6"
    | where NOT match(TargetUserName, "\\$$")
    | where TargetUserName!="-"
    | eval src_ip=replace(IpAddress, "::ffff:", "")
    | where src_ip NOT IN ("-", "127.0.0.1", "::1")
    | bin span=2m _time
    | stats
        dc(TargetUserName) as unique_nonexistent_accounts,
        count as total_failures,
        values(TargetUserName) as enumerated_names,
        values(Computer) as dc_names
        by _time, src_ip
    | where unique_nonexistent_accounts >= 10
    | eval enumeration_scale=case(
        unique_nonexistent_accounts >= 100, "CRITICAL — Large wordlist enumeration",
        unique_nonexistent_accounts >= 30,  "HIGH — Medium wordlist enumeration",
        1==1,                               "MEDIUM — Small enumeration burst"
      )
    | eval mitre_technique="T1087.002"
    | eval mitre_tactic="Reconnaissance"
    | eval alert_name="Kerberos Username Enumeration"
    | sort - unique_nonexistent_accounts
    | table _time, src_ip, unique_nonexistent_accounts, total_failures,
            enumeration_scale, enumerated_names, dc_names,
            mitre_technique, mitre_tactic, alert_name

  schedule:
    cron: "*/5 * * * *"
    earliest: "-10m"
    latest: "now"
    window: "5m"
  throttle:
    field: "src_ip"
    period: "30m"
  actions:
    - notable_event:
        rule_title: "Username Enumeration from $src_ip$ — $unique_nonexistent_accounts$ invalid accounts probed"
        rule_description: >
          $src_ip$ enumerated $unique_nonexistent_accounts$ non-existent Kerberos accounts
          in 2 minutes on DC ($dc_names$). Scale: $enumeration_scale$.
          This is a pre-spray reconnaissance pattern (Kerbrute/similar tool).
          Expect password spray attempts (4771/Status=0x18) from $src_ip$ within minutes.
          Block $src_ip$ at the firewall immediately to prevent follow-on spray.
        severity: high
        status: "new"
    - risk_analysis:
        risk_object: "src_ip"
        risk_score: 75
        risk_message: "Kerberos username enumeration — T1087.002 pre-spray"
  false_positives:
    - description: >
        Monitoring tools that probe for specific service accounts (e.g., checking if
        a service account exists before provisioning) may generate a small number of
        0x6 failures. The 10-account threshold and 2-minute window already filter most.
      tuning: "If monitoring tool IPs are known, add them to an exclusion lookup."


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 7: Slow / Low-Cadence APT Spray — Extended 24-Hour Window
# ██████████████████████████████████████████████████████████████████████████████
#
#  APT groups (Cozy Bear / APT29, Fancy Bear / APT28) spray at extremely low
#  cadence — as slow as 1 attempt per account per 4 hours — to stay invisible
#  to standard 5-30 minute threshold rules. This rule uses a 24-hour window with
#  a low attempts-per-account ratio filter to catch slow spray patterns.
#
#  Confidence  : MEDIUM (70)
#  Severity    : HIGH

rule_7_slow_low_cadence_spray:
  name: "Slow-Cadence APT Password Spray — Extended 24-Hour Window Detection"
  description: >
    Detects low-and-slow password spraying that evades short-window threshold rules
    by operating at a cadence of 1-4 attempts per account per hour. This technique
    is used by APT groups to spray across many accounts while staying below lockout
    thresholds and SIEM alert thresholds simultaneously. Uses a 24-hour window to
    accumulate events, requires at least 20 distinct targeted accounts, and filters
    for low attempts-per-account ratio (< 4) with duration > 2 hours.
  mitre:
    tactic: "Credential Access"
    technique: T1110.003
    technique_name: "Brute Force: Password Spraying"
    related_techniques:
      - "T1078: Valid Accounts (goal of slow spray)"
  severity: high
  confidence: 70
  risk_score: 78
  kill_chain_phase: "Credential Access"
  data_sources:
    - "Windows Security Event Log — Events 4625, 4771, 4776"

  search: |
    index=wineventlog sourcetype="XmlWinEventLog:Security"
        EventCode IN (4625, 4771, 4776)
        earliest=-24h
    ``` Wrong password for valid accounts only ```
    | where (SubStatus IN ("0xC000006A", "0xC000006D"))
        OR (EventCode=4771 AND Status="0x18")
        OR (EventCode=4776 AND Status="0xC000006A")
    | where NOT match(TargetUserName, "\\$$")
    | where TargetUserName NOT IN ("-", "ANONYMOUS LOGON")
    | eval src_ip=replace(coalesce(IpAddress, Workstation), "::ffff:", "")
    | where src_ip NOT IN ("-", "127.0.0.1", "::1")
    | stats
        count as total_failures,
        dc(TargetUserName) as unique_accounts,
        min(_time) as first_seen,
        max(_time) as last_seen,
        values(TargetUserName) as tried_accounts,
        values(EventCode) as event_codes,
        values(Computer) as target_hosts
        by src_ip
    | eval duration_hours=round((last_seen - first_seen) / 3600, 1)
    | eval attempts_per_account=round(total_failures / unique_accounts, 2)
    ``` Slow spray: 20+ accounts, < 4 attempts/account avg, > 2 hours duration ```
    | where unique_accounts >= 20 AND attempts_per_account < 4 AND duration_hours >= 2
    | eval spray_pattern="Low-cadence spray — " + duration_hours + "h duration, " +
                          attempts_per_account + " attempts/account avg"
    | eval mitre_technique="T1110.003"
    | eval mitre_tactic="Credential Access"
    | eval alert_name="Slow-Cadence APT Spray"
    | sort - unique_accounts
    | table first_seen, last_seen, src_ip, unique_accounts, total_failures,
            attempts_per_account, duration_hours, spray_pattern, tried_accounts,
            target_hosts, mitre_technique, mitre_tactic, alert_name

  schedule:
    cron: "0 * * * *"
    earliest: "-25h"
    latest: "now"
    window: "1h"
  throttle:
    field: "src_ip"
    period: "24h"
  actions:
    - notable_event:
        rule_title: "Slow APT Spray from $src_ip$ — $unique_accounts$ accounts over $duration_hours$h"
        rule_description: >
          $src_ip$ conducted a low-cadence password spray against $unique_accounts$ accounts
          over $duration_hours$ hours ($total_failures$ total failures, $attempts_per_account$
          attempts/account). $spray_pattern$. This slow cadence evades lockout policies and
          short-window threshold detection. Correlate with outbound network traffic from $src_ip$
          for C2 or VPN indicators. May indicate APT pre-access activity.
        severity: high
        status: "new"
    - risk_analysis:
        risk_object: "src_ip"
        risk_score: 78
        risk_message: "Slow-cadence spray — $unique_accounts$ accounts over $duration_hours$h — T1110.003"
  false_positives:
    - description: >
        Multiple independent users with wrong cached credentials on different devices
        over 24 hours can aggregate to look like slow spray from a DC's perspective,
        especially if they all share the same exit IP (NAT gateway). Check if src_ip
        is a NAT gateway and whether different usernames correspond to different users.
      tuning: "If src_ip is a corporate NAT gateway, increase unique_accounts threshold to 50+."
    - description: >
        After a domain-wide password policy change, many users' applications will fail
        NTLM authentication for 24-48 hours until they re-authenticate manually.
      tuning: "Correlate with known password policy change events (Event 4739)."


# ██████████████████████████████████████████████████████████████████████████████
#  INVESTIGATION QUERIES
# ██████████████████████████████████████████████████████████████████████████████

investigation_queries:

  iq_1_spray_timeline:
    name: "IQ-1: Full Spray Attack Timeline — From Enumeration to Successful Logon"
    description: >
      Reconstruct the complete spray timeline for a specific source IP, including
      username enumeration (4768/0x6), Kerberos failures (4771/0x18), NTLM failures
      (4625), and successful logons (4624). Replace $SOURCE_IP$.
    query: |
      index=wineventlog sourcetype="XmlWinEventLog:Security"
          EventCode IN (4624, 4625, 4768, 4771, 4776, 4740)
          earliest=-24h
      | eval src_ip=replace(coalesce(IpAddress, Workstation, CallerComputerName), "::ffff:", "")
      | where src_ip="$SOURCE_IP$"
      | eval event_desc=case(
          EventCode=4768 AND Status="0x6",  "Kerbrute: Username NOT FOUND — " + TargetUserName,
          EventCode=4768 AND Status="0x18", "Kerbrute: Pre-auth failed (valid user) — " + TargetUserName,
          EventCode=4768 AND Status="0x0",  "Kerberos TGT SUCCESS — " + TargetUserName,
          EventCode=4771 AND Status="0x18", "Kerberos SPRAY FAIL — " + TargetUserName,
          EventCode=4771,                   "Kerberos fail (status=" + Status + ") — " + TargetUserName,
          EventCode=4776 AND Status="0xC000006A", "NTLM fail (wrong pw) — " + TargetUserName,
          EventCode=4625,                   "NTLM fail (Type=" + LogonType + ", status=" + SubStatus + ") — " + TargetUserName,
          EventCode=4624,                   "LOGON SUCCESS (Type=" + LogonType + ") — " + TargetUserName,
          EventCode=4740,                   "ACCOUNT LOCKED OUT — " + TargetUserName,
          1==1, "EventCode=" + EventCode
        )
      | table _time, EventCode, event_desc, Computer
      | sort _time

  iq_2_spray_scope:
    name: "IQ-2: Spray Scope Assessment — All Accounts Targeted and Their Status"
    description: >
      For each account targeted by a spray from a specific source IP, determine whether
      the spray attempt succeeded. Replace $SOURCE_IP$ and adjust time window.
    query: |
      index=wineventlog sourcetype="XmlWinEventLog:Security"
          EventCode IN (4624, 4625, 4771, 4776)
          earliest=-24h
      | eval src_ip=replace(coalesce(IpAddress, Workstation), "::ffff:", "")
      | where src_ip="$SOURCE_IP$"
      | where NOT match(TargetUserName, "\\$$")
      | where TargetUserName NOT IN ("-", "ANONYMOUS LOGON")
      | eval outcome=case(
          EventCode=4624,         "SUCCESS",
          EventCode IN (4625, 4771, 4776), "FAILURE"
        )
      | stats
          sum(eval(if(outcome="FAILURE",1,0))) as failures,
          sum(eval(if(outcome="SUCCESS",1,0))) as successes
          by TargetUserName, TargetDomainName
      | eval account_status=if(successes > 0, "COMPROMISED — reset password immediately", "failed only")
      | sort - successes, - failures
      | table TargetUserName, TargetDomainName, failures, successes, account_status

  iq_3_post_spray_logon_activity:
    name: "IQ-3: Post-Spray Logon Activity — What Did the Attacker Do After Successful Login?"
    description: >
      After a spray hit, trace the compromised account's activity. Replace $COMPROMISED_ACCOUNT$.
    query: |
      index=wineventlog sourcetype="XmlWinEventLog:Security"
          EventCode IN (4624, 4648, 4672, 4688, 5140, 4697, 4698)
          TargetUserName="$COMPROMISED_ACCOUNT$"
          earliest=-8h
      | eval activity=case(
          EventCode=4624, "Logon Type=" + LogonType + " from " + IpAddress,
          EventCode=4648, "Explicit Cred Logon to " + TargetServerName,
          EventCode=4672, "Special Privileges: " + PrivilegeList,
          EventCode=4688, "Process: " + NewProcessName + " " + CommandLine,
          EventCode=5140, "Share: " + ShareName,
          EventCode=4697, "Service: " + ServiceName,
          EventCode=4698, "Task: " + TaskName,
          1==1, "EventCode=" + EventCode
        )
      | table _time, EventCode, activity, Computer
      | sort _time

  iq_4_distributed_spray:
    name: "IQ-4: Distributed Spray Detection — Same Accounts Targeted From Multiple IPs"
    description: >
      Detect coordinated spray where many source IPs each try few accounts, making
      per-source thresholds ineffective. Looks for accounts targeted from many IPs.
    query: |
      index=wineventlog sourcetype="XmlWinEventLog:Security"
          EventCode IN (4625, 4771, 4776)
          earliest=-1h
      | where (SubStatus IN ("0xC000006A", "0xC000006D"))
          OR (EventCode=4771 AND Status="0x18")
          OR (EventCode=4776 AND Status="0xC000006A")
      | where NOT match(TargetUserName, "\\$$")
      | eval src_ip=replace(coalesce(IpAddress, Workstation), "::ffff:", "")
      | stats
          dc(src_ip) as unique_sources,
          count as total_failures,
          values(src_ip) as source_ips,
          dc(TargetUserName) as unique_accounts_targeted
          by TargetUserName, Computer
      | where unique_sources >= 5
      | eval distributed_spray="Targeted from " + unique_sources + " distinct IPs"
      | sort - unique_sources
      | table TargetUserName, Computer, unique_sources, total_failures,
              distributed_spray, source_ips


# ██████████████████████████████████████████████████████████████████████████████
#  INCIDENT RESPONSE PLAYBOOK
# ██████████████████████████████████████████████████████████████████████████████

incident_response_playbook:
  name: "Password Spraying — Incident Response Playbook"
  version: "1.0.0"
  last_updated: "2026-03-04"

  phase_1_triage:
    timeframe: "0–15 minutes"
    objective: "Confirm spray, identify scope, and determine if credentials were compromised"
    steps:
      - "Run Rule 5 (Spray Hit) search to check if any spray succeeded — this changes priority"
      - "Run IQ-2 to list all targeted accounts and their failure/success status"
      - "Determine source: external IP (internet-facing spray) or internal IP (lateral spray)"
      - "If external: check VPN, OWA, and other internet-facing authentication surfaces"
      - "If internal: this suggests a compromised internal host — treat as active compromise"
      - "Check if targeted accounts include privileged accounts (DA, service accounts)"

  phase_2_containment:
    timeframe: "15–45 minutes"
    steps:
      - "Block the spraying source IP at perimeter firewall, WAF, and NPS (RADIUS)"
      - "If internal source: network-isolate the spraying host via EDR"
      - "If spray hit occurred: immediately disable the compromised account(s)"
      - "Reset passwords for any accounts where spray succeeded (IQ-2 COMPROMISED status)"
      - "If admin account was compromised: isolate all systems where that account was used"
      - "Enable Emergency Kerberos lockout for compromised accounts (set account expiry to now)"

  phase_3_investigation:
    timeframe: "45 minutes – 4 hours"
    steps:
      - "Run IQ-1 (spray timeline) for full attack reconstruction"
      - "Run IQ-3 to trace what the attacker did after successful authentication"
      - "Check password list: identify the common password used (check Event 4776 pattern)"
      - "Determine if this is a targeted attack or opportunistic spray"
      - "Review MFA enforcement: was MFA bypassed? (NTLM spray bypasses MFA)"
      - "Check for synchronized spray from multiple sources (IQ-4 Distributed Spray)"
      - "Review internet-facing authentication logs (VPN, OWA, Azure AD) for same patterns"

  phase_4_remediation:
    timeframe: "4–48 hours"
    steps:
      - "Reset passwords for all accounts targeted in the spray (proactive rotation)"
      - "Priority 1: Compromised accounts, admin accounts, service accounts with SPNs"
      - "Enable MFA for all internet-facing authentication surfaces (VPN, OWA, Azure AD)"
      - "Enforce Conditional Access policies requiring MFA for all remote access"
      - "Consider enabling Fine-Grained Password Policy (FGPP) with longer, complex passwords"
      - "Enable 'Smart Lockout' in Azure AD / Entra ID for cloud-side spray protection"
      - "Review and block IP ranges used in spray from threat intelligence feeds"

  phase_5_post_incident:
    timeframe: "Ongoing"
    steps:
      - "Enable Modern Authentication (OAuth) for all services to support MFA properly"
      - "Consider disabling NTLM authentication for internet-facing services"
      - "Enable Microsoft Entra ID Password Protection to block common passwords"
      - "Implement Passwordless Authentication (FIDO2/Windows Hello) for privileged accounts"
      - "Run the slow-spray rule (Rule 7) in report mode for 30 days to baseline legitimate patterns"
      - "Build automated spray detection with auto-blocking integration via SOAR"
