  false_positives:
    - "Legacy ActiveX controls embedded in old documents — validate document origin and Office version"
    - "Some SharePoint-integrated Office workflows may load IE components — validate with web traffic"


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 12: Kill Chain Correlation — CVE-2026-21509 Full Attack Sequence
# ██████████████████████████████████████████████████████████████████████████████
#
#  Multi-stage correlation rule that combines early-stage (exploit) indicators
#  with late-stage (persistence/C2) indicators to detect the complete Operation
#  Neusploit kill chain. Fires when 3+ stages are observed on the same host
#  within 60 minutes, providing the highest-confidence detection with the
#  lowest false positive rate.
#
#  Confidence  : CRITICAL
#  Severity    : CRITICAL
#  FP Rate     : Near-zero — requires multiple independent indicators to correlate

rule_12_neusploit_kill_chain_correlation:
  name: "Operation Neusploit — Full Kill Chain Correlation"
  description: >
    Multi-stage correlation detecting the complete Operation Neusploit attack
    sequence on a single host within a 60-minute window. Combines: (1) Office
    spawning suspicious child process or outbound connection (exploit stage),
    (2) file drops in known staging directories (payload delivery), (3) COM
    hijacking or Outlook registry modification (persistence), (4) scheduled
    task creation or explorer.exe DLL loading (execution). When 3 or more
    stages are detected on the same host, this indicates confirmed APT28
    compromise with extremely high confidence. Triggers immediate
    host isolation and IR escalation.
  mitre:
    tactic: "Initial Access, Execution, Persistence, Command and Control"
    technique: "T1566.001, T1203, T1546.015, T1053.005, T1071.001"
    sub_technique: ""
    technique_name: "Operation Neusploit Full Kill Chain"
  severity: CRITICAL
  confidence: CRITICAL
  risk_score: 100
  search: >
    index=main sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational"
    (
      (EventCode=1
       (ParentImage="*\\winword.exe" OR ParentImage="*\\outlook.exe")
       (Image="*\\cmd.exe" OR Image="*\\powershell.exe"
        OR Image="*\\schtasks.exe" OR Image="*\\rundll32.exe"))
      OR
      (EventCode=3 Initiated=true
       (Image="*\\winword.exe" OR Image="*\\outlook.exe")
       NOT DestinationHostname="*.microsoft.com")
      OR
      (EventCode=11
       (TargetFilename="*EhStoreShell.dll"
        OR TargetFilename="*SplashScreen.png"
        OR TargetFilename="*VbaProject.OTM"
        OR TargetFilename="*\\2_2.d"
        OR TargetFilename="*\\table.d"
        OR TargetFilename="*Diagnostics\\office.xml"))
      OR
      (EventCode IN (12,13)
       (TargetObject="*D9144DCD-E998-4ECA-AB6A-DCD83CCBA16D*"
        OR (TargetObject="*\\Outlook\\Security*" Details="DWORD (0x00000001)")
        OR TargetObject="*LoadMacroProviderOnBoot*"))
      OR
      (EventCode=1 Image="*\\schtasks.exe"
       CommandLine="*OneDriveHealth*")
      OR
      (EventCode=7 Image="*\\explorer.exe"
       ImageLoaded="*\\ProgramData\\*\\EhStoreShell.dll")
    )
    | eval stage=case(
      EventCode=1 AND (like(ParentImage, "%winword.exe") OR like(ParentImage, "%outlook.exe")),
        "1_exploit_execution",
      EventCode=3, "1_exploit_download",
      EventCode=11, "2_payload_delivery",
      EventCode IN (12,13), "3_persistence_install",
      EventCode=1 AND like(CommandLine, "%OneDriveHealth%"), "3_scheduled_task",
      EventCode=7 AND like(Image, "%explorer.exe%"), "4_implant_loading",
      1=1, "related_activity")
    | stats dc(stage) as stages_observed
      values(stage) as attack_stages
      count min(_time) as first_seen max(_time) as last_seen
      values(Image) as processes
      values(TargetFilename) as dropped_files
      values(TargetObject) as registry_keys
      values(CommandLine) as commands
      values(User) as users
      by Computer
    | where stages_observed >= 3
    | eval time_span_minutes=round((last_seen - first_seen)/60, 1)
    | where time_span_minutes <= 60
    | eval first_seen=strftime(first_seen, "%Y-%m-%d %H:%M:%S")
    | eval last_seen=strftime(last_seen, "%Y-%m-%d %H:%M:%S")
    | eval alert_context="CONFIRMED APT28 OPERATION NEUSPLOIT — ISOLATE HOST, INVOKE IR PLAN"
    | table Computer stages_observed attack_stages processes dropped_files
      registry_keys commands users time_span_minutes first_seen last_seen
      alert_context
  schedule:
    cron: "*/10 * * * *"
    window: "-65m@m"
  throttle:
    field: "Computer"
    period: "60m"
  actions:
    notable:
      rule_title: "CRITICAL: APT28 Neusploit kill chain confirmed on $Computer$ ($stages_observed$ stages)"
      severity: critical
      drilldown_search: >
        index=main Computer="$Computer$" earliest=-2h
        sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational"
        ("winword" OR "outlook" OR "EhStoreShell" OR "SplashScreen"
         OR "VbaProject" OR "OneDriveHealth" OR "D9144DCD"
         OR "freefoodaid" OR "wellnesscaremed")
    risk:
      score: 100
      object_type: "system"
      object_field: "Computer"
  false_positives:
    - "None expected — correlation of 3+ independent Neusploit-specific indicators within 60 minutes is definitive"


# ==============================================================================
#  INVESTIGATION QUERIES
# ==============================================================================
#
#  Run these manually during triage and incident response after any of the
#  above rules fire. Replace $HOSTNAME$ with the affected system name.
# ==============================================================================

investigation_queries:

  inv_1_full_process_tree:
    name: "Full Process Tree — Office Child Process Genealogy"
    description: >
      Reconstruct the complete process tree from the Office application
      through all descendant processes to identify the full exploit chain.
    search: >
      index=main sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational"
      EventCode=1 Computer="$HOSTNAME$"
      earliest=-24h
      | eval parent=ParentImage, child=Image
      | search parent="*\\winword.exe" OR parent="*\\outlook.exe"
        OR parent="*\\cmd.exe" OR parent="*\\powershell.exe"
        OR parent="*\\schtasks.exe" OR parent="*\\rundll32.exe"
        OR parent="*\\explorer.exe"
      | table _time Computer User ParentImage ParentCommandLine
        Image CommandLine Hashes
      | sort _time

  inv_2_registry_modifications:
    name: "Registry Modifications — COM Hijacking and Outlook Persistence"
    description: >
      Identify all registry modifications on the compromised host, focusing
      on COM object registration, Outlook security settings, and Run keys.
    search: >
      index=main sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational"
      (EventCode=12 OR EventCode=13 OR EventCode=14) Computer="$HOSTNAME$"
      earliest=-24h
      (TargetObject="*\\Classes\\CLSID\\*"
       OR TargetObject="*\\Outlook\\*"
       OR TargetObject="*\\Run\\*"
       OR TargetObject="*\\RunOnce\\*"
       OR TargetObject="*\\InProcServer32*"
       OR TargetObject="*LoadMacroProviderOnBoot*")
      | table _time EventCode TargetObject Details Image User
      | sort _time

  inv_3_file_creation_timeline:
    name: "File Creation Timeline — Dropped Artifacts"
    description: >
      List all files created on the compromised host in staging directories
      to identify dropped payloads, scripts, and persistence artifacts.
    search: >
      index=main sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational"
      EventCode=11 Computer="$HOSTNAME$"
      earliest=-24h
      (TargetFilename="*\\ProgramData\\*"
       OR TargetFilename="*\\AppData\\*"
       OR TargetFilename="*\\Temp\\*"
       OR TargetFilename="*\\Public\\*"
       OR TargetFilename="*\\Downloads\\*"
       OR TargetFilename="*VbaProject*"
       OR TargetFilename="*.d"
       OR TargetFilename="*.dll"
       OR TargetFilename="*.xml"
       OR TargetFilename="*.msg")
      | table _time TargetFilename Image User
      | sort _time

  inv_4_network_connections:
    name: "Network Connections — C2 and Exfiltration"
    description: >
      Map all outbound network connections from the compromised host to
      identify C2 channels, data exfiltration, and attacker infrastructure.
    search: >
      index=main sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational"
      EventCode=3 Initiated=true Computer="$HOSTNAME$"
      earliest=-24h
      NOT (DestinationIp="10.*" OR DestinationIp="172.16.*"
           OR DestinationIp="192.168.*" OR DestinationIp="127.*")
      | table _time Image DestinationIp DestinationHostname DestinationPort
        User Protocol
      | sort _time

  inv_5_scheduled_task_audit:
    name: "Scheduled Task Audit — Persistence Mechanism"
    description: >
      Identify all scheduled task creation and modification events on the
      host, focusing on tasks created after the exploit timestamp.
    search: >
      (index=main sourcetype="XmlWinEventLog:Security"
       (EventCode=4698 OR EventCode=4699 OR EventCode=4702)
       Computer="$HOSTNAME$" earliest=-24h)
      OR
      (index=main sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational"
       EventCode=1 Computer="$HOSTNAME$" Image="*\\schtasks.exe"
       earliest=-24h)
      | table _time EventCode sourcetype TaskName CommandLine User
      | sort _time

  inv_6_dll_loads_by_explorer:
    name: "DLL Loads by Explorer.exe — COM Hijacking Verification"
    description: >
      List all DLLs loaded by explorer.exe to identify hijacked COM objects
      and malicious modules loaded via the PixyNetLoader persistence chain.
    search: >
      index=main sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational"
      EventCode=7 Image="*\\explorer.exe" Computer="$HOSTNAME$"
      earliest=-24h
      NOT (ImageLoaded="C:\\Windows\\System32\\*"
           OR ImageLoaded="C:\\Windows\\SysWOW64\\*"
           OR ImageLoaded="C:\\Program Files\\*"
           OR ImageLoaded="C:\\Program Files (x86)\\*")
      | table _time ImageLoaded Hashes Signed SignatureStatus Company User
      | sort _time

  inv_7_email_exfiltration:
    name: "Email Exfiltration — MiniDoor Activity"
    description: >
      Search for evidence of MiniDoor email theft including references to
      known exfiltration addresses, temp_email.msg staging files, and
      Outlook VBA project modifications.
    search: >
      index=main Computer="$HOSTNAME$" earliest=-72h
      ("ahmeclaw2002" OR "ahmeclaw@proton" OR "temp_email.msg"
       OR "VbaProject.OTM" OR "adjgfenkbe")
      | table _time sourcetype EventCode _raw
      | sort _time


# ==============================================================================
#  INCIDENT RESPONSE PLAYBOOK — CVE-2026-21509 / Operation Neusploit
# ==============================================================================

incident_response_playbook:

  step_1_immediate_containment:
    action: "ISOLATE affected host from the network immediately"
    details: >
      CVE-2026-21509 exploitation delivers persistent implants within minutes.
      Network isolation prevents C2 communication (Covenant Grunt via filen.io)
      and email exfiltration (MiniDoor via ahmeclaw addresses). Do NOT power off
      the host — preserve volatile memory for forensic analysis.

  step_2_identify_scope:
    action: "Determine blast radius — identify all recipients of the phishing email"
    details: >
      Search email gateway logs for the malicious RTF attachment by subject line,
      sender, or attachment hash. Cross-reference with mail flow rules to identify
      all recipients who may have received the weaponized document. Check if any
      other hosts contacted freefoodaid[.]com or wellnesscaremed[.]com.

  step_3_collect_evidence:
    action: "Preserve forensic artifacts before remediation"
    details: >
      Collect the following before any cleanup:
        1. Memory dump of the affected system (for Covenant Grunt implant analysis)
        2. Copy of %AppData%\Microsoft\Outlook\VbaProject.OTM (MiniDoor macro)
        3. Copy of %ProgramData%\USOPublic\Data\User\EhStoreShell.dll
        4. Copy of %ProgramData%\Microsoft OneDrive\setup\Cache\SplashScreen.png
        5. Registry export of HKCU\Software\Classes\CLSID
        6. Registry export of HKCU\Software\Microsoft\Office\16.0\Outlook
        7. Scheduled task export: schtasks /query /v /fo csv
        8. Full Sysmon and Security event log export

  step_4_analyze_email_compromise:
    action: "Assess email data theft scope (MiniDoor)"
    details: >
      MiniDoor steals emails from Inbox, Junk, and Drafts folders. Determine:
        1. How long was VbaProject.OTM active? (Check file creation timestamp)
        2. Review Outlook Sent Items for emails to ahmeclaw2002@outlook.com
           and ahmeclaw@proton.me
        3. Estimate volume of compromised emails
        4. Identify sensitive content in stolen emails (credentials, strategy docs,
           classified information)
        5. Notify affected parties per data breach notification requirements

  step_5_remediate:
    action: "Remove all persistence mechanisms and patch the vulnerability"
    details: >
      Execute in order:
        1. Delete VbaProject.OTM from %AppData%\Microsoft\Outlook\
        2. Delete EhStoreShell.dll from %ProgramData%\USOPublic\Data\User\
        3. Delete SplashScreen.png from %ProgramData%\Microsoft OneDrive\setup\Cache\
        4. Remove registry key: HKCU\Software\Classes\CLSID\{D9144DCD-E998-4ECA-AB6A-DCD83CCBA16D}
        5. Restore Outlook security registry settings:
           - HKCU\...\Outlook\Security\Level = 3 (or delete)
           - Delete LoadMacroProviderOnBoot value
           - Reset PONT_STRING to default
        6. Delete scheduled task "OneDriveHealth" if still present
        7. Apply Microsoft patch for CVE-2026-21509 (KB5053624 or later)
        8. Apply COM Compatibility kill bit for {EAB22AC3-30C1-11CF-A7EB-0000C05BAE0B}
        9. Reset user credentials — assume all cached credentials are compromised
       10. Scan host with updated AV/EDR signatures for Covenant Grunt artifacts

  step_6_hunt_for_lateral_movement:
    action: "Hunt for evidence of lateral movement from the compromised host"
    details: >
      The Covenant Grunt implant provides full C2 capabilities including:
        1. Search for RDP, SMB, WinRM connections originating from the
           compromised host to internal systems
        2. Check for new user accounts or privilege escalation events
        3. Review authentication logs for pass-the-hash or token theft
        4. Check network logs for Cobalt Strike, Covenant, or Grunt beacons
        5. Scan for the filen.io C2 parent folder UUID (fe644d8c-2601-46ea-bf7d-3db110aa08d4)
           in proxy/web logs

  step_7_report_and_share:
    action: "Report to CISA and share IOCs with sector ISAC"
    details: >
      APT28 campaigns typically target multiple organizations simultaneously.
      Report the incident to CISA (us-cert.cisa.gov/report) and share
      sanitized IOCs with your sector ISAC. Include any new infrastructure
      indicators (domains, IPs, hashes) not covered in the original
      Zscaler ThreatLabz report. Update organizational threat intelligence
      feeds with all confirmed IOCs from this incident.
