    Image="*\\explorer.exe"
    (ImageLoaded="*\\ProgramData\\*"
     OR ImageLoaded="*\\AppData\\*"
     OR ImageLoaded="*\\Temp\\*"
     OR ImageLoaded="*\\Public\\*"
