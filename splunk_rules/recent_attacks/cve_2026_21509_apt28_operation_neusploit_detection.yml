#    freefoodaid[.]com
#    wellnesscaremed[.]com
#
#  Exfiltration Email Addresses:
#    ahmeclaw2002@outlook[.]com
#    ahmeclaw@proton[.]me
#
#  Mutex Names:
#    adjgfenkbe        (MiniDoor)
#    asagdugughi41     (PixyNetLoader)
#    dvyubgbqfusdv32   (Shellcode loader)
#
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 1: CVE-2026-21509 — Office Spawning Suspicious Child Process
# ██████████████████████████████████████████████████████████████████████████████
#
#  Core exploit detection. When CVE-2026-21509 is triggered via a malicious RTF,
#  WINWORD.EXE instantiates Shell.Explorer.1 which downloads and executes a
#  payload. This manifests as Office spawning cmd.exe, powershell.exe, rundll32,
#  mshta, schtasks, or other suspicious child processes.
#
#  Confidence  : HIGH
#  Severity    : CRITICAL
#  FP Rate     : Very low — Office should never spawn shell interpreters
#  Tools caught: All CVE-2026-21509 exploits, Operation Neusploit, generic
#                Office RCE exploitation

rule_1_office_spawning_suspicious_child:
  name: "CVE-2026-21509 — Office Application Spawning Suspicious Child Process"
  description: >
    Detects Microsoft Office applications (WINWORD.EXE, EXCEL.EXE, POWERPNT.EXE,
    OUTLOOK.EXE) spawning suspicious child processes such as cmd.exe, powershell.exe,
    mshta.exe, wscript.exe, cscript.exe, rundll32.exe, regsvr32.exe, schtasks.exe,
    or certutil.exe. This is the primary behavioral indicator of CVE-2026-21509
    exploitation where the Shell.Explorer.1 COM object bypass triggers payload
    download and execution without macro interaction. In Operation Neusploit,
    APT28 used this technique to drop MiniDoor and PixyNetLoader payloads.
  mitre:
    tactic: "Execution"
    technique: "T1203"
    sub_technique: ""
    technique_name: "Exploitation for Client Execution"
  severity: CRITICAL
  confidence: HIGH
  risk_score: 95
  search: >
    index=main sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational"
    EventCode=1
    (ParentImage="*\\winword.exe" OR ParentImage="*\\excel.exe"
     OR ParentImage="*\\powerpnt.exe" OR ParentImage="*\\outlook.exe"
     OR ParentImage="*\\msaccess.exe" OR ParentImage="*\\mspub.exe")
    (Image="*\\cmd.exe" OR Image="*\\powershell.exe" OR Image="*\\pwsh.exe"
     OR Image="*\\mshta.exe" OR Image="*\\wscript.exe" OR Image="*\\cscript.exe"
     OR Image="*\\rundll32.exe" OR Image="*\\regsvr32.exe"
     OR Image="*\\schtasks.exe" OR Image="*\\certutil.exe"
     OR Image="*\\bitsadmin.exe" OR Image="*\\msiexec.exe"
     OR Image="*\\net.exe" OR Image="*\\net1.exe"
     OR Image="*\\taskkill.exe" OR Image="*\\whoami.exe")
    | eval parent_process=mvindex(split(ParentImage, "\\"), -1)
    | eval child_process=mvindex(split(Image, "\\"), -1)
    | stats count min(_time) as first_seen max(_time) as last_seen
      values(CommandLine) as command_lines
      values(child_process) as child_processes
      values(User) as users
      values(ParentCommandLine) as parent_cmdlines
      by Computer parent_process
    | where count >= 1
    | eval first_seen=strftime(first_seen, "%Y-%m-%d %H:%M:%S")
    | eval last_seen=strftime(last_seen, "%Y-%m-%d %H:%M:%S")
    | table Computer parent_process child_processes command_lines users
      parent_cmdlines first_seen last_seen count
  schedule:
    cron: "*/5 * * * *"
    window: "-6m@m"
  throttle:
    field: "Computer"
    period: "15m"
  actions:
    notable:
      rule_title: "CVE-2026-21509: Office spawned suspicious child process on $Computer$"
      severity: critical
      drilldown_search: >
        index=main sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational"
        EventCode=1 Computer="$Computer$"
        (ParentImage="*\\winword.exe" OR ParentImage="*\\outlook.exe")
        earliest=-1h
    risk:
      score: 95
      object_type: "system"
      object_field: "Computer"
  false_positives:
    - "Legitimate Office add-ins that invoke cmd.exe or powershell.exe — add to allowlist by ParentCommandLine"
    - "Macro-enabled documents in trusted workflows — filter by User and CommandLine pattern"
    - "IT administration scripts triggered from Office — validate with user and source document"


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 2: CVE-2026-21509 — Office Outbound Network Connection to Unknown Host
# ██████████████████████████████████████████████████████████████████████████████
#
#  Detects WINWORD.EXE or other Office processes initiating outbound network
#  connections. In the exploit chain, the Shell.Explorer.1 COM object downloads
#  the dropper DLL (2_2.d or table.d) from freefoodaid[.]com or
#  wellnesscaremed[.]com. Legitimate Office should rarely make outbound HTTP(S)
#  connections to non-Microsoft domains.
#
#  Confidence  : HIGH
#  Severity    : HIGH
#  FP Rate     : Medium — Office contacts Microsoft/CDN domains legitimately

rule_2_office_outbound_network_connection:
  name: "CVE-2026-21509 — Office Process Outbound Network Connection"
  description: >
    Detects Microsoft Office processes making outbound network connections to
    external IP addresses. CVE-2026-21509 exploitation triggers the embedded
    Shell.Explorer.1 COM object to download malicious payloads from
    attacker-controlled infrastructure. In Operation Neusploit, dropper DLLs
    were retrieved from freefoodaid[.]com and wellnesscaremed[.]com. This rule
    excludes known Microsoft CDN and update domains to reduce false positives.
  mitre:
    tactic: "Command and Control"
    technique: "T1071.001"
    sub_technique: ""
    technique_name: "Application Layer Protocol: Web Protocols"
  severity: HIGH
  confidence: HIGH
  risk_score: 85
  search: >
    index=main sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational"
    EventCode=3 Initiated=true
    (Image="*\\winword.exe" OR Image="*\\excel.exe"
     OR Image="*\\powerpnt.exe" OR Image="*\\outlook.exe")
    NOT (DestinationHostname="*.microsoft.com"
         OR DestinationHostname="*.office.com"
         OR DestinationHostname="*.office365.com"
         OR DestinationHostname="*.live.com"
         OR DestinationHostname="*.windows.net"
         OR DestinationHostname="*.sharepoint.com"
         OR DestinationHostname="*.msftconnecttest.com"
         OR DestinationHostname="*.akamaized.net"
         OR DestinationHostname="*.microsoftonline.com"
         OR DestinationHostname="ocsp.digicert.com"
         OR DestinationHostname="*.verisign.com"
         OR DestinationHostname="*.symantec.com")
    NOT (DestinationIp="10.*" OR DestinationIp="172.16.*"
         OR DestinationIp="172.17.*" OR DestinationIp="172.18.*"
         OR DestinationIp="172.19.*" OR DestinationIp="172.2*"
         OR DestinationIp="172.30.*" OR DestinationIp="172.31.*"
         OR DestinationIp="192.168.*" OR DestinationIp="127.*")
    | eval office_process=mvindex(split(Image, "\\"), -1)
    | stats count min(_time) as first_seen max(_time) as last_seen
      values(DestinationIp) as dest_ips
      values(DestinationHostname) as dest_hosts
      values(DestinationPort) as dest_ports
      values(User) as users
      by Computer office_process
    | where count >= 1
    | eval first_seen=strftime(first_seen, "%Y-%m-%d %H:%M:%S")
    | eval last_seen=strftime(last_seen, "%Y-%m-%d %H:%M:%S")
    | table Computer office_process dest_hosts dest_ips dest_ports users
      first_seen last_seen count
  schedule:
    cron: "*/5 * * * *"
    window: "-6m@m"
  throttle:
    field: "Computer"
    period: "15m"
  actions:
    notable:
      rule_title: "CVE-2026-21509: Office process connected to external host on $Computer$"
      severity: high
      drilldown_search: >
        index=main sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational"
        EventCode=3 Computer="$Computer$" Image="*\\winword.exe"
        earliest=-1h
    risk:
      score: 85
      object_type: "system"
      object_field: "Computer"
  false_positives:
    - "Office connecting to legitimate third-party cloud services (Dropbox, Google) — add to domain exclusion list"
    - "Office add-ins with telemetry callbacks — validate by DestinationHostname and add to allowlist"


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 3: Operation Neusploit — Known IOC Domain Communication
# ██████████████████████████████████████████████████████████████████████████████
#
#  Direct IOC match. Detects any DNS query or network connection to the known
#  Operation Neusploit C2 domains: freefoodaid[.]com, wellnesscaremed[.]com,
#  and filen[.]io (used for Covenant Grunt C2).
#
#  Confidence  : CRITICAL
#  Severity    : CRITICAL
#  FP Rate     : Near-zero — these domains are confirmed APT28 infrastructure

rule_3_neusploit_known_domains:
  name: "Operation Neusploit — Communication with Known APT28 C2 Domains"
  description: >
    Detects DNS queries or network connections to confirmed Operation Neusploit
    infrastructure. APT28 used freefoodaid[.]com and wellnesscaremed[.]com to
    host dropper payloads (2_2.d, table.d) downloaded via the CVE-2026-21509
    exploit. The Covenant Grunt implant communicates with filen.io as C2.
    Any communication to these domains indicates active compromise.
  mitre:
    tactic: "Command and Control"
    technique: "T1071.001"
    sub_technique: ""
    technique_name: "Application Layer Protocol: Web Protocols"
  severity: CRITICAL
  confidence: CRITICAL
  risk_score: 100
  search: >
    (index=main sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational"
     EventCode=22
     (QueryName="*freefoodaid.com" OR QueryName="*wellnesscaremed.com"))
    OR
    (index=main sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational"
     EventCode=3
     (DestinationHostname="*freefoodaid.com"
      OR DestinationHostname="*wellnesscaremed.com"))
    OR
    (index=main sourcetype="stream:dns"
     (query="*freefoodaid.com" OR query="*wellnesscaremed.com"))
    OR
    (index=proxy OR index=web
     (url="*freefoodaid.com*" OR url="*wellnesscaremed.com*"
      OR dest="*freefoodaid.com" OR dest="*wellnesscaremed.com"))
    | eval data_source=sourcetype
    | eval domain=coalesce(QueryName, DestinationHostname, query, dest)
    | stats count min(_time) as first_seen max(_time) as last_seen
      values(Image) as processes
      values(DestinationIp) as dest_ips
      values(User) as users
      values(data_source) as sources
      by Computer domain
    | eval first_seen=strftime(first_seen, "%Y-%m-%d %H:%M:%S")
    | eval last_seen=strftime(last_seen, "%Y-%m-%d %H:%M:%S")
    | eval alert_context="CONFIRMED APT28 INFRASTRUCTURE — IMMEDIATE ESCALATION REQUIRED"
    | table Computer domain dest_ips processes users sources
      first_seen last_seen count alert_context
  schedule:
    cron: "*/2 * * * *"
    window: "-3m@m"
  throttle:
    field: "Computer"
    period: "5m"
  actions:
    notable:
      rule_title: "CRITICAL: APT28 Neusploit C2 domain contacted by $Computer$"
      severity: critical
      drilldown_search: >
        index=main Computer="$Computer$"
        ("freefoodaid.com" OR "wellnesscaremed.com")
        earliest=-24h
    risk:
      score: 100
      object_type: "system"
      object_field: "Computer"
  false_positives:
    - "None expected — these are confirmed APT28 attack infrastructure domains"


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 4: Operation Neusploit — Known IOC File Hash Match
# ██████████████████████████████████████████████████████████████████████████████
#
#  Hash-based IOC matching against all known Operation Neusploit file artifacts.
#  Matches SHA256, MD5, and SHA1 hashes from Sysmon FileCreate (11), Process
#  Create (1), and Image Load (7) events.
#
#  Confidence  : CRITICAL
#  Severity    : CRITICAL
#  FP Rate     : Zero — cryptographic hash match

rule_4_neusploit_file_hash_ioc:
  name: "Operation Neusploit — Known Malware File Hash Detected"
  description: >
    Detects the presence of known Operation Neusploit malware artifacts by
    matching SHA256, MD5, or SHA1 file hashes against confirmed IOCs from
    the Zscaler ThreatLabz report. Covers RTF exploit documents, MiniDoor
    dropper, PixyNetLoader dropper, EhStoreShell.dll shellcode loader,
    SplashScreen.png steganographic payload, office.xml scheduled task,
    VbaProject.OTM macro persistence, and Covenant Grunt implant.
  mitre:
    tactic: "Execution"
    technique: "T1204.002"
    sub_technique: ""
    technique_name: "User Execution: Malicious File"
  severity: CRITICAL
  confidence: CRITICAL
  risk_score: 100
  search: >
    index=main sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational"
    (EventCode=1 OR EventCode=6 OR EventCode=7 OR EventCode=11 OR EventCode=15)
    (Hashes="*b2ba51b4491da8604ff9410d6e004971e3cd9a321390d0258e294ac42010b546*"
     OR Hashes="*1ed863a32372160b3a25549aad25d48d5352d9b4f58d4339408c4eea69807f50*"
     OR Hashes="*5a17cfaea0cc3a82242fdd11b53140c0b56256d769b07c33757d61e0a0a6ec02*"
     OR Hashes="*fd3f13db41cd5b442fa26ba8bc0e9703ed243b3516374e3ef89be71cbf07436b*"
     OR Hashes="*c91183175ce77360006f964841eb4048cf37cb82103f2573e262927be4c7607f*"
     OR Hashes="*a944a09783023a2c6c62d3601cbd5392a03d808a6a51728e07a3270861c2a8ee*"
     OR Hashes="*bb23545380fde9f48ad070f88fe0afd695da5fcae8c5274814858c5a681d8c4e*"
     OR Hashes="*0bb0d54033767f081cae775e3cf9ede7ae6bea75f35fbfb748ccba9325e28e5e*"
     OR Hashes="*a876f648991711e44a8dcf888a271880c6c930e5138f284cd6ca6128eca56ba1*"
     OR Hashes="*2822c72a59b58c00fc088aa551cdeeb92ca10fd23e23745610ff207f53118db9*"
     OR Hashes="*9f4672c1374034ac4556264f0d4bf96ee242c0b5a9edab4715b5e61fe8d55cc8*"
     OR Hashes="*3f446d316efe2514efd70c975d0c87e12357db9fca54a25834d60b28192c6a69*"
     OR Hashes="*95e59536455a089ced64f5af2539a449*"
     OR Hashes="*2f7b4dca1c79e525aef8da537294a6c4*"
     OR Hashes="*f3b869a8d5ad243e35963ba6d7f89855*"
     OR Hashes="*859c4b85ed85e6cc4eadb1a037a61e16*"
     OR Hashes="*e4a5c4b205e1b80dc20d9a2fb4126d06*"
     OR Hashes="*ea6615942f2c23dba7810a6f7d69e2da*")
    | eval file_name=coalesce(TargetFilename, Image, ImageLoaded)
    | eval hash_value=Hashes
    | stats count min(_time) as first_seen max(_time) as last_seen
      values(file_name) as file_paths
      values(EventCode) as event_codes
      values(User) as users
      by Computer hash_value
    | eval first_seen=strftime(first_seen, "%Y-%m-%d %H:%M:%S")
    | eval last_seen=strftime(last_seen, "%Y-%m-%d %H:%M:%S")
    | eval alert_context="CONFIRMED NEUSPLOIT MALWARE — ISOLATE HOST IMMEDIATELY"
    | table Computer file_paths hash_value event_codes users
      first_seen last_seen count alert_context
  schedule:
    cron: "*/5 * * * *"
    window: "-6m@m"
  throttle:
    field: "Computer"
    period: "10m"
  actions:
    notable:
      rule_title: "CRITICAL: Neusploit malware hash detected on $Computer$"
      severity: critical
      drilldown_search: >
        index=main sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational"
        Computer="$Computer$" earliest=-24h
        | search Hashes="*$hash_value$*"
    risk:
      score: 100
      object_type: "system"
      object_field: "Computer"
  false_positives:
    - "None — cryptographic hash collision is computationally infeasible"


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 5: PixyNetLoader — COM Hijacking via EhStoreShell.dll
# ██████████████████████████████████████████████████████████████████████████████
#
#  Detects COM object hijacking used by PixyNetLoader for persistence.
#  The malware creates/modifies the registry key:
#    HKCU\Software\Classes\CLSID\{D9144DCD-E998-4ECA-AB6A-DCD83CCBA16D}\InProcServer32
#  pointing to EhStoreShell.dll in %ProgramData%\USOPublic\Data\User\.
#  When explorer.exe loads this COM object, it executes the shellcode loader.
#
#  Confidence  : HIGH
#  Severity    : CRITICAL
#  FP Rate     : Very low — this specific CLSID hijack is unique to Neusploit

rule_5_pixynetloader_com_hijacking:
  name: "PixyNetLoader — COM Object Hijacking for Persistence"
  description: >
    Detects COM object hijacking used by APT28's PixyNetLoader malware. The
    malware registers a malicious InProcServer32 DLL (EhStoreShell.dll) under
    CLSID {D9144DCD-E998-4ECA-AB6A-DCD83CCBA16D} in HKCU\Software\Classes.
    When explorer.exe instantiates this COM object, it loads the attacker's DLL
    which extracts shellcode from a steganographic PNG (SplashScreen.png) and
    deploys a Covenant Grunt C2 implant. This rule also detects generic COM
    hijacking where InProcServer32 points to DLLs in ProgramData or user-writable
    directories.
  mitre:
    tactic: "Persistence"
    technique: "T1546.015"
    sub_technique: ""
    technique_name: "Event Triggered Execution: Component Object Model Hijacking"
  severity: CRITICAL
  confidence: HIGH
  risk_score: 90
  search: >
    index=main sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational"
    (EventCode=12 OR EventCode=13)
    TargetObject="*\\Software\\Classes\\CLSID\\*\\InProcServer32*"
    NOT (Details="*\\Windows\\System32\\*"
         OR Details="*\\Windows\\SysWOW64\\*"
         OR Details="*\\Program Files\\*"
         OR Details="*\\Program Files (x86)\\*")
    | eval is_neusploit_clsid=if(like(TargetObject,
