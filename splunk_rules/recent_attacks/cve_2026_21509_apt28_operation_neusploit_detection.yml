# ==============================================================================
#  CVE-2026-21509 / APT28 Operation Neusploit — Splunk Detection Rules
# ==============================================================================
#  Description : Multi-layered detection for CVE-2026-21509 exploitation and
#                APT28 (UAC-0001 / Fancy Bear) Operation Neusploit campaign.
#                CVE-2026-21509 is a Microsoft Office OLE Security Feature Bypass
#                (CVSS 7.8) that abuses the Shell.Explorer.1 COM object
#                (CLSID {EAB22AC3-30C1-11CF-A7EB-0000C05BAE0B}) embedded in
#                malicious RTF documents to achieve remote code execution without
#                macros or user interaction beyond opening the file.
#
#                The campaign delivers two payloads:
#                  1. MiniDoor — Outlook VBA-based email stealer
#                  2. PixyNetLoader — COM-hijacking loader deploying Covenant
#                     Grunt C2 implant via steganographic PNG shellcode
#
#  MITRE ATT&CK: T1566.001, T1203, T1204.002, T1106, T1053.005, T1546.015,
#                T1137.006, T1140, T1027.003, T1027.007, T1480.002, T1497.003,
#                T1114, T1071.001, T1102.002, T1112
#  Kill Chain   : Initial Access → Execution → Persistence → Collection → C2
#  Platform     : Splunk Enterprise / Splunk Cloud (ES compatible)
#  Data Sources : XmlWinEventLog:Security, XmlWinEventLog:Microsoft-Windows-Sysmon/Operational,
#                 XmlWinEventLog:Microsoft-Windows-PowerShell/Operational,
#                 XmlWinEventLog:System
#  Author       : Krishnendu
#  Version      : 1.0.0
#  Created      : 2026-03-06
#  License      : MIT
#
#  References:
#    - https://www.zscaler.com/blogs/security-research/apt28-leverages-cve-2026-21509-operation-neusploit
#    - https://msrc.microsoft.com/update-guide/vulnerability/CVE-2026-21509
#    - https://www.cisa.gov/news-events/alerts/2026/01/26/cisa-adds-five-known-exploited-vulnerabilities-catalog
#    - https://logpoint.com/en/blog/breaking-the-kill-bit-active-exploitation-of-cve-2026-21509-in-microsoft-office
#    - https://github.com/decalage2/detect_CVE-2026-21509
# ==============================================================================
#
#  PREREQUISITES:
#
#  1. Sysmon deployed on all endpoints with the following event types enabled:
#     - Event 1  (Process Creation) with command-line and parent process logging
#     - Event 3  (Network Connection) for Office process outbound connections
#     - Event 7  (Image Load) for DLL loading into Office and explorer.exe
#     - Event 11 (File Create) for dropped files in AppData, ProgramData, Temp
#     - Event 12/13 (Registry Create/Set) for COM hijacking and Outlook keys
#
#  2. Enable Audit Policy on all endpoints:
#     - "Audit Process Creation" (Success) with command-line logging
#     - "Audit Object Access" (Success) for scheduled task creation
#
#  3. PowerShell Script Block Logging (Event 4104) enabled via GPO
#
#  4. Splunk Universal Forwarder on all endpoints forwarding:
#     - Security, Sysmon, PowerShell, and System event logs
#
#  5. Upload the following lookup tables to Splunk:
#     - neusploit_ioc_hashes.csv   (sha256, md5, sha1, filename, malware_family)
#     - neusploit_ioc_domains.csv  (domain, url, description)
#
# ==============================================================================

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
#  IOC REFERENCE — Operation Neusploit File Hashes (SHA256)
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
#
#  RTF Exploit Documents:
#    b2ba51b4491da8604ff9410d6e004971e3cd9a321390d0258e294ac42010b546  Consultation_Topics_Ukraine(Final).doc
#    1ed863a32372160b3a25549aad25d48d5352d9b4f58d4339408c4eea69807f50  Courses.doc
#    5a17cfaea0cc3a82242fdd11b53140c0b56256d769b07c33757d61e0a0a6ec02  (unnamed RTF)
#    fd3f13db41cd5b442fa26ba8bc0e9703ed243b3516374e3ef89be71cbf07436b  1291.doc
#    c91183175ce77360006f964841eb4048cf37cb82103f2573e262927be4c7607f  BULLETEN_H.doc
#
#  MiniDoor Dropper:
#    a944a09783023a2c6c62d3601cbd5392a03d808a6a51728e07a3270861c2a8ee  2_2.d
#
#  MiniDoor VBA Project:
#    bb23545380fde9f48ad070f88fe0afd695da5fcae8c5274814858c5a681d8c4e  VbaProject.OTM
#
#  PixyNetLoader Dropper:
#    0bb0d54033767f081cae775e3cf9ede7ae6bea75f35fbfb748ccba9325e28e5e  table.d
#
#  Shellcode Loader:
#    a876f648991711e44a8dcf888a271880c6c930e5138f284cd6ca6128eca56ba1  EhStoreShell.dll
#
#  Steganographic PNG:
#    2822c72a59b58c00fc088aa551cdeeb92ca10fd23e23745610ff207f53118db9  SplashScreen.png
#
#  Scheduled Task XML:
#    9f4672c1374034ac4556264f0d4bf96ee242c0b5a9edab4715b5e61fe8d55cc8  office.xml
#
#  Covenant Grunt Implant:
#    3f446d316efe2514efd70c975d0c87e12357db9fca54a25834d60b28192c6a69  (in-memory)
