# ██████████████████████████████████████████████████████████████████████████████
#  RULE 6: MiniDoor — Outlook Macro Security Downgrade
# ██████████████████████████████████████████████████████████████████████████████
#
#  Detects MiniDoor's Outlook persistence mechanism. The malware modifies
#  Outlook registry settings to enable all macros (Level=1), disable content
#  warnings (PONT_STRING=0x20), and auto-load macros at boot
#  (LoadMacroProviderOnBoot=1). It then installs a malicious VbaProject.OTM
#  that steals emails and forwards them to attacker-controlled addresses.
#
#  Confidence  : HIGH
#  Severity    : CRITICAL
#  FP Rate     : Very low — these specific registry changes are highly suspicious

rule_6_minidoor_outlook_macro_downgrade:
  name: "MiniDoor — Outlook Macro Security Registry Downgrade"
  description: >
    Detects the MiniDoor email stealer's persistence mechanism. APT28's MiniDoor
    modifies Outlook registry settings to: (1) enable all VBA macros by setting
    Security Level=1, (2) disable content download warnings via PONT_STRING=0x20,
    and (3) force macro loading on boot via LoadMacroProviderOnBoot=1. These
    changes allow the malicious VbaProject.OTM to execute silently on every
    Outlook startup, stealing emails from Inbox, Junk, and Drafts folders and
    forwarding them to ahmeclaw2002@outlook.com and ahmeclaw@proton.me.
  mitre:
    tactic: "Persistence"
    technique: "T1137.006"
    sub_technique: ""
    technique_name: "Office Application Startup: Add-ins"
  severity: CRITICAL
  confidence: HIGH
  risk_score: 95
  search: >
    index=main sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational"
    (EventCode=12 OR EventCode=13)
    (
      (TargetObject="*\\Office\\*\\Outlook\\Security*" Details="DWORD (0x00000001)")
      OR (TargetObject="*\\Outlook\\Options\\General*PONT_STRING*")
      OR (TargetObject="*\\Outlook*LoadMacroProviderOnBoot*" Details="DWORD (0x00000001)")
    )
    | eval registry_change=case(
      like(TargetObject, "%Security%") AND Details="DWORD (0x00000001)",
        "Macro Security Level set to ENABLE ALL (Level=1)",
      like(TargetObject, "%PONT_STRING%"),
        "Content Download Warning DISABLED (PONT_STRING modified)",
      like(TargetObject, "%LoadMacroProviderOnBoot%"),
        "Macro Auto-Load on Boot ENABLED (LoadMacroProviderOnBoot=1)")
    | stats count min(_time) as first_seen max(_time) as last_seen
      values(registry_change) as changes
      values(TargetObject) as registry_keys
      values(Details) as values_set
      values(Image) as writing_processes
      values(User) as users
      by Computer
    | eval first_seen=strftime(first_seen, "%Y-%m-%d %H:%M:%S")
    | eval last_seen=strftime(last_seen, "%Y-%m-%d %H:%M:%S")
    | eval changes_count=mvcount(changes)
    | eval severity=if(changes_count>=2, "CRITICAL — Multiple Outlook security controls weakened", "HIGH")
    | table Computer changes registry_keys values_set writing_processes users
      severity first_seen last_seen count
  schedule:
    cron: "*/5 * * * *"
    window: "-6m@m"
  throttle:
    field: "Computer"
    period: "30m"
  actions:
    notable:
      rule_title: "MiniDoor: Outlook macro security downgraded on $Computer$"
      severity: critical
