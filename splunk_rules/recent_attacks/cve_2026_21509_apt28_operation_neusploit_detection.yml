    - "IT admin manually enabling macros for a specific business purpose — verify change ticket"


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 7: PixyNetLoader — Suspicious File Drops in Staging Directories
# ██████████████████████████████████████████████████████████████████████████████
#
#  Detects creation of PixyNetLoader staging artifacts in known drop locations:
#    - EhStoreShell.dll in %ProgramData%\USOPublic\Data\User\
#    - SplashScreen.png in %ProgramData%\Microsoft OneDrive\setup\Cache\
#    - office.xml in %TEMP%\Diagnostics\
#    - VbaProject.OTM in %AppData%\Microsoft\Outlook\
#
#  Confidence  : HIGH
#  Severity    : CRITICAL
#  FP Rate     : Low — these specific path+filename combinations are unique

rule_7_neusploit_file_staging:
  name: "Operation Neusploit — Suspicious File Drop in Staging Directory"
  description: >
    Detects file creation events matching the known Operation Neusploit staging
    pattern. PixyNetLoader drops EhStoreShell.dll (shellcode loader) in
    ProgramData\USOPublic\Data\User, SplashScreen.png (steganographic shellcode)
    in ProgramData\Microsoft OneDrive\setup\Cache, and office.xml (scheduled
    task configuration) in %TEMP%\Diagnostics. MiniDoor installs VbaProject.OTM
    in the Outlook profile directory. Also detects dropper files with .d extension
    and files named 2_2.d or table.d in any temporary directory.
  mitre:
    tactic: "Defense Evasion"
    technique: "T1027.003"
    sub_technique: ""
    technique_name: "Obfuscated Files or Information: Steganography"
  severity: CRITICAL
  confidence: HIGH
  risk_score: 90
  search: >
    index=main sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational"
    EventCode=11
    (
      (TargetFilename="*\\USOPublic\\Data\\User\\EhStoreShell.dll")
      OR (TargetFilename="*\\Microsoft OneDrive\\setup\\Cache\\SplashScreen.png")
      OR (TargetFilename="*\\Diagnostics\\office.xml")
      OR (TargetFilename="*\\Microsoft\\Outlook\\VbaProject.OTM")
      OR (TargetFilename="*\\2_2.d")
      OR (TargetFilename="*\\table.d")
      OR (TargetFilename="*\\2_2.lNk")
      OR (TargetFilename="*\\temp_email.msg")
    )
    | eval artifact_type=case(
      like(TargetFilename, "%EhStoreShell.dll"), "PixyNetLoader Shellcode Loader",
      like(TargetFilename, "%SplashScreen.png"), "PixyNetLoader Steganographic Payload",
      like(TargetFilename, "%office.xml") AND like(TargetFilename, "%Diagnostics%"),
        "PixyNetLoader Scheduled Task XML",
      like(TargetFilename, "%VbaProject.OTM"), "MiniDoor Outlook VBA Persistence",
      like(TargetFilename, "%2_2.d"), "MiniDoor Dropper DLL",
      like(TargetFilename, "%table.d"), "PixyNetLoader Dropper DLL",
      like(TargetFilename, "%temp_email.msg"), "MiniDoor Email Staging File",
      1=1, "Neusploit Related Artifact")
    | stats count min(_time) as first_seen max(_time) as last_seen
      values(TargetFilename) as file_paths
      values(artifact_type) as malware_components
      values(Image) as creating_processes
      values(User) as users
      by Computer
    | eval first_seen=strftime(first_seen, "%Y-%m-%d %H:%M:%S")
    | eval last_seen=strftime(last_seen, "%Y-%m-%d %H:%M:%S")
    | table Computer malware_components file_paths creating_processes users
      first_seen last_seen count
  schedule:
    cron: "*/5 * * * *"
    window: "-6m@m"
  throttle:
    field: "Computer"
    period: "15m"
  actions:
    notable:
      rule_title: "Neusploit staging artifact detected on $Computer$: $malware_components$"
      severity: critical
      drilldown_search: >
        index=main sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational"
        EventCode=11 Computer="$Computer$" earliest=-24h
        ("EhStoreShell" OR "SplashScreen" OR "VbaProject.OTM" OR "office.xml"
         OR "2_2.d" OR "table.d")
    risk:
      score: 90
      object_type: "system"
      object_field: "Computer"
  false_positives:
    - "Legitimate Microsoft OneDrive creating SplashScreen.png — validate file hash against known IOCs"
    - "Outlook repairing VbaProject.OTM — verify hash and check for concurrent registry changes"


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 8: PixyNetLoader — OneDriveHealth Scheduled Task Creation
# ██████████████████████████████████████████████████████████████████████████████
#
#  Detects creation of the "OneDriveHealth" scheduled task used by PixyNetLoader.
#  The task runs: cmd.exe /c (taskkill /f /IM explorer.exe) & (start explorer)
#  & (schtasks /delete /f /tn OneDriveHealth)
#  This kills and restarts explorer.exe (triggering the COM-hijacked DLL load)
#  and then self-deletes the scheduled task to erase persistence evidence.
#
#  Confidence  : HIGH
#  Severity    : CRITICAL
#  FP Rate     : Very low — this specific task name and self-delete pattern is unique

rule_8_pixynetloader_scheduled_task:
  name: "PixyNetLoader — OneDriveHealth Scheduled Task Creation"
  description: >
    Detects the creation of a scheduled task named "OneDriveHealth" which is
    used by APT28's PixyNetLoader to trigger COM object loading. The task
    kills explorer.exe, restarts it (causing the hijacked COM DLL to load),
    and then self-deletes via schtasks /delete. This is a critical persistence
    mechanism in the Operation Neusploit kill chain. The rule also detects
    schtasks.exe loading task XML from %TEMP%\Diagnostics\office.xml, which
    is the specific artifact used in this campaign.
  mitre:
    tactic: "Persistence"
    technique: "T1053.005"
    sub_technique: ""
    technique_name: "Scheduled Task/Job: Scheduled Task"
  severity: CRITICAL
  confidence: HIGH
  risk_score: 90
  search: >
    index=main sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational"
    EventCode=1
    (
      (Image="*\\schtasks.exe"
       (CommandLine="*OneDriveHealth*" OR CommandLine="*Diagnostics\\office.xml*"))
      OR
      (Image="*\\cmd.exe"
       CommandLine="*taskkill*explorer*"
       CommandLine="*schtasks*delete*OneDriveHealth*")
    )
    | eval detection_type=case(
      like(CommandLine, "%OneDriveHealth%") AND like(Image, "%schtasks.exe%"),
        "Scheduled task OneDriveHealth created",
      like(CommandLine, "%taskkill%explorer%") AND like(CommandLine, "%OneDriveHealth%"),
        "Explorer restart + task self-deletion sequence",
      like(CommandLine, "%Diagnostics%office.xml%"),
        "Task XML loaded from Neusploit staging path",
      1=1, "Related schtasks activity")
    | stats count min(_time) as first_seen max(_time) as last_seen
      values(CommandLine) as command_lines
      values(detection_type) as detections
      values(ParentImage) as parent_processes
      values(User) as users
      by Computer
    | eval first_seen=strftime(first_seen, "%Y-%m-%d %H:%M:%S")
    | eval last_seen=strftime(last_seen, "%Y-%m-%d %H:%M:%S")
    | table Computer detections command_lines parent_processes users
      first_seen last_seen count
  schedule:
    cron: "*/5 * * * *"
    window: "-6m@m"
  throttle:
    field: "Computer"
    period: "15m"
  actions:
    notable:
      rule_title: "PixyNetLoader scheduled task detected on $Computer$"
      severity: critical
      drilldown_search: >
        index=main sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational"
        EventCode=1 Computer="$Computer$"
        ("OneDriveHealth" OR "taskkill*explorer") earliest=-24h
    risk:
      score: 90
      object_type: "system"
      object_field: "Computer"
  false_positives:
    - "None expected — the OneDriveHealth task name combined with explorer kill/restart is unique to Neusploit"


