    (ParentImage="*\\PowerScribe*" OR ParentImage="*\\Nuance*" OR ParentImage="*\\w3wp.exe" AND match(coalesce(CommandLine,Process_Command_Line,""),"(?i)powerscribe|nuance"))
    | eval child=lower(coalesce(mvindex(split(Image,"\\"),-1), New_Process_Name))
    | eval cmd=coalesce(CommandLine, Process_Command_Line)
    | where match(child,"^(cmd|powershell|pwsh|mshta|rundll32|regsvr32|wscript|cscript|certutil)\.exe$")
    | stats count min(_time) as first_seen max(_time) as last_seen
      values(ParentImage) as ps_proc values(child) as child_proc values(cmd) as command_lines by Computer
    | eval first_seen=strftime(first_seen,"%Y-%m-%d %H:%M:%S"), last_seen=strftime(last_seen,"%Y-%m-%d %H:%M:%S")
    | table Computer ps_proc child_proc command_lines first_seen last_seen count
  schedule:
    cron: "*/10 * * * *"
    window: "-12m@m"
  throttle:
    field: "Computer"
    period: "30m"
  actions:
    notable:
      rule_title: "PT2026-06: Nuance PowerScribe RCE indicator on $Computer$ (CVE-2026-26142)"
      severity: high
      recommended_actions:
        - Confirm the Nuance/PowerScribe vendor patch; isolate the application server; begin IR
    risk:
      score: 84
      object_type: "system"
      object_field: "Computer"
  false_positives:
    - "Vendor maintenance scripts — allowlist by host + command pattern (rare for this app to shell out)"


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 17: Posture / Limited-Telemetry CVEs (BitLocker, DHA, Azure NA, AKS)
#           CVE-2026-50507 (0-day), 45658, 33828, 45476, 32193
# ██████████████████████████████████████████████████████████████████████████████
#  These are not behaviorally detectable from standard Windows/network logs.
#  This rule catches the few host-side tamper signals; the rest is patch/posture +
#  cloud-audit hunting (see recommended_actions).
#  Confidence : LOW   Severity : MEDIUM   FP Rate : Low

rule_17_posture_limited_telemetry:
  name: "PT2026-06 — Posture/Tamper Signals: BitLocker/DHA/Azure (CVE-2026-50507/45658/33828/45476/32193)"
  description: >
    Coverage for June 2026 CVEs that are NOT behaviorally detectable in a standard
    SIEM — BitLocker Security Feature Bypass (CVE-2026-50507 zero-day, 45658),
    Device Health Attestation EoP (33828), Azure Network Adapter EoP (45476), and
    Azure Kubernetes Service RCE (32193). It alerts on the host-side tamper signals
    that ARE observable: BitLocker/boot-config tampering via manage-bde / bcdedit /
    reagentc / repurposing WinRE. For the Azure/AKS items, see recommended_actions
    (these require Azure Activity / AKS control-plane audit logs, not Windows logs).
  mitre:
    tactic: "Defense Evasion"
    technique: "T1562.001"
    technique_name: "Impair Defenses"
  severity: MEDIUM
  confidence: LOW
  risk_score: 70
  search: >
    (index=main OR index=endpoint OR index=windows)
    (sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational" OR sourcetype="XmlWinEventLog:Security")
    (EventCode=1 OR EventCode=4688)
    | eval cmd=lower(coalesce(CommandLine, Process_Command_Line))
    | where match(cmd,"(manage-bde.*(-off|-disable|protectors -disable))|(bcdedit.*(bootstatuspolicy|recoveryenabled|safeboot))|(reagentc.*(/disable|/setreimage))|(bdehdcfg)")
    | eval signal=case(match(cmd,"manage-bde"),"bitlocker_tamper", match(cmd,"reagentc|bcdedit.*recovery"),"winre_boot_tamper", true(),"boot_config_change")
    | stats count min(_time) as first_seen max(_time) as last_seen
      values(signal) as signals values(cmd) as command_lines values(User) as users by Computer
    | eval first_seen=strftime(first_seen,"%Y-%m-%d %H:%M:%S"), last_seen=strftime(last_seen,"%Y-%m-%d %H:%M:%S")
    | table Computer signals command_lines users first_seen last_seen count
  schedule:
    cron: "*/15 * * * *"
    window: "-18m@m"
  throttle:
    field: "Computer"
    period: "1h"
  actions:
    notable:
      rule_title: "PT2026-06: BitLocker/boot tamper or posture signal on $Computer$"
      severity: medium
      recommended_actions:
        - "BitLocker (CVE-2026-50507/45658): apply June 2026 patch; audit manage-bde/bcdedit/WinRE changes; enforce TPM+PIN"
        - "Device Health Attestation (CVE-2026-33828): patch; this is not SIEM-observable behaviorally"
        - "Azure Network Adapter (CVE-2026-45476): patch; hunt Azure Activity logs for the adapter resource"
        - "AKS (CVE-2026-32193): patch node images; hunt AKS control-plane / k8s audit logs for anomalous exec/pod-create"
    risk:
      score: 70
      object_type: "system"
      object_field: "Computer"
  false_positives:
    - "Legitimate admin BitLocker/boot maintenance — allowlist change windows; this rule is a posture aid, not high-fidelity"


# ==============================================================================
#  INVESTIGATION QUERIES (triage)
# ==============================================================================
#  IQ1 — Crash/bugcheck sweep across the fleet (failed-exploit signal):
#    index=wineventlog (EventCode=1001 OR EventCode=1000) earliest=-24h
#    | stats count values(Message) by host | sort - count
#  IQ2 — Client-app spawning processes (Office/Outlook/mstsc/media), last 24h:
#    index=main (EventCode=1 OR EventCode=4688)
#    (ParentImage IN ("*\\winword.exe","*\\excel.exe","*\\outlook.exe","*\\mstsc.exe","*\\wmplayer.exe"))
#    | table _time Computer ParentImage Image CommandLine User
#  IQ3 — Patch verification (run on hosts): Get-HotFix | ? InstalledOn -ge '2026-06-01'
#
# ==============================================================================
#  RESPONSE PLAYBOOK
# ==============================================================================
#  1. PATCH FIRST — the June 2026 cumulative update is the primary control; these
#     rules detect exploitation/blast-radius, not the missing patch.
#  2. On a hit: isolate the host, capture the process tree / crash dump, identify
#     the delivery vector (email, file, RDP server, DHCP/PXE source, web request).
#  3. Import Cisco Talos' June-2026 Snort SIDs for packet-level network coverage.
#  4. For server RCEs (HTTP.sys, AD DS, KDC, WDS, SharePoint, PowerScribe): treat the
#     host as compromised, rotate exposed credentials, begin IR.
#  5. For client RCEs (Office/Outlook/RDP/Media/Graphics): enable ASR rules, block
#     external SMB/WebDAV and untrusted RDP egress, and user-awareness.
#  6. For BitLocker/DHA/Azure/AKS: patch + posture; hunt cloud/boot telemetry.
