# ==============================================================================
#  Microsoft Patch Tuesday — June 2026 — Highlighted CVE Detection
#  Splunk Detection Rules
# ==============================================================================
#  Description : Detection coverage for the CVEs highlighted in the June 2026
#                Microsoft Patch Tuesday (Qualys / ZDI / Talos reviews). Most of
#                these were freshly patched with NO public root-cause or PoC, so
#                the rules below are BEHAVIORAL — exploit-attempt indicators,
#                service/host crash (DoS or failed exploit), and post-exploitation
#                activity — grouped by attack surface. They are NOT precise payload
#                signatures. Pair with vendor IDS content (Cisco Talos Snort SIDs
#                for this Patch Tuesday) and the patch/exposure checks noted per rule.
#
#  CVE -> RULE COVERAGE MAP (all highlighted CVEs):
#    R1  HTTP.sys ............ CVE-2026-47291 (RCE 9.8), CVE-2026-49160 (DoS, 0-day)
#    R2  Office .............. CVE-2026-45461/45463/45472/45474 (RCE), 45460 (InfoDisc)
#    R3  Outlook/Word ........ CVE-2026-45456/47635/45458 (RCE, preview-pane class)
#    R4  Hyper-V ............. CVE-2026-45607/47652/45641 (guest->host RCE)
#    R5  AD Domain Services .. CVE-2026-45648 (RCE)
#    R6  Windows Kernel ...... CVE-2026-45657 (RCE), 42980 (NT kernel EoP), CVE-2025-10263 (ARM EoP)
#    R7  Kerberos KDC ........ CVE-2026-47288 (RCE)
#    R8  RDP Client .......... CVE-2026-47289/47654/42992/44799/44801/42985/48563 (reverse-RDP RCE)
#    R9  DHCP Client ......... CVE-2026-44815 (RCE 9.8)
#    R10 WDS ................. CVE-2026-42987 (RCE)
#    R11 Graphics (win32k) ... CVE-2026-44803/44812 (RCE), 42986 (EoP)
#    R12 Windows Media ....... CVE-2026-48574 (RCE)
#    R13 Local EoP (sys proc)  CVE-2026-45586 (CTFMON 0-day), 42905 (DWM), 42989 (Winlogon), 44810 (Crypto Svc)
#    R14 NTLM ................ CVE-2026-50508 (spoofing/coercion)
#    R15 SharePoint .......... CVE-2026-47634/45481 (spoofing)
#    R16 Nuance PowerScribe .. CVE-2026-26142 (RCE)
#    R17 Posture / limited ... CVE-2026-50507 + 45658 (BitLocker SFB 0-day), 33828 (DHA EoP),
#                              CVE-2026-45476 (Azure Network Adapter EoP), CVE-2026-32193 (AKS RCE)
#
#  MITRE ATT&CK: T1190, T1203, T1566.001, T1187, T1611, T1210, T1068, T1547.006,
#                T1219, T1557.001, T1134, T1036, T1499 (DoS)
#  Platform     : Splunk Enterprise / Splunk Cloud (ES compatible)
#  Data Sources : Sysmon (1 ProcessCreate, 3 NetworkConnect, 6 DriverLoad, 7 ImageLoad,
#                 11 FileCreate, 13 RegistrySet), Security (4688, 4624/4625/4776, 4673),
#                 System log (provider HTTP, WER bugcheck 1001, service crash 7031/7034),
#                 IIS / web / WAF, network / firewall / DNS, Azure / k8s audit (cloud rules)
#  Author       : Krishnendu
#  Version      : 1.0.0
#  Created      : 2026-06-11
#  License      : MIT
#
#  References:
#    - https://blog.qualys.com/vulnerabilities-threat-research/2026/06/09/microsoft-and-adobe-patch-tuesday-june-2026-security-update-review
#    - https://blog.talosintelligence.com/microsoft-patch-tuesday-for-june-2026-snort-rules-and-prominent-vulnerabilities/
#    - https://www.zerodayinitiative.com/blog/2026/6/9/the-june-2026-security-update-review
#    - https://msrc.microsoft.com/update-guide/  (per-CVE advisories)
#
#  NOTE: Apply the June 2026 cumulative updates — patching is the primary control.
#  These detections catch exploitation attempts and the blast radius, not the patch gap.
