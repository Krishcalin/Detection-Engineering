# ██████████████████████████████████████████████████████████████████████████████
#  RULE 1: HTTP.sys Exploit Attempt / Crash (CVE-2026-47291 RCE, CVE-2026-49160 DoS)
# ██████████████████████████████████████████████████████████████████████████████
#  Oversized request to an http.sys server (the RCE/DoS trigger) and/or an
#  http.sys service error or host bugcheck (failed/successful exploit or DoS).
#  Vulnerable config: MaxRequestBytes >= 65534 (default 16384 is safe).
#  Confidence : HIGH   Severity : CRITICAL   FP Rate : Low-Medium (tune sizes)

rule_1_httpsys_exploit_or_crash:
  name: "PT2026-06 — HTTP.sys Oversized Request / Crash (CVE-2026-47291 / CVE-2026-49160)"
  description: >
    Detects probable exploitation of the HTTP.sys RCE (CVE-2026-47291) or DoS
    (CVE-2026-49160): abnormally large HTTP requests (approaching the
    MaxRequestBytes>=65534 vulnerable threshold) to an http.sys-fronted server,
    and/or http.sys System-log errors, IIS w3wp.exe crashes, or host bugchecks
    that accompany a failed or successful trigger.
  mitre:
    tactic: "Initial Access"
    technique: "T1190"
    technique_name: "Exploit Public-Facing Application"
  severity: CRITICAL
  confidence: MEDIUM
  risk_score: 90
  search: >
    (index=web OR index=proxy OR index=windows OR index=main OR index=network)
    ( (sourcetype IN ("iis","ms:iis:auto","apache:access","nginx:plus:kv") AND (cs_bytes>=65000 OR sc_status=400))
      OR (sourcetype="XmlWinEventLog:System" AND (SourceName="HTTP" OR Provider_Name="HTTP") AND (Level=2 OR EventCode=15300 OR EventCode=15301))
      OR (sourcetype="XmlWinEventLog:Application" AND EventCode=1000 AND (Message="*w3wp.exe*" OR Message="*svchost.exe*"))
      OR (EventCode=1001 AND (Provider_Name="Microsoft-Windows-WER-SystemErrorReporting" OR SourceName="*WER*")) )
    | eval signal=case(cs_bytes>=65000,"oversized_request", EventCode=1001,"host_bugcheck", EventCode=1000,"w3wp_crash", true(),"httpsys_error")
    | stats count min(_time) as first_seen max(_time) as last_seen
      values(signal) as signals values(c_ip) as src_ips values(cs_uri_stem) as uris by host
    | eval first_seen=strftime(first_seen,"%Y-%m-%d %H:%M:%S"), last_seen=strftime(last_seen,"%Y-%m-%d %H:%M:%S")
    | table host signals src_ips uris first_seen last_seen count
  schedule:
    cron: "*/5 * * * *"
    window: "-6m@m"
  throttle:
    field: "host"
    period: "15m"
  actions:
    notable:
      rule_title: "PT2026-06: HTTP.sys exploit/crash signal on $host$ ($signals$)"
      severity: critical
      recommended_actions:
        - Confirm the June 2026 patch on $host$ and that MaxRequestBytes < 65534 (default 16384)
        - Block the source IP(s); import Cisco Talos' June-2026 Snort SIDs for packet-level coverage
        - Review HTTPERR logs (C:\\Windows\\System32\\LogFiles\\HTTPERR) around the event
    risk:
      score: 90
      object_type: "system"
      object_field: "host"
  false_positives:
    - "Legitimate large uploads / long query strings — baseline cs_bytes per app and scope to internet-facing http.sys hosts"
    - "Unrelated w3wp/driver crashes — correlate with an inbound request spike"


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 2: Office RCE / Info Disclosure (CVE-2026-45461/45463/45472/45474/45460)
# ██████████████████████████████████████████████████████████████████████████████
#  Office document RCE -> the Office app spawns a child process, loads LOLBins, or
#  beacons out. Classic T1203 post-exploitation behavior.
#  Confidence : HIGH   Severity : CRITICAL   FP Rate : Low

rule_2_office_rce_child_process:
  name: "PT2026-06 — Office App Spawning Process / Egress (CVE-2026-454xx Office RCE)"
  description: >
    Detects Microsoft Office applications (Word, Excel, PowerPoint, OneNote,
    Access, Publisher) spawning a command interpreter / LOLBin or making an
    outbound network connection — the post-exploitation signature of the June 2026
    Office RCEs (CVE-2026-45461/45463/45472/45474) and info-disclosure (45460).
  mitre:
    tactic: "Execution"
    technique: "T1203"
    technique_name: "Exploitation for Client Execution"
  severity: CRITICAL
  confidence: HIGH
  risk_score: 90
  search: >
    (index=main OR index=endpoint OR index=windows)
    (sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational" OR sourcetype="XmlWinEventLog:Security")
    (EventCode=1 OR EventCode=4688 OR EventCode=3)
    (ParentImage IN ("*\\winword.exe","*\\excel.exe","*\\powerpnt.exe","*\\onenote.exe","*\\msaccess.exe","*\\mspub.exe","*\\outlook.exe")
     OR parent_process_name IN ("winword.exe","excel.exe","powerpnt.exe","onenote.exe","msaccess.exe"))
    | eval child=lower(coalesce(mvindex(split(Image,"\\"),-1), New_Process_Name, process_name))
    | eval cmd=coalesce(CommandLine, Process_Command_Line, command)
    | where match(child,"^(cmd|powershell|pwsh|wscript|cscript|mshta|rundll32|regsvr32|certutil|bitsadmin|curl|msbuild|installutil|equation)\.exe$")
            OR (EventCode=3 AND NOT match(coalesce(DestinationIp,""),"^(10\.|192\.168\.|172\.(1[6-9]|2[0-9]|3[01])\.|127\.)"))
    | stats count min(_time) as first_seen max(_time) as last_seen
      values(ParentImage) as office_app values(child) as child_proc values(cmd) as command_lines
      values(DestinationIp) as dst_ips values(User) as users by Computer
    | eval first_seen=strftime(first_seen,"%Y-%m-%d %H:%M:%S"), last_seen=strftime(last_seen,"%Y-%m-%d %H:%M:%S")
    | table Computer office_app child_proc command_lines dst_ips users first_seen last_seen count
  schedule:
    cron: "*/5 * * * *"
    window: "-6m@m"
  throttle:
    field: "Computer"
    period: "15m"
  actions:
    notable:
      rule_title: "PT2026-06: Office app spawned process / egress on $Computer$ ($child_proc$)"
      severity: critical
      recommended_actions:
        - Capture the Office process tree and the opened document; confirm June 2026 Office patch
        - Hunt for the delivery email/file and enable ASR "Block Office child process" rules
      drilldown_search: >
        index=main Computer="$Computer$" (EventCode=1 OR EventCode=3 OR EventCode=11) earliest=-1h
    risk:
      score: 90
      object_type: "system"
      object_field: "Computer"
  false_positives:
    - "Office add-ins / macros in trusted automation — allowlist by signed parent + command pattern"


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 3: Outlook/Word Preview-Pane RCE + NTLM Leak (CVE-2026-45456/47635/45458)
# ██████████████████████████████████████████████████████████████████████████████
#  Confidence : HIGH   Severity : CRITICAL   FP Rate : Low

rule_3_outlook_word_preview_rce:
  name: "PT2026-06 — Outlook/Word RCE + Outbound SMB/WebDAV (CVE-2026-45456/47635/45458)"
  description: >
    Detects the Outlook/Word RCE class (June 2026): outlook.exe/winword.exe
    spawning a process, or initiating outbound SMB (445) / WebDAV (WebClient) to an
    external host — the auth-coercion / preview-pane exploitation pattern that also
    leaks NetNTLM. Pairs process-spawn with anomalous external SMB/WebDAV egress.
  mitre:
    tactic: "Initial Access"
    technique: "T1187"
    technique_name: "Forced Authentication"
  severity: CRITICAL
  confidence: HIGH
  risk_score: 88
  search: >
    (index=main OR index=endpoint OR index=windows OR index=network)
    (sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational" OR sourcetype="XmlWinEventLog:Security")
    ((EventCode=1 OR EventCode=4688) AND (ParentImage IN ("*\\outlook.exe","*\\winword.exe")))
    OR (EventCode=3 AND Image IN ("*\\outlook.exe","*\\winword.exe","*\\svchost.exe") AND (DestinationPort=445 OR DestinationPort=139)
        AND NOT match(coalesce(DestinationIp,""),"^(10\.|192\.168\.|172\.(1[6-9]|2[0-9]|3[01])\.|127\.)"))
    | eval child=lower(coalesce(mvindex(split(Image,"\\"),-1), New_Process_Name, process_name))
    | eval cmd=coalesce(CommandLine, Process_Command_Line, command)
    | where (EventCode=3) OR match(child,"^(cmd|powershell|pwsh|mshta|rundll32|regsvr32|wscript|cscript)\.exe$")
    | stats count min(_time) as first_seen max(_time) as last_seen
      values(child) as child_proc values(cmd) as command_lines values(DestinationIp) as ext_smb_dst
      values(User) as users by Computer
    | eval first_seen=strftime(first_seen,"%Y-%m-%d %H:%M:%S"), last_seen=strftime(last_seen,"%Y-%m-%d %H:%M:%S")
    | table Computer child_proc command_lines ext_smb_dst users first_seen last_seen count
  schedule:
    cron: "*/5 * * * *"
    window: "-6m@m"
  throttle:
    field: "Computer"
    period: "15m"
  actions:
    notable:
      rule_title: "PT2026-06: Outlook/Word RCE/forced-auth signal on $Computer$"
      severity: critical
      recommended_actions:
        - Confirm June 2026 Outlook/Word patch; block outbound SMB/WebDAV to the internet at the perimeter
        - Hunt the mailbox for the triggering message; consider disabling the WebClient (WebDAV) service
    risk:
      score: 88
      object_type: "system"
      object_field: "Computer"
  false_positives:
    - "Legitimate internal SMB from Office is normal — this rule requires EXTERNAL SMB/WebDAV or a child process"


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 4: Hyper-V Guest-to-Host RCE (CVE-2026-45607/47652/45641)
# ██████████████████████████████████████████████████████████████████████████████
#  Confidence : MEDIUM   Severity : CRITICAL   FP Rate : Low (limited telemetry)

rule_4_hyperv_guest_to_host:
  name: "PT2026-06 — Hyper-V Worker Anomaly / Crash (CVE-2026-45607/47652/45641)"
  description: >
    Detects a Hyper-V guest-to-host escape attempt: the VM worker (vmwp.exe),
    host compute service (vmcompute.exe), or management service (vmms.exe)
    spawning a child process or crashing on the host. A successful escape yields
    code execution in the host's virtualization stack.
  mitre:
    tactic: "Privilege Escalation"
    technique: "T1611"
    technique_name: "Escape to Host"
  severity: CRITICAL
  confidence: MEDIUM
  risk_score: 92
  search: >
    (index=main OR index=endpoint OR index=windows)
    (sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational" OR sourcetype="XmlWinEventLog:Security" OR sourcetype="XmlWinEventLog:Application")
    ( ((EventCode=1 OR EventCode=4688) AND (ParentImage IN ("*\\vmwp.exe","*\\vmcompute.exe","*\\vmms.exe")))
      OR (EventCode=1000 AND (Message="*vmwp.exe*" OR Message="*vmcompute.exe*" OR Message="*vmms.exe*")) )
    | eval child=lower(coalesce(mvindex(split(Image,"\\"),-1), New_Process_Name))
    | eval cmd=coalesce(CommandLine, Process_Command_Line)
    | stats count min(_time) as first_seen max(_time) as last_seen
      values(ParentImage) as hyperv_proc values(child) as child_proc values(cmd) as command_lines by Computer
    | eval first_seen=strftime(first_seen,"%Y-%m-%d %H:%M:%S"), last_seen=strftime(last_seen,"%Y-%m-%d %H:%M:%S")
    | table Computer hyperv_proc child_proc command_lines first_seen last_seen count
  schedule:
    cron: "*/5 * * * *"
    window: "-6m@m"
  throttle:
    field: "Computer"
    period: "30m"
  actions:
    notable:
      rule_title: "PT2026-06: Hyper-V worker anomaly/crash on host $Computer$"
      severity: critical
      recommended_actions:
        - Treat the Hyper-V host as potentially compromised by a guest escape; isolate and investigate
        - Confirm June 2026 Hyper-V patch; review which guest VM was active on vmwp.exe at the time
    risk:
      score: 92
      object_type: "system"
      object_field: "Computer"
  false_positives:
    - "vmwp/vmms rarely spawn children; validate any hit against Hyper-V maintenance activity"


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 5: AD Domain Services RCE (CVE-2026-45648)
# ██████████████████████████████████████████████████████████████████████████████
#  Confidence : MEDIUM   Severity : CRITICAL   FP Rate : Low (DC-scoped)

rule_5_adds_rce:
  name: "PT2026-06 — AD Domain Services RCE Indicator on DC (CVE-2026-45648)"
  description: >
    Detects indicators of AD Domain Services RCE (CVE-2026-45648) on a Domain
    Controller: an LSASS/DS process crash, or the DC spawning an unexpected child
    process (shell/LOLBin) — DCs should never run interactive shells. Scope to
    Domain Controllers via the domain_controllers lookup.
  mitre:
    tactic: "Lateral Movement"
    technique: "T1210"
    technique_name: "Exploitation of Remote Services"
  severity: CRITICAL
  confidence: MEDIUM
  risk_score: 95
  search: >
    (index=main OR index=endpoint OR index=windows)
    (sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational" OR sourcetype="XmlWinEventLog:Security" OR sourcetype="XmlWinEventLog:Application")
    | search [| inputlookup domain_controllers | fields host | rename host as Computer | format ] OR (EventCode=1000 Message="*lsass.exe*")
    | eval child=lower(coalesce(mvindex(split(Image,"\\"),-1), New_Process_Name))
    | eval parent=lower(coalesce(mvindex(split(ParentImage,"\\"),-1), parent_process_name))
    | where (EventCode=1000 AND match(coalesce(Message,""),"(?i)lsass\.exe"))
            OR ((EventCode=1 OR EventCode=4688) AND match(parent,"^(lsass|services|svchost|wininit)\.exe$")
                AND match(child,"^(cmd|powershell|pwsh|mshta|rundll32|net|whoami)\.exe$"))
    | stats count min(_time) as first_seen max(_time) as last_seen
      values(parent) as parent_proc values(child) as child_proc values(CommandLine) as command_lines by Computer
    | eval first_seen=strftime(first_seen,"%Y-%m-%d %H:%M:%S"), last_seen=strftime(last_seen,"%Y-%m-%d %H:%M:%S")
    | table Computer parent_proc child_proc command_lines first_seen last_seen count
  schedule:
    cron: "*/5 * * * *"
    window: "-6m@m"
  throttle:
    field: "Computer"
    period: "15m"
  actions:
    notable:
      rule_title: "PT2026-06: AD DS RCE indicator on DC $Computer$ (CVE-2026-45648)"
      severity: critical
      recommended_actions:
        - Treat the DC as potentially compromised — isolate, snapshot, begin DC IR
        - Confirm June 2026 patch on all DCs; review LDAP/replication anomalies around the event
    risk:
      score: 95
      object_type: "system"
      object_field: "Computer"
  false_positives:
    - "Requires the domain_controllers lookup to scope to DCs; unrelated lsass crashes need correlation"


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 6: Windows Kernel RCE/EoP (CVE-2026-45657, 42980, CVE-2025-10263)
# ██████████████████████████████████████████████████████████████████████████████
#  Confidence : MEDIUM   Severity : HIGH   FP Rate : Low-Medium

rule_6_kernel_rce_eop:
  name: "PT2026-06 — Kernel Exploit Indicators: Bugcheck / Suspicious Driver (CVE-2026-45657/42980 / CVE-2025-10263)"
  description: >
    Detects indicators of the June 2026 kernel RCE/EoP bugs: host bugchecks (BSOD)
    that often follow a failed kernel exploit, and suspicious kernel-mode driver
    loads (Sysmon Event 6) that are unsigned or load from a user-writable path —
    a common kernel-EoP/BYOVD precursor.
  mitre:
    tactic: "Privilege Escalation"
    technique: "T1068"
    technique_name: "Exploitation for Privilege Escalation"
  severity: HIGH
  confidence: MEDIUM
  risk_score: 85
  search: >
    (index=main OR index=endpoint OR index=windows)
    ( (sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational" AND EventCode=6)
      OR (EventCode=1001 AND Provider_Name="Microsoft-Windows-WER-SystemErrorReporting") )
    | eval img=lower(coalesce(ImageLoaded, ""))
    | eval signed=coalesce(Signed, "")
    | where (EventCode=1001)
            OR (EventCode=6 AND (lower(signed)="false" OR match(img,"\\\\(users|temp|programdata|appdata|downloads)\\\\")))
    | eval signal=if(EventCode=1001,"host_bugcheck","suspicious_driver_load")
    | stats count min(_time) as first_seen max(_time) as last_seen
      values(signal) as signals values(img) as drivers values(signed) as driver_signed by Computer
    | eval first_seen=strftime(first_seen,"%Y-%m-%d %H:%M:%S"), last_seen=strftime(last_seen,"%Y-%m-%d %H:%M:%S")
    | table Computer signals drivers driver_signed first_seen last_seen count
  schedule:
    cron: "*/10 * * * *"
    window: "-12m@m"
  throttle:
    field: "Computer"
    period: "30m"
  actions:
    notable:
      rule_title: "PT2026-06: Kernel exploit indicator on $Computer$ ($signals$)"
      severity: high
      recommended_actions:
        - Investigate the driver / crash dump; confirm June 2026 kernel patch
        - Enable Microsoft vulnerable-driver blocklist (HVCI) to mitigate BYOVD
    risk:
      score: 85
      object_type: "system"
      object_field: "Computer"
  false_positives:
    - "Legitimate unsigned dev/test drivers or unrelated bugchecks — baseline known drivers and correlate"


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 7: Kerberos KDC RCE (CVE-2026-47288)
# ██████████████████████████████████████████████████████████████████████████████
#  Confidence : MEDIUM   Severity : CRITICAL   FP Rate : Low (DC-scoped)

rule_7_kerberos_kdc_rce:
  name: "PT2026-06 — Kerberos KDC RCE Indicator on DC (CVE-2026-47288)"
  description: >
    Detects indicators of the Kerberos KDC RCE (CVE-2026-47288): an LSASS crash on
    a Domain Controller and/or a burst of malformed/failed Kerberos AS/TGS
    operations (4768/4769/4771 failures) preceding it — consistent with exploit
    attempts against the KDC service that runs inside LSASS.
  mitre:
    tactic: "Initial Access"
    technique: "T1190"
    technique_name: "Exploit Public-Facing Application"
  severity: CRITICAL
  confidence: MEDIUM
  risk_score: 93
  search: >
    (index=main OR index=windows)
    (sourcetype="XmlWinEventLog:Security" OR sourcetype="XmlWinEventLog:Application")
    (EventCode=4771 OR EventCode=4768 OR EventCode=4769 OR (EventCode=1000 AND Message="*lsass.exe*"))
    | eval krb_fail=if(EventCode IN (4771,4768,4769) AND (Status!="0x0" AND isnotnull(Status)),1,0)
    | stats count sum(krb_fail) as krb_failures values(eval(if(EventCode=1000,"lsass_crash",null()))) as crash
      min(_time) as first_seen max(_time) as last_seen by Computer
    | where (krb_failures >= 50) OR isnotnull(crash)
    | eval first_seen=strftime(first_seen,"%Y-%m-%d %H:%M:%S"), last_seen=strftime(last_seen,"%Y-%m-%d %H:%M:%S")
    | table Computer krb_failures crash first_seen last_seen count
  schedule:
    cron: "*/10 * * * *"
    window: "-12m@m"
  throttle:
    field: "Computer"
    period: "30m"
  actions:
    notable:
      rule_title: "PT2026-06: Kerberos KDC exploit indicator on DC $Computer$ (CVE-2026-47288)"
      severity: critical
      recommended_actions:
        - Confirm June 2026 patch on all DCs; investigate the Kerberos error burst source
