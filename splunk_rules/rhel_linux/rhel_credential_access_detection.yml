# ==============================================================================
#  RHEL Credential Access Attack Detection
#  Splunk Correlation Rules
# ==============================================================================
#  Description : Multi-layered detection for credential access attacks on Red
#                Hat Enterprise Linux (RHEL) systems. Covers /etc/shadow access
#                and theft, SSH private key theft, SSH brute force attacks,
#                credential dumping from process memory (ptrace), keylogger
#                installation, credential file discovery, Kerberos keytab
#                theft, and LDAP credential harvesting. These attacks target
#                stored and in-transit credentials to enable lateral movement.
#
#  MITRE ATT&CK: T1003.008 - OS Credential Dumping: /etc/passwd and /etc/shadow
#                 T1552.004 - Unsecured Credentials: Private Keys
#                 T1110.001 - Brute Force: Password Guessing
#                 T1003     - OS Credential Dumping
#                 T1056.001 - Input Capture: Keylogging
#                 T1552.001 - Unsecured Credentials: Credentials In Files
#                 T1558.004 - Steal or Forge Kerberos Tickets: AS-REP Roasting
#  Kill Chain   : Credential Access -> Lateral Movement
#  Platform     : Splunk Enterprise / Splunk Cloud (ES compatible)
#  Author       : Krishnendu
#  Version      : 1.0.0
#  Created      : 2026-03-05
#  License      : MIT
# ==============================================================================
#
#  PREREQUISITES:
#
#  1. Deploy auditd with the following rules on ALL RHEL hosts:
#     -w /etc/shadow -p r -k shadow_read
#     -w /etc/gshadow -p r -k shadow_read
#     -w /etc/passwd -p r -k passwd_read
#     -a always,exit -F arch=b64 -S ptrace -k ptrace_log
#     -a always,exit -F arch=b64 -S execve -k exec_log
#     -w /etc/krb5.keytab -p r -k keytab_read
#
#  2. Ensure /var/log/secure is forwarded to Splunk for SSH auth events.
#
#  3. Forward all logs to Splunk:
#     index=linux sourcetype=linux:audit
#     index=linux sourcetype=linux_secure
#     index=linux sourcetype=sysmon_linux
#
# ==============================================================================


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 1: /etc/shadow and /etc/passwd Access by Non-Standard Process (T1003.008)
# ██████████████████████████████████████████████████████████████████████████████
#
#  /etc/shadow contains hashed passwords for all local accounts. Read access
#  to shadow by anything other than login, sshd, su, sudo, passwd, or cracklib
#  indicates credential harvesting. Attackers read shadow to offline-crack
#  passwords with hashcat/john.
#
#  Confidence  : VERY HIGH (93)
#  Severity    : CRITICAL

rule_1_shadow_passwd_access:
  name: "Credential Access — /etc/shadow Read by Non-Standard Process (T1003.008)"
  description: >
    Detects read access to /etc/shadow and /etc/gshadow by processes other than
    known authentication services (login, sshd, su, sudo, passwd, chage, cracklib,
    pam, useradd, usermod, groupadd, sssd, nscd). Shadow contains hashed passwords
    for all local accounts — reading it indicates an attacker harvesting credentials
    for offline cracking with tools like hashcat or john. Any unauthorized shadow
    access on a production RHEL system is CRITICAL.
  mitre:
    tactic: "Credential Access"
    technique: T1003.008
    technique_name: "OS Credential Dumping: /etc/passwd and /etc/shadow"
    related_techniques:
      - "T1110.002: Brute Force: Password Cracking (offline cracking of hashes)"
      - "T1552.001: Unsecured Credentials: Credentials In Files"
  severity: critical
  confidence: 93
  risk_score: 92
  kill_chain_phase: "Credential Access"
  data_sources:
    - "Linux Audit Log — open/openat syscall on /etc/shadow (key=shadow_read)"

  search: |
    index=linux sourcetype=linux:audit key=shadow_read
    | eval target_file=coalesce(name, "unknown")
    | eval reader_process=coalesce(exe, "unknown")
    | eval user=coalesce(auid, "unknown")
    | eval host=coalesce(hostname, "unknown")
    ``` Exclude known authentication services that legitimately read shadow ```
    | where NOT match(reader_process, "(login|sshd|su$|sudo|passwd|chage|cracklib|pam|useradd|usermod|groupadd|groupmod|sssd|nscd|polkitd|unix_chkpwd|chpasswd|newusers|grpck|pwck|vipw)")
    ``` Exclude package manager verifications ```
    | where NOT match(reader_process, "(rpm|dnf|yum)")
    | eval risk_indicator=case(
        match(reader_process, "(cat|less|more|head|tail|cp|scp|rsync|tar|base64)"), "DIRECT_FILE_READ — likely credential theft",
        match(reader_process, "(python|perl|ruby|bash|sh)"),                        "SCRIPT_ACCESS — automated harvesting",
        match(reader_process, "(john|hashcat|unshadow)"),                            "CRACKING_TOOL — active password cracking",
        1==1,                                                                       "UNUSUAL_PROCESS_ACCESS"
      )
    | eval mitre_technique="T1003.008"
    | eval mitre_tactic="Credential Access"
    | eval alert_name="Shadow File Access"
    | table _time, host, user, reader_process, target_file, risk_indicator,
            mitre_technique, mitre_tactic, alert_name

  schedule:
    cron: "*/5 * * * *"
    earliest: "-10m"
    latest: "now"
    window: "5m"
  throttle:
    field: "host"
    period: "15m"
  actions:
    - notable_event:
        rule_title: "SHADOW ACCESS — $reader_process$ read $target_file$ on $host$ ($user$)"
        rule_description: >
          /etc/shadow was read by $reader_process$ on $host$ by user $user$. Risk:
          $risk_indicator$. Shadow file contains hashed passwords for all local accounts.
          Unauthorized access indicates credential harvesting for offline cracking.
          Investigate the user's session, check for exfiltration of the shadow file,
          and consider password rotation for all local accounts.
        severity: critical
        status: "new"
    - risk_analysis:
        risk_object: "host"
        risk_score: 92
        risk_message: "Shadow file access — $risk_indicator$ — T1003.008"
  false_positives:
    - description: >
        Backup scripts (amanda, bacula, rsync) may read /etc/shadow as part of
        system backups. These run under known service accounts at scheduled times.
      tuning: "Exclude known backup service accounts and correlate with backup schedules."


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 2: SSH Private Key Theft (T1552.004)
# ██████████████████████████████████████████████████████████████████████████████
#
#  SSH private keys provide passwordless authentication. Stealing keys from
#  ~/.ssh/id_rsa, id_ecdsa, id_ed25519 enables lateral movement to any system
#  where the corresponding public key is authorized. Bulk key file access
#  across multiple users is a strong indicator of systematic credential theft.
#
#  Confidence  : HIGH (88)
#  Severity    : HIGH

rule_2_ssh_private_key_theft:
  name: "Credential Access — SSH Private Key File Accessed (T1552.004)"
  description: >
    Detects reads of SSH private key files (id_rsa, id_ecdsa, id_ed25519, id_dsa)
    and bulk access to multiple users' .ssh directories. Also detects scp/rsync
    of .ssh directories and cat/cp/tar operations on private key files. SSH
    private key theft enables passwordless lateral movement to any system where
    the corresponding public key is deployed in authorized_keys.
  mitre:
    tactic: "Credential Access"
    technique: T1552.004
    technique_name: "Unsecured Credentials: Private Keys"
    related_techniques:
      - "T1021.004: Remote Services: SSH (key-based access)"
      - "T1552.001: Unsecured Credentials: Credentials In Files"
  severity: high
  confidence: 88
  risk_score: 85
  kill_chain_phase: "Credential Access"
  data_sources:
    - "Linux Audit Log — open/openat on SSH key files"
    - "Linux Audit Log — EXECVE for cat/cp/scp/rsync on key files"

  search: |
    index=linux sourcetype=linux:audit type=EXECVE
    | eval cmdline=coalesce(a0,"")." ".coalesce(a1,"")." ".coalesce(a2,"")." ".coalesce(a3,"")
    ``` Detect commands accessing SSH private key files ```
    | where match(cmdline, "(cat|cp|scp|rsync|tar|base64|xxd|less|more|head).*(id_rsa|id_ecdsa|id_ed25519|id_dsa|\.ssh/)")
    ``` Exclude SSH daemon and agent operations ```
    | where NOT match(exe, "(sshd|ssh-agent|ssh-add)")
    | eval user=coalesce(auid, "unknown")
    | eval host=coalesce(hostname, "unknown")
    | eval key_operation=case(
        match(cmdline, "(scp|rsync).*\.ssh"),  "REMOTE_COPY — key exfiltration",
        match(cmdline, "tar.*\.ssh"),           "ARCHIVE — bulk key theft",
        match(cmdline, "base64.*id_"),          "ENCODING — stealth exfil prep",
        match(cmdline, "(cat|less|more).*id_"), "DIRECT_READ — key viewing",
        match(cmdline, "cp.*id_"),              "LOCAL_COPY — key staging",
        1==1,                                   "KEY_FILE_ACCESS"
      )
    ``` Check for multi-user key theft (accessing multiple users' keys) ```
    | bin span=5m _time
    | stats
        dc(cmdline) as distinct_key_ops,
        count       as total_access,
        values(cmdline) as commands,
        min(_time) as first_access,
        max(_time) as last_access
        by _time, user, host
    | eval severity=if(distinct_key_ops >= 3, "CRITICAL — bulk key theft", "HIGH")
    | eval mitre_technique="T1552.004"
    | eval mitre_tactic="Credential Access"
    | eval alert_name="SSH Private Key Theft"
    | table _time, host, user, distinct_key_ops, total_access, commands,
            severity, mitre_technique, mitre_tactic, alert_name

  schedule:
    cron: "*/5 * * * *"
    earliest: "-10m"
    latest: "now"
    window: "5m"
  throttle:
    field: "user"
    period: "30m"
  actions:
    - notable_event:
        rule_title: "SSH Key Theft — $distinct_key_ops$ key operations by $user$ on $host$"
        rule_description: >
          User $user$ accessed $distinct_key_ops$ SSH private key files on $host$
          ($total_access$ total operations). Commands: $commands$. Severity: $severity$.
          SSH key theft enables passwordless lateral movement. Identify which keys
          were accessed and rotate them immediately.
        severity: high
        status: "new"
    - risk_analysis:
        risk_object: "user"
        risk_score: 85
        risk_message: "SSH key theft — $distinct_key_ops$ key ops — T1552.004"
  false_positives:
    - description: >
        SSH key rotation scripts and configuration management may access key files.
        These run under known service accounts.
      tuning: "Exclude known automation service accounts."


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 3: SSH Brute Force Attack (T1110.001)
# ██████████████████████████████████████████████████████████████████████████████
#
#  SSH brute force is the most common initial access vector for Linux servers.
#  Repeated "Failed password for" entries in /var/log/secure from a single
#  source IP indicate active password guessing. A success after failures
#  (spray-hit) is CRITICAL.
#
#  Confidence  : HIGH (90)
#  Severity    : HIGH → CRITICAL (on success after failures)

rule_3_ssh_brute_force:
  name: "Credential Access — SSH Brute Force Attack Detected (T1110.001)"
  description: >
    Detects SSH brute force attacks by identifying 10 or more authentication
    failures from a single source IP within a 5-minute window in /var/log/secure.
    Separately tracks failures against valid usernames ("Failed password for")
    and invalid usernames ("Failed password for invalid user"). Also detects the
    spray-hit pattern: authentication success (Accepted) from an IP that
    previously generated failures, indicating a successful brute force.
  mitre:
    tactic: "Credential Access"
    technique: T1110.001
    technique_name: "Brute Force: Password Guessing"
    related_techniques:
      - "T1110.003: Brute Force: Password Spraying"
      - "T1078: Valid Accounts (goal upon success)"
      - "T1021.004: Remote Services: SSH"
  severity: high
  confidence: 90
  risk_score: 82
  kill_chain_phase: "Credential Access"
  data_sources:
    - "Linux Secure Log — /var/log/secure (Failed password, Accepted password)"

  search: |
    index=linux sourcetype=linux_secure
        ("Failed password" OR "Accepted password")
    ``` Extract source IP, username, and auth result ```
    | rex "(?:Failed|Accepted) password for (?:invalid user )?(?<target_user>\S+) from (?<src_ip>\S+) port"
    | eval auth_result=if(match(_raw, "Accepted"), "SUCCESS", "FAILURE")
    | eval invalid_user=if(match(_raw, "invalid user"), "YES", "NO")
    | eval host=coalesce(hostname, host, "unknown")
    ``` 5-minute aggregation ```
    | bin span=5m _time
    | stats
        sum(eval(if(auth_result=="FAILURE", 1, 0))) as failures,
        sum(eval(if(auth_result=="SUCCESS", 1, 0))) as successes,
        dc(target_user) as unique_users_targeted,
        values(target_user) as users_targeted,
        min(_time) as first_event,
        max(_time) as last_event
        by _time, src_ip, host
    ``` Threshold: 10+ failures from single source ```
    | where failures >= 10
    ``` Detect spray-hit: success after failures ```
    | eval spray_hit=if(successes > 0, "YES — CREDENTIAL COMPROMISED", "NO")
    | eval severity=if(spray_hit=="YES — CREDENTIAL COMPROMISED", "CRITICAL", "HIGH")
    | eval attack_type=case(
        unique_users_targeted >= 5, "PASSWORD SPRAY (multiple users)",
        unique_users_targeted == 1, "BRUTE FORCE (single user)",
        1==1,                       "CREDENTIAL ATTACK"
      )
    | eval mitre_technique="T1110.001"
    | eval mitre_tactic="Credential Access"
    | eval alert_name="SSH Brute Force"
    | sort - failures
    | table _time, src_ip, host, attack_type, failures, successes,
            spray_hit, unique_users_targeted, users_targeted, severity,
            mitre_technique, mitre_tactic, alert_name

  schedule:
    cron: "*/5 * * * *"
    earliest: "-10m"
    latest: "now"
    window: "5m"
  throttle:
    field: "src_ip"
    period: "30m"
  actions:
    - notable_event:
        rule_title: "SSH Brute Force — $src_ip$ → $host$ ($failures$ failures, spray_hit=$spray_hit$)"
        rule_description: >
          $attack_type$ detected from $src_ip$ against $host$: $failures$ failures,
          $successes$ successes in 5 minutes. Users targeted: $users_targeted$.
          Spray hit: $spray_hit$. If spray_hit=YES, the attacker has valid credentials
          — lock the compromised account immediately and trace the post-auth session.
        severity: high
        status: "new"
    - risk_analysis:
        risk_object: "src_ip"
        risk_score: 82
        risk_message: "SSH brute force — $failures$ failures, spray_hit=$spray_hit$ — T1110.001"
  false_positives:
    - description: >
        Misconfigured automated scripts or monitoring tools may generate repeated
        authentication failures against a single account with stale credentials.
      tuning: "Exclude known monitoring IP addresses and service accounts."
    - description: >
        Users who have recently changed their password may fail several times
        before updating cached credentials.
      tuning: "The threshold of 10+ failures in 5 minutes filters out normal user errors."


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 4: Credential Dumping from Process Memory via ptrace (T1003)
# ██████████████████████████████████████████████████████████████████████████████
#
#  The ptrace syscall allows debugging and memory access to running processes.
#  Attackers use ptrace to attach to authentication processes (sshd, sudo,
#  login, su) and extract cleartext credentials from memory. gdb, strace,
#  and ltrace are common tools used for this.
#
#  Confidence  : HIGH (88)
#  Severity    : CRITICAL

rule_4_process_memory_credential_dump:
  name: "Credential Access — ptrace Attach to Authentication Process (T1003)"
  description: >
    Detects ptrace PTRACE_ATTACH operations targeting authentication-related
    processes (sshd, sudo, login, su, gdm, lightdm, polkitd). Also detects
    gdb, strace, and ltrace attaching to these processes, as well as reads
    of /proc/PID/maps and /proc/PID/mem for sensitive processes. Ptrace-based
    credential dumping extracts cleartext passwords from process memory.
  mitre:
    tactic: "Credential Access"
    technique: T1003
    technique_name: "OS Credential Dumping"
    related_techniques:
      - "T1055.008: Process Injection: Ptrace System Calls"
      - "T1003.007: OS Credential Dumping: Proc Filesystem"
  severity: critical
  confidence: 88
  risk_score: 90
  kill_chain_phase: "Credential Access"
  data_sources:
    - "Linux Audit Log — ptrace syscall (key=ptrace_log)"
    - "Linux Audit Log — EXECVE for gdb, strace, ltrace"

  search: |
    ``` Detect ptrace attach to authentication processes ```
    index=linux sourcetype=linux:audit
        ((type=SYSCALL syscall=ptrace) OR
         (type=EXECVE (comm="gdb" OR comm="strace" OR comm="ltrace" OR comm="gcore")))
    | eval cmdline=coalesce(a0,"")." ".coalesce(a1,"")." ".coalesce(a2,"")." ".coalesce(a3,"")
    | eval target_pid=coalesce(a2, "unknown")
    | eval user=coalesce(auid, "unknown")
    | eval host=coalesce(hostname, "unknown")
    | eval tracer=coalesce(exe, comm, "unknown")
    ``` Cross-reference target PID with running auth processes ```
    | eval is_auth_target=if(match(cmdline, "(sshd|sudo|login|su\b|gdm|lightdm|polkitd|passwd|unix_chkpwd)"), "YES", "UNKNOWN")
    ``` Also detect /proc/PID/mem access ```
    | append
        [ search index=linux sourcetype=linux:audit type=PATH
              (name="/proc/*/mem" OR name="/proc/*/maps")
          | where NOT match(exe, "(gdb|strace|ltrace)")
          | eval cmdline="proc_mem_access: ".name
          | eval user=coalesce(auid, "unknown")
          | eval host=coalesce(hostname, "unknown")
          | eval tracer=coalesce(exe, "unknown")
          | eval is_auth_target="PROC_MEM_ACCESS" ]
    | eval detection_type=case(
        match(tracer, "gdb"),     "GDB_ATTACH",
        match(tracer, "strace"),  "STRACE_ATTACH",
        match(tracer, "ltrace"),  "LTRACE_ATTACH",
        match(tracer, "gcore"),   "CORE_DUMP",
        is_auth_target=="PROC_MEM_ACCESS", "PROC_MEM_READ",
        1==1,                     "PTRACE_SYSCALL"
      )
    | eval mitre_technique="T1003"
    | eval mitre_tactic="Credential Access"
    | eval alert_name="Process Memory Credential Dump"
    | table _time, host, user, tracer, target_pid, is_auth_target,
            detection_type, cmdline, mitre_technique, mitre_tactic, alert_name

  schedule:
    cron: "*/5 * * * *"
    earliest: "-10m"
    latest: "now"
    window: "5m"
  throttle:
    field: "host"
    period: "15m"
  actions:
    - notable_event:
        rule_title: "PTRACE CREDENTIAL DUMP — $tracer$ targeting PID $target_pid$ on $host$"
        rule_description: >
          Process memory access detected on $host$ by $user$. Tracer: $tracer$.
          Target PID: $target_pid$. Auth process: $is_auth_target$. Detection:
          $detection_type$. Ptrace to auth processes extracts cleartext credentials.
          Investigate the attacker's full session and check for credential reuse.
        severity: critical
        status: "new"
    - risk_analysis:
        risk_object: "host"
        risk_score: 90
        risk_message: "Process memory credential dump — $detection_type$ — T1003"
  false_positives:
    - description: >
        Developers using gdb/strace for debugging application processes (not auth
        services) may trigger this rule. Developer workstations are more likely.
      tuning: "Restrict alerting to auth-process targets and exclude developer accounts."


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 5: Keylogger Installation (T1056.001)
# ██████████████████████████████████████████████████████████████████████████████
#
#  Linux keyloggers capture input from /dev/input/event* devices or use
#  X11/xinput to intercept keyboard events. strace on shell processes is
#  another common technique for capturing typed commands and passwords.
#
#  Confidence  : HIGH (85)
#  Severity    : HIGH

rule_5_keylogger_installation:
  name: "Credential Access — Keylogger or Input Capture Detected (T1056.001)"
  description: >
    Detects installation or execution of keylogging mechanisms: known keylogger
    tools (logkeys, xinput test, xdotool), access to /dev/input/event* devices
    by non-X11/Wayland processes, strace on bash/shell processes (captures typed
    commands including passwords), and loading of input capture kernel modules.
  mitre:
    tactic: "Credential Access"
    technique: T1056.001
    technique_name: "Input Capture: Keylogging"
    related_techniques:
      - "T1003: OS Credential Dumping"
  severity: high
  confidence: 85
  risk_score: 78
  kill_chain_phase: "Credential Access"
  data_sources:
    - "Linux Audit Log — EXECVE for keylogger tools"
    - "Linux Audit Log — open on /dev/input/event*"

  search: |
    index=linux (sourcetype=linux:audit OR sourcetype=sysmon_linux)
    | eval cmdline=coalesce(CommandLine, comm." ".coalesce(a0,"")." ".coalesce(a1,"")." ".coalesce(a2,""))
    | eval cmdline_lower=lower(cmdline)
    ``` Detect known keylogger tools ```
    | where match(cmdline_lower, "(logkeys|xinput\s+test|xdotool.*key)")
    ``` Detect strace on shell processes (command capture) ```
        OR match(cmdline_lower, "strace.*(bash|sh|zsh|login|sshd)")
    ``` Detect /dev/input device access ```
        OR match(cmdline_lower, "/dev/input/event")
    ``` Detect keyboard hook tools ```
        OR match(cmdline_lower, "(xmodmap|xkbcomp|evtest)")
    | eval keylog_type=case(
        match(cmdline_lower, "logkeys"),            "LOGKEYS — dedicated keylogger",
        match(cmdline_lower, "xinput.*test"),        "XINPUT — X11 keyboard capture",
        match(cmdline_lower, "strace.*bash"),        "STRACE — shell command capture",
        match(cmdline_lower, "/dev/input/event"),    "DEV_INPUT — raw device access",
        match(cmdline_lower, "evtest"),              "EVTEST — input event capture",
        1==1,                                       "INPUT_CAPTURE"
      )
    | eval user=coalesce(auid, User, "unknown")
    | eval host=coalesce(hostname, Computer, "unknown")
    | eval mitre_technique="T1056.001"
    | eval mitre_tactic="Credential Access"
    | eval alert_name="Keylogger Detection"
    | table _time, host, user, keylog_type, cmdline,
            mitre_technique, mitre_tactic, alert_name

  schedule:
    cron: "*/5 * * * *"
    earliest: "-10m"
    latest: "now"
    window: "5m"
  throttle:
    field: "host"
    period: "30m"
  actions:
    - notable_event:
        rule_title: "KEYLOGGER — $keylog_type$ on $host$ by $user$"
        rule_description: >
          Keylogging or input capture detected on $host$ by $user$. Type:
          $keylog_type$. Command: $cmdline$. Keyloggers capture all typed input
          including passwords. Kill the process, investigate the user session, and
          rotate all credentials entered on this host.
        severity: high
        status: "new"
    - risk_analysis:
        risk_object: "host"
        risk_score: 78
        risk_message: "Keylogger — $keylog_type$ — T1056.001"
  false_positives:
    - description: >
        QA/accessibility testing may use xinput or evtest for input device testing.
      tuning: "Exclude known QA accounts and restrict to server environments."


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 6: Credential Files in Non-Standard Locations (T1552.001)
# ██████████████████████████████████████████████████████████████████████████████
#
#  Attackers search for credentials stored in files: .env, database configs,
#  .netrc, .pgpass, and credential backup files. They also grep the filesystem
#  for password strings. Credential files staged in /tmp or /dev/shm suggest
#  active exfiltration preparation.
#
#  Confidence  : MEDIUM (75)
#  Severity    : MEDIUM

rule_6_credential_file_discovery:
  name: "Credential Access — Credential File Search or Staging (T1552.001)"
  description: >
    Detects commands searching for credential-containing files across the
    filesystem (grep/find for password patterns) and creation of credential
    files in staging locations (/tmp, /dev/shm, /var/tmp). Also detects
    access to known credential files: .env, .netrc, .pgpass, wp-config.php,
    database.yml, settings.py, and backup copies of shadow/passwd.
  mitre:
    tactic: "Credential Access"
    technique: T1552.001
    technique_name: "Unsecured Credentials: Credentials In Files"
    related_techniques:
      - "T1083: File and Directory Discovery"
      - "T1003.008: /etc/passwd and /etc/shadow"
  severity: medium
  confidence: 75
  risk_score: 60
  kill_chain_phase: "Credential Access"
  data_sources:
    - "Linux Audit Log — EXECVE for grep/find with credential patterns"

  search: |
    index=linux sourcetype=linux:audit type=EXECVE
    | eval cmdline=coalesce(a0,"")." ".coalesce(a1,"")." ".coalesce(a2,"")." ".coalesce(a3,"")." ".coalesce(a4,"")
    | eval cmdline_lower=lower(cmdline)
    ``` Detect credential file searching ```
    | where match(cmdline_lower, "(grep|egrep|find|locate).*(password|passwd|credential|secret|api.?key|token|\.env\b|\.netrc|\.pgpass)")
    ``` Detect access to known credential files ```
        OR match(cmdline_lower, "(cat|less|cp|scp).*(\.env|\.netrc|\.pgpass|wp-config\.php|database\.yml|settings\.py|shadow\.bak|passwd\.bak)")
    ``` Detect credential staging in temp directories ```
        OR match(cmdline_lower, "(cp|mv|cat).*(/etc/shadow|/etc/passwd).*/tmp/|/dev/shm/|/var/tmp/")
    | eval discovery_type=case(
        match(cmdline_lower, "(grep|find|locate).*password"), "FILESYSTEM_PASSWORD_SEARCH",
        match(cmdline_lower, "shadow\.bak|passwd\.bak"),       "CREDENTIAL_BACKUP_ACCESS",
        match(cmdline_lower, "\.env"),                         "ENV_FILE_ACCESS",
        match(cmdline_lower, "(\.netrc|\.pgpass)"),            "DATABASE_CREDENTIAL_FILE",
        match(cmdline_lower, "wp-config"),                     "WEB_APP_CONFIG_ACCESS",
        match(cmdline_lower, "/tmp/|/dev/shm/"),               "CREDENTIAL_STAGING",
        1==1,                                                  "CREDENTIAL_FILE_DISCOVERY"
      )
    | eval user=coalesce(auid, "unknown")
    | eval host=coalesce(hostname, "unknown")
    | eval mitre_technique="T1552.001"
    | eval mitre_tactic="Credential Access"
    | eval alert_name="Credential File Discovery"
    | table _time, host, user, discovery_type, cmdline,
            mitre_technique, mitre_tactic, alert_name

  schedule:
    cron: "*/10 * * * *"
    earliest: "-15m"
    latest: "now"
    window: "10m"
  throttle:
    field: "user"
    period: "30m"
  actions:
    - notable_event:
        rule_title: "Credential Discovery — $discovery_type$ by $user$ on $host$"
        rule_description: >
          Credential file search or staging detected on $host$ by $user$. Type:
          $discovery_type$. Command: $cmdline$. Investigate the user's session for
          further credential access activity and check for exfiltration.
        severity: medium
        status: "new"
    - risk_analysis:
        risk_object: "user"
        risk_score: 60
        risk_message: "Credential file discovery — $discovery_type$ — T1552.001"
  false_positives:
    - description: >
        Security auditors and compliance scanners may search for plaintext
        credentials as part of security assessments.
      tuning: "Exclude known security scanner accounts and schedule-based audit tools."


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 7: Kerberos Keytab Theft (T1558.004)
# ██████████████████████████████████████████████████████████████████████████████
#
#  RHEL systems joined to Active Directory domains via SSSD/Samba use Kerberos
#  keytabs for service authentication. Stealing /etc/krb5.keytab or user
#  ticket caches (/tmp/krb5cc_*) enables impersonation of the host or user
#  in the AD domain.
#
#  Confidence  : HIGH (87)
#  Severity    : HIGH

rule_7_kerberos_keytab_theft:
  name: "Credential Access — Kerberos Keytab or Ticket Cache Accessed (T1558.004)"
  description: >
    Detects unauthorized access to Kerberos keytab files (/etc/krb5.keytab,
    /etc/krb5.keytab.d/*) and ticket caches (/tmp/krb5cc_*, /run/user/*/krb5cc).
    Also detects klist, kinit, and ktutil commands from unexpected user contexts.
    On RHEL systems joined to AD (via SSSD, realmd, or Samba), keytab theft
    enables impersonation of the host machine account in the domain, and ticket
    cache theft enables user impersonation.
  mitre:
    tactic: "Credential Access"
    technique: T1558.004
    technique_name: "Steal or Forge Kerberos Tickets"
    related_techniques:
      - "T1558.003: Kerberoasting"
      - "T1550.003: Use Alternate Authentication Material: Pass the Ticket"
  severity: high
  confidence: 87
  risk_score: 82
  kill_chain_phase: "Credential Access"
  data_sources:
    - "Linux Audit Log — open/openat on keytab files (key=keytab_read)"
    - "Linux Audit Log — EXECVE for klist, kinit, ktutil"

  search: |
    index=linux sourcetype=linux:audit
        (key=keytab_read OR
         (type=EXECVE (comm="klist" OR comm="kinit" OR comm="ktutil" OR comm="kvno")))
    | eval cmdline=coalesce(a0,"")." ".coalesce(a1,"")." ".coalesce(a2,"")
    | eval target=coalesce(name, cmdline, "unknown")
    | eval user=coalesce(auid, "unknown")
    | eval host=coalesce(hostname, "unknown")
    | eval process=coalesce(exe, comm, "unknown")
    ``` Exclude expected Kerberos operations ```
    | where NOT match(process, "(sssd|sshd|httpd|nginx|samba|winbind|adcli|realm)")
    | eval theft_type=case(
        match(target, "krb5.keytab"),  "HOST_KEYTAB_ACCESS — domain impersonation risk",
        match(target, "krb5cc_"),       "TICKET_CACHE_ACCESS — user impersonation risk",
        match(cmdline, "ktutil"),       "KTUTIL — keytab manipulation tool",
        match(cmdline, "klist"),        "KLIST — ticket enumeration",
        match(cmdline, "kinit"),        "KINIT — ticket acquisition",
        1==1,                           "KERBEROS_CREDENTIAL_ACCESS"
      )
    | eval mitre_technique="T1558.004"
    | eval mitre_tactic="Credential Access"
    | eval alert_name="Kerberos Keytab Theft"
    | table _time, host, user, process, target, theft_type,
            mitre_technique, mitre_tactic, alert_name

  schedule:
    cron: "*/5 * * * *"
    earliest: "-10m"
    latest: "now"
    window: "5m"
  throttle:
    field: "host"
    period: "30m"
  actions:
    - notable_event:
        rule_title: "Kerberos Theft — $theft_type$ on $host$ by $user$"
        rule_description: >
          Kerberos credential access detected on $host$ by $user$. Type: $theft_type$.
          Target: $target$. Process: $process$. Keytab theft enables domain impersonation.
          Ticket cache theft enables user impersonation. Rotate the host keytab and
          investigate for lateral movement in the AD domain.
        severity: high
        status: "new"
    - risk_analysis:
        risk_object: "host"
        risk_score: 82
        risk_message: "Kerberos credential theft — $theft_type$ — T1558.004"
  false_positives:
    - description: >
        Application services (httpd with Kerberos auth, SSSD) routinely access
        keytab files for legitimate authentication. These are excluded in the query.
      tuning: "Add application service names to the exclusion list."


# ██████████████████████████████████████████████████████████████████████████████
#  RULE 8: LDAP Credential Harvesting (T1003)
# ██████████████████████████████████████████████████████████████████████████████
#
#  RHEL systems using SSSD or direct LDAP authentication store cached
#  credentials in local databases. Attackers also use ldapsearch to enumerate
#  AD and extract credential-related attributes.
#
#  Confidence  : MEDIUM (75)
#  Severity    : MEDIUM

rule_8_ldap_credential_harvesting:
  name: "Credential Access — LDAP Credential Harvesting or SSSD Cache Access (T1003)"
  description: >
    Detects ldapsearch commands with bind credentials (potential credential
    exposure in command lines), access to SSSD cache databases
    (/var/lib/sss/db/*.ldb), and enumeration of AD credential-related attributes
    via LDAP. SSSD caches contain hashed credentials for domain users that can
    be cracked offline. ldapsearch with -w (password on command line) exposes
    bind credentials in process listings and audit logs.
  mitre:
    tactic: "Credential Access"
    technique: T1003
    technique_name: "OS Credential Dumping"
    related_techniques:
      - "T1087.002: Account Discovery: Domain Account"
      - "T1558: Steal or Forge Kerberos Tickets"
  severity: medium
  confidence: 75
  risk_score: 60
  kill_chain_phase: "Credential Access"
  data_sources:
    - "Linux Audit Log — EXECVE for ldapsearch"
    - "Linux Audit Log — open on SSSD cache files"

  search: |
    index=linux sourcetype=linux:audit type=EXECVE
    | eval cmdline=coalesce(a0,"")." ".coalesce(a1,"")." ".coalesce(a2,"")." ".coalesce(a3,"")." ".coalesce(a4,"")
    | eval cmdline_lower=lower(cmdline)
    ``` Detect ldapsearch with credential-related queries ```
    | where match(cmdline_lower, "ldapsearch.*(userpassword|unicodepwd|ntpasswordhash|supplementalcredentials|msds-managedpassword)")
    ``` Detect ldapsearch with plaintext password on command line ```
        OR match(cmdline_lower, "ldapsearch.*-w\s")
    ``` Detect SSSD cache access ```
        OR match(cmdline_lower, "(cat|cp|sqlite3|strings|tdbdump).*/var/lib/sss/db/")
    ``` Detect tdbdump on SSSD cache ```
        OR match(cmdline_lower, "tdbdump.*cache_")
    | eval harvest_type=case(
        match(cmdline_lower, "userpassword|unicodepwd"),    "LDAP_PASSWORD_ATTRIBUTE_QUERY",
        match(cmdline_lower, "ldapsearch.*-w"),              "LDAP_PLAINTEXT_BIND",
        match(cmdline_lower, "/var/lib/sss/db/"),            "SSSD_CACHE_ACCESS",
        1==1,                                               "LDAP_CREDENTIAL_QUERY"
      )
    | eval user=coalesce(auid, "unknown")
    | eval host=coalesce(hostname, "unknown")
    | eval mitre_technique="T1003"
    | eval mitre_tactic="Credential Access"
    | eval alert_name="LDAP Credential Harvesting"
    | table _time, host, user, harvest_type, cmdline,
            mitre_technique, mitre_tactic, alert_name

  schedule:
    cron: "*/10 * * * *"
    earliest: "-15m"
    latest: "now"
    window: "10m"
  throttle:
    field: "user"
    period: "30m"
  actions:
    - notable_event:
        rule_title: "LDAP Credential Harvest — $harvest_type$ on $host$ by $user$"
        rule_description: >
          LDAP credential harvesting detected on $host$ by $user$. Type:
          $harvest_type$. Command: $cmdline$. SSSD cache contains offline
          credential hashes. LDAP queries for password attributes may return
          hashed credentials. Investigate the user and check for offline cracking tools.
        severity: medium
        status: "new"
    - risk_analysis:
        risk_object: "user"
        risk_score: 60
        risk_message: "LDAP credential harvesting — $harvest_type$ — T1003"
  false_positives:
    - description: >
        LDAP administrators may run ldapsearch for directory management.
        These should use Kerberos auth (kinit) rather than -w passwords.
      tuning: "Exclude known LDAP admin accounts and flag only -w password usage."


# ==============================================================================
#  INVESTIGATION QUERIES
# ==============================================================================

investigation_queries:

  inv_1_shadow_access_timeline:
    name: "Shadow File Access History on Host"
    description: >
      Shows all /etc/shadow read events on the target host in the last 7 days.
    search: |
      index=linux sourcetype=linux:audit key=shadow_read hostname="$target_host$"
          earliest=-7d
      | stats count, values(exe) as reader, values(auid) as user,
              min(_time) as first, max(_time) as last by name
      | table name, reader, user, count, first, last

  inv_2_ssh_auth_history:
    name: "SSH Authentication History for Source IP"
    description: >
      Shows all SSH authentication attempts from a specific source IP.
    search: |
      index=linux sourcetype=linux_secure src_ip="$suspect_ip$"
          ("Failed password" OR "Accepted password") earliest=-24h
      | rex "(?:Failed|Accepted) password for (?:invalid user )?(?<target_user>\S+) from (?<src_ip>\S+)"
      | eval result=if(match(_raw, "Accepted"), "SUCCESS", "FAILURE")
      | sort _time
      | table _time, src_ip, target_user, result, host

  inv_3_ptrace_activity:
    name: "All ptrace Events on Host in Last 24 Hours"
    description: >
      Lists all ptrace syscall events on the host for investigation.
    search: |
      index=linux sourcetype=linux:audit type=SYSCALL syscall=ptrace
          hostname="$target_host$" earliest=-24h
      | stats count, values(comm) as tracer, values(auid) as user by a0, a2
      | eval ptrace_op=case(a0=="16", "ATTACH", a0=="17", "DETACH", a0=="4", "PEEK", a0=="5", "POKE", 1==1, a0)
      | table ptrace_op, a2, tracer, user, count

  inv_4_credential_file_access:
    name: "Credential-Related File Access by User"
    description: >
      Shows all credential file access patterns by a specific user.
    search: |
      index=linux sourcetype=linux:audit type=EXECVE auid="$suspect_user$"
          hostname="$target_host$" earliest=-24h
      | eval cmdline=coalesce(a0,"")." ".coalesce(a1,"")." ".coalesce(a2,"")." ".coalesce(a3,"")
      | where match(cmdline, "(shadow|passwd|\.ssh|\.env|\.netrc|\.pgpass|krb5|credential|secret|password|keytab)")
      | sort _time
      | table _time, cmdline, exe

  inv_5_kerberos_activity:
    name: "Kerberos-Related Activity on Host"
    description: >
      Shows all Kerberos tool usage and keytab access on the host.
    search: |
      index=linux sourcetype=linux:audit hostname="$target_host$" earliest=-24h
          ((type=EXECVE (comm="klist" OR comm="kinit" OR comm="ktutil" OR comm="kvno" OR comm="kdestroy"))
           OR key=keytab_read)
      | eval action=coalesce(comm, "keytab_access")
      | stats count, values(auid) as user, min(_time) as first by action
      | table action, user, count, first


# ==============================================================================
#  INCIDENT RESPONSE PLAYBOOK
# ==============================================================================

incident_response_playbook:
  name: "RHEL Credential Access — Incident Response Playbook"
  description: >
    Step-by-step response procedure when credential access is detected on
    a RHEL system.

  phase_1_detection_and_triage:
    - step: "Identify the credential access type: shadow theft, SSH key theft, brute force, memory dump, keylogger"
    - step: "Determine which credentials may be compromised"
    - step: "Assess blast radius: how many systems could be accessed with stolen credentials?"
    - step: "Check for lateral movement indicators: SSH connections from compromised host to others"

  phase_2_containment:
    - step: "Lock the compromised user account immediately: passwd -l <username>"
    - step: "Block the brute force source IP at the firewall: firewall-cmd --add-rich-rule='rule family=ipv4 source address=<IP> drop'"
    - step: "Kill keylogger/ptrace processes: kill -9 <PID>"
    - step: "If shadow file was stolen: prepare for enterprise-wide password rotation"
    - step: "If SSH keys were stolen: identify all systems with the compromised public key in authorized_keys"

  phase_3_credential_rotation:
    - step: "Rotate ALL local account passwords on the compromised host"
    - step: "Regenerate SSH keypairs and redeploy public keys via config management"
    - step: "If Kerberos keytab stolen: regenerate host keytab via msktutil or adcli"
    - step: "If domain credentials compromised: initiate AD password reset for affected accounts"
    - step: "Rotate application credentials: database passwords, API keys, service accounts"

  phase_4_evidence_and_analysis:
    - step: "Collect auditd logs: ausearch -k shadow_read/keytab_read/ptrace_log"
    - step: "Collect /var/log/secure for SSH brute force timeline"
    - step: "Identify the credential usage: where were stolen credentials used for access?"
    - step: "Map the full attack chain: initial access -> credential access -> lateral movement"

  phase_5_hardening:
    - step: "Implement fail2ban or DenyHosts for SSH brute force protection"
    - step: "Restrict /etc/shadow permissions and ensure only required processes can read it"
    - step: "Enable Yama LSM ptrace scope: echo 1 > /proc/sys/kernel/yama/ptrace_scope"
    - step: "Deploy SSH key management solution for centralized key lifecycle"
    - step: "Enable SSSD credential caching with strong hash algorithms"
